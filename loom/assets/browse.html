function renderTopicRelations(r){
  const root=$('#trelations');root.dataset.ready='1';
  if(!r){root.innerHTML=`<div class="empty">${T('关联总览暂时无法载入。','Relation overview could not be loaded.')}</div>`;return}
  const edges=r.relation_edges||[],nodes=r.nodes||[];
  if(!edges.length){root.innerHTML=`<div class="empty"><strong style="display:block;color:var(--label);margin-bottom:6px">${T('还没有跨主题关联','No cross-topic relations yet')}</strong>${T('同步更多记录并完成主题归类后，这里会展示自动派生的结构关联。','Sync and classify more records to reveal derived structural relations here.')}</div>`;return}
  const degree={};edges.forEach(e=>{degree[e.source]=(degree[e.source]||0)+e.count;degree[e.target]=(degree[e.target]||0)+e.count});
  const names=Object.keys(degree).sort((a,b)=>degree[b]-degree[a]||a.localeCompare(b)).slice(0,14),visible=new Set(names),edgeMap={};
  edges.forEach(e=>{if(visible.has(e.source)&&visible.has(e.target))edgeMap[[e.source,e.target].sort().join('\u0000')]=e});
  const max=Math.max(1,...Object.values(edgeMap).map(e=>e.count));
  const topicButton=(name,label)=>`<button class="relation-topic" title="${esc(name)}" onclick="pick('${jsq(name)}')">${esc(label)}</button>`;
  const head=names.map((n,i)=>`<th scope="col">${topicButton(n,String(i+1))}</th>`).join('');
  const rows=names.map((a,ri)=>`<tr><th scope="row">${topicButton(a,`${ri+1}. ${a}`)}</th>${names.map(b=>{
    if(a===b)return '<td class="relation-empty-cell">—</td>';
    const e=edgeMap[[a,b].sort().join('\u0000')];if(!e)return '<td></td>';
    const heat=(.12+.56*e.count/max).toFixed(2),reason=(e.reasons||[]).join(' · '),title=`${a} ↔ ${b}: ${e.count}${reason?' · '+reason:''}`;
    return `<td><button class="relation-cell" style="--heat:${heat}" title="${esc(title)}" onclick="pick('${jsq(a)}')">${e.count}</button></td>`}).join('')}</tr>`).join('');
  root.innerHTML=`<div class="relation-summary"><span><b>${nodes.length}</b>${T('主题','topics')}</span><span><b>${(r.hierarchy_edges||[]).length}</b>${T('层级边','hierarchy edges')}</span><span><b>${edges.length}</b>${T('跨主题关联','topic relations')}</span><span><b>${r.total_relation_edges||0}</b>${T('记录层结构边','record-level edges')}</span></div><div class="relation-matrix-wrap"><table class="relation-matrix"><caption class="sr-only">${T('主题结构关联矩阵','Topic structural relation matrix')}</caption><thead><tr><th>${T('主题','Topic')}</th>${head}</tr></thead><tbody>${rows}</tbody></table></div><p class="relation-note">${T('数字表示两个主题之间聚合后的结构关联数量；这里只展示关联最强的 14 个主题。点主题可查看其上卷记录。','Numbers are aggregated structural links between topics. The 14 strongest connected topics are shown; select a topic to inspect its rolled-up records.')}</p>`
}
async function loadTopics(){
  const [r,relations]=await Promise.all([api('/api/topics',{}),api('/api/topic-relations',{}).catch(()=>null)]);
  const nodes=r.nodes||[],edges=r.edges||[],byN={};
  if(!nodes.length){
    $('#tgraph').innerHTML=`<div class="empty" style="background:transparent;padding:44px 16px"><strong style="display:block;color:var(--label);margin-bottom:6px">${T('还没有主题','No topics yet')}</strong>${T('先在主题层创建主题并归类记录。','Create topics and classify records first.')}</div>`;
    $('#tloose').textContent='';$('#tmembers').hidden=true;renderTopicRelations(relations);
    return;
  }
  $('#tmembers').hidden=false;
  nodes.forEach(n=>byN[n.name]=n);
  const parents={};edges.forEach(([p,c])=>{(parents[c]=parents[c]||[]).push(p)});
  // 深度 = 最长父链(带环保护)
  const depth={};const dep=(n,seen)=>{if(depth[n]!=null)return depth[n];
    if(seen.has(n))return 0;seen.add(n);
    const ps=(parents[n]||[]).filter(p=>byN[p]);
    return depth[n]=ps.length?1+Math.max(...ps.map(p=>dep(p,seen))):0};
  nodes.forEach(n=>dep(n.name,new Set()));
  const cols=[];nodes.forEach(n=>{(cols[depth[n.name]]=cols[depth[n.name]]||[]).push(n)});
  // 每列先按父的均值 y 排(减少交叉),父未定时按上卷数
  const pos={};const rowH=48,padY=14;
  const colX=[];let x=12;
  cols.forEach((col,ci)=>{colX[ci]=x;x+=Math.max(...col.map(NW))+72});
  cols.forEach((col,ci)=>{
    col.sort((a,b)=>{const ay=avgY(a),by=avgY(b);return ay-by||b.count-a.count});
    col.forEach((n,i)=>pos[n.name]={x:colX[ci],y:padY+i*rowH});
    function avgY(n){const ps=(parents[n.name]||[]).map(p=>pos[p]&&pos[p].y).filter(v=>v!=null);
      return ps.length?ps.reduce((a,b)=>a+b,0)/ps.length:1e9}
  });
  const H=Math.max(...cols.map(c=>c.length))*rowH+padY*2, W=x;
  const maxC=Math.max(...nodes.map(n=>n.count||1));
  let svg=`<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">
    <defs><filter id="sh" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/></filter></defs>`;
  for(const [p,c] of edges){if(!pos[p]||!pos[c])continue;
    const x1=pos[p].x+NW(byN[p]),y1=pos[p].y+16,x2=pos[c].x,y2=pos[c].y+16,mx=(x1+x2)/2;
    svg+=`<path class="gedge" data-e="${esc(p)}|${esc(c)}" d="M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}"/>`}
  for(const n of nodes){const{x,y}=pos[n.name],w=NW(n);
    const heat=Math.min(0.30,0.05+0.25*(n.count/maxC));        // 热力底色:上卷越多越暖
    const root=depth[n.name]===0;
    const cw=String(n.count).length*7.5+12;
    svg+=`<g class="gnode" data-n="${esc(n.name)}" transform="translate(${x},${y})" onclick="pick('${esc(n.name).replace(/'/g,"\\'")}')">
      <rect width="${w}" height="32" fill="rgba(90,200,168,${heat.toFixed(2)})"
        stroke="${root?'var(--accent)':'var(--separator-light)'}" filter="url(#sh)"/>
      <text x="13" y="21">${esc(n.name)}${n.multi?' ↺':''}</text>
      <rect x="${w-cw-7}" y="8" width="${cw}" height="16" rx="8" fill="${root?'var(--accent)':'var(--fill-strong)'}" opacity="0.95"/>
      <text class="cnt${root?' cnt-root':''}" x="${w-cw/2-7}" y="20" text-anchor="middle">${n.count}</text></g>`}
  svg+='</svg>';
  $('#tgraph').innerHTML=svg;
  $('#tloose').innerHTML=(r.loose.length?`${T('未建页','No page yet')}:${r.loose.map(t=>`<b onclick="pick('${esc(t)}')">${esc(t)}</b>`).join(' · ')} · `:'')
    +T(`已归类 ${r.total_tagged} 条 · ↺=多父(DAG)`,`${r.total_tagged} classified · ↺=multi-parent (DAG)`);
  renderTopicRelations(relations);
}
async function pick(name){

// ---- 按天:翻页式月历热力 ----
let CAL={months:[],cnt:{},idx:0,sel:null};
async function loadDays(){
  const r=await api('/api/days',{});
  CAL.cnt={};r.days.forEach(d=>CAL.cnt[d.date]=d.count);
  CAL.months=[...new Set(r.days.map(d=>d.date.slice(0,7)))].sort();
  CAL.idx=CAL.months.length-1;                              // 默认最新月
  renderCal();
  if(r.days.length)loadDay(r.days[0].date);
}
function calNav(d){CAL.idx=Math.min(Math.max(CAL.idx+d,0),CAL.months.length-1);renderCal()}
function renderCal(){
  const m=CAL.months[CAL.idx];if(!m)return;
  const heat=c=>c>=10?'h3':c>=4?'h2':c>=1?'h1':'';
  const today=todayISO();
  const [y,mo]=m.split('-').map(Number);
  const dow=(new Date(y,mo-1,1).getDay()+6)%7, dim=new Date(y,mo,0).getDate();
  let cells=(LANG==='en'?['Mo','Tu','We','Th','Fr','Sa','Su']:'一二三四五六日'.split('')).map(w=>`<div class="wd">${w}</div>`).join('');
  for(let i=0;i<dow;i++)cells+='<div class="cell"></div>';
  for(let d=1;d<=dim;d++){
    const ds=`${m}-${String(d).padStart(2,'0')}`,c=CAL.cnt[ds]||0;
    cells+=`<div class="cell ${c?'has '+heat(c):''}${ds===today?' today-mark':''}" data-d="${ds}" ${c?`onclick="loadDay('${ds}')"`:''}
      title="${ds}${c?' · '+c+T(' 条',' entries'):''}">${d}</div>`}
  const mTotal=Object.keys(CAL.cnt).filter(d=>d.startsWith(m)).reduce((a,d)=>a+CAL.cnt[d],0);
  $('#cals').innerHTML=`<div class="cal"><div class="mh">
      <button onclick="calNav(-1)" ${CAL.idx===0?'disabled':''}>‹</button>
      <span>${T(y+' 年 '+mo+' 月',['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][mo-1]+' '+y)} <small style="color:var(--dim);font-weight:400">${mTotal}${T(' 条','')}</small></span>
      <button onclick="calNav(1)" ${CAL.idx===CAL.months.length-1?'disabled':''}>›</button></div>
    <div class="grid">${cells}</div>
    <div class="legend" style="margin-top:10px">${T('少','less')} <i class="cell h1"></i><i class="cell h2"></i><i class="cell h3"></i> ${T('多','more')}</div></div>`;
  markSel();
}
function markSel(){document.querySelectorAll('.cell').forEach(x=>x.classList.toggle('on',x.dataset.d===CAL.sel))}
async function loadDay(date){
  CAL.sel=date;
  const mi=CAL.months.indexOf(date.slice(0,7));
  if(mi>=0&&mi!==CAL.idx){CAL.idx=mi;renderCal()}else markSel();
  $('#dbody').innerHTML=skeletonList(4);
  try{
    const r=await api('/api/day',{date});
    const label=LANG==='en'?date:date.replace(/-/, ' 年 ').replace(/-/, ' 月 ')+' 日';
    $('#dbody').innerHTML=`<div class="day-head"><h2>${esc(label)}</h2><span>${r.total}${T(' 条记录',' records')}</span></div>`+groups(r.groups);
  }catch(e){$('#dbody').innerHTML=`<div class="empty">${esc(e.message||T('载入失败','Failed to load'))}</div>`}
}

async function loadReport(force=false){

async function exportReportMaterial(){
  const btn=$('#report-export'),date=$('#report-date').value||todayISO();

async function copyReportMaterial(){

async function reportSync(){
  const btn=$('#report-sync');btn.disabled=true;btn.classList.add('is-busy');setReportState('',T('正在同步记录…','Syncing records…'));
  try{
    const r=await post('/api/admin/action',{action:'sync',source:'all',since:'',backup:false,push:false});
    if(!r.ok)throw new Error(r.message||r.error||T('同步失败','Sync failed'));

async function adminAction(payload,confirmWord,options={}){
  const home=options.surface==='home';
  if(confirmWord&&!confirm(T(`确认执行 ${confirmWord}?`,`Confirm ${confirmWord}?`)))return;
  if(confirmWord)payload.confirm=confirmWord;
  if(!home){
    setBusy(true);
    if(payload.action==='sync')renderSyncResult(null);
    setLog(T('执行中…','Running…'));
  }
  try{
    let r=await post('/api/admin/action',payload);
    if(!r.ok&&r.needs_confirm&&confirm(r.message)){payload.confirm=r.needs_confirm;r=await post('/api/admin/action',payload)}
    if(r.refresh||r.overview){
      if(home){ADMIN=null;CONSOLE=null;RESOURCES=null;window._a=0}else await loadAdmin()
    }
    if(!home){
      if(payload.action==='sync'){
        const sync=r.sync||{status:r.status||(r.ok?'success':'error'),sources:[]};
        renderSyncResult(sync);
        const st=sync.status||'error';
        toast(st==='success'?T('同步完成','Sync completed'):st==='partial'?T('同步部分完成','Sync partially completed'):T('同步失败','Sync failed'), homeSyncDetail(sync,r.message), st==='success'?'':st);
      }
      if(payload.action==='vault_backup'){
        renderBackupResult(r.backup);
        if(r.backup)toast(r.backup.ok?T('备份完成','Backup completed'):T('备份失败','Backup failed'), r.backup.message||'', r.backup.ok?'':'error');
      }
      const status=r.status||(r.ok?'success':'error'),prefix=status==='partial'?'⚠ ':status==='success'?'✓ ':'✗ ';
      setLog(prefix+(r.message||'')+(r.output?'\n\n'+r.output:''));
    }
    return r
  }catch(e){
    const message=e&&e.message?e.message:String(e);
    if(!home){
      if(payload.action==='sync')renderSyncResult({status:'error',sources:[]});
      setLog('✗ '+message);
    }
    return {ok:false,status:'error',message,sync:payload.action==='sync'?{status:'error',sources:[]}:undefined}
  }finally{
    if(!home)setBusy(false);
  }
}
function homeSyncDetail(sync,message){

  const records=rows.reduce((n,r)=>n+(Number(r.count)||0),0),parts=[];
  if(counts.success)parts.push(`${counts.success}${T(' 个来源成功',' sources succeeded')}`);

  if(counts.error)parts.push(`${counts.error}${T(' 个来源失败',' sources failed')}`);
  if(records)parts.push(`${records}${T(' 条新记录',' records')}`);
  if(sync.backup)parts.push(T(sync.backup.ok?'备份完成':'备份失败',sync.backup.ok?'backup completed':'backup failed'));
  return parts.join(' · ')||message||T('没有可执行的数据来源','No source was available to run')
}

      try{await loadDash()}catch(e){$('#home-sync-detail').textContent+=` · ${T('首页数据暂未刷新','Home data has not refreshed yet')}`}
    }
  }catch(e){
    const msg=e&&e.message?e.message:String(e);
    setHomeSyncState('error',{sources:[]},msg);toast(T('同步失败','Sync failed'),msg,'error');
  }finally{btn.disabled=false;btn.classList.remove('is-busy')}
}
function runSync(){adminAction({action:'sync',source:$('#sync-source').value,since:$('#sync-since').value,
  backup:$('#sync-backup').checked,push:$('#sync-push').checked},$('#sync-push').checked?'push':null)}
function vaultBackup(push){adminAction({action:'vault_backup',push},push?'push':null)}
function repoAdd(){adminAction({action:'repo_add',path:$('#repo-path').value})}
function repoRemove(path){adminAction({action:'repo_remove',path},'remove')}
function identityAdd(){adminAction({action:'identity_add',value:$('#identity-value').value})}
function identityRemove(value){adminAction({action:'identity_remove',value},'remove')}

function sourcePathSet(name){adminAction({action:'source_path_set',name,path:$('#generic-source-path').value})}
function ownerSet(){adminAction({action:'owner_set',name:$('#owner-name').value,feishu_name:$('#owner-feishu').value})}
function feishuAdd(){adminAction({action:'feishu_add',name:$('#fs-name').value,url:$('#fs-url').value,table_id:$('#fs-table').value})}
function feishuRemove(name){adminAction({action:'feishu_remove',name},'remove')}

// ---- 详情 ----
let modalLastFocus=null,drawerLastFocus=null,DETAIL_SEQ=0;
function drawer(on,restoreFocus=true,returnFocus=null){
  const d=$('#drawer'),backdrop=$('#drawer-backdrop');
  if(!d)return;
  const was=d.classList.contains('on');
  if(on&&!was)drawerLastFocus=returnFocus||document.activeElement;
  d.classList.toggle('on',!!on);
  backdrop.classList.toggle('on',!!on);
  backdrop.setAttribute('aria-hidden',on?'false':'true');
  d.setAttribute('aria-hidden',on?'false':'true');
  lockScroll(!!on||($('#source-config')&&$('#source-config').classList.contains('on')));
  if(on){
    const closeBtn=d.querySelector('.x');
    if(closeBtn)setTimeout(()=>closeBtn.focus({preventScroll:true}),20);
    else d.focus({preventScroll:true});
  }else if(was&&restoreFocus&&drawerLastFocus&&drawerLastFocus.focus){
    drawerLastFocus.focus({preventScroll:true});
  }
  if(!on)drawerLastFocus=null;
}
function sectionTitle(k){
  const map={digest:['摘要','Digest'],body:['正文','Body'],opening:['开场','Opening'],content:['内容','Content'],
    work:['工作','Work'],thinking:['思考','Thinking'],plan:['计划','Plan'],detail:['详情','Detail']};
  const p=map[k];return p?T(p[0],p[1]):k;
}
async function detail(id,returnFocus=null){
  const seq=++DETAIL_SEQ;
  $('#dctn').innerHTML=`<div class="drawer-head"><h3>${T('载入中…','Loading…')}</h3><button class="x" onclick="drawer(false)" aria-label="${T('关闭','Close')}">${icon('close')}</button></div><div class="drawer-body"><div class="sk sk-line" style="width:40%;height:10px"></div><div class="sk sk-line" style="width:90%;height:10px;margin-top:10px"></div><div class="sk sk-line" style="width:75%;height:10px;margin-top:10px"></div><div class="sk sk-line" style="width:100%;height:140px;margin-top:18px"></div></div>`;
  drawer(true,true,returnFocus);
  try{
    const e=await api('/api/entry',{id});
    if(seq!==DETAIL_SEQ)return;
    if(e.error){
      $('#dctn').innerHTML=`<div class="drawer-head"><h3>${T('未找到','Not found')}</h3><button class="x" onclick="drawer(false)" aria-label="${T('关闭','Close')}">${icon('close')}</button></div><div class="drawer-empty">${T('这条记录可能已被清理。','This record may have been removed.')}</div>`;
      return;
    }
    const d=e.detail||{};
    const chips=[
      e.date?`<span class="meta-chip"><b>${esc(e.date)}</b></span>`:'',
      e.project?`<span class="meta-chip">${esc(e.project)}</span>`:'',
      e.kind?`<span class="meta-chip">${esc(kindLabel(e.kind))}</span>`:'',
      e.tool?`<span class="meta-chip">${esc(sourceLabel(e.tool))}</span>`:'',
      ...(e.topics||[]).slice(0,6).map(t=>`<span class="meta-chip" style="color:var(--accent-text);background:var(--accent-soft)">${esc(t)}</span>`)
    ].filter(Boolean).join('');
    let body='';
    for(const k of ['digest','body','opening','content','work','thinking','plan']){
      if(d[k])body+=`<section class="section"><div class="gh">${esc(sectionTitle(k))}</div><pre>${esc(d[k])}</pre></section>`;
    }
    const rest=Object.fromEntries(Object.entries(d).filter(([k])=>!['digest','body','opening','content','work','thinking','plan'].includes(k)));
    if(Object.keys(rest).length)body+=`<section class="section"><div class="gh">${esc(sectionTitle('detail'))}</div><pre>${esc(JSON.stringify(rest,null,2))}</pre></section>`;
    const related=e.related||[];
    if(related.length)body+=`<section class="section"><div class="gh">${T(`关联记录 · ${related.length}`,`Related records · ${related.length}`)}</div><div class="drawer-related-list">${related.map(r=>`<button class="drawer-related" onclick="detail('${jsq(r.id)}')"><strong>${esc(r.summary||r.id)}</strong><span class="drawer-related-score">${Number(r.score||0).toFixed(1)}</span><span class="drawer-related-meta">${esc(r.date||'')} · ${esc(sourceLabel(r.tool))} · ${esc(kindLabel(r.kind))}</span>${(r.reasons||[]).length?`<span class="drawer-related-reason">${esc(r.reasons.join(' · '))}</span>`:''}</button>`).join('')}</div></section>`;
    if(!body)body=`<div class="drawer-empty">${T('没有更多详情','No further detail')}</div>`;
    $('#dctn').innerHTML=`<div class="drawer-head"><h3>${esc(e.summary||T('无标题','Untitled'))}</h3><button class="x" onclick="drawer(false)" aria-label="${T('关闭','Close')}">${icon('close')}</button></div>
      <div class="meta-row">${chips}</div>
      ${e.ref?`<div class="ref-line">ref · ${esc(e.ref)}</div>`:''}
      <div class="drawer-body">${body}</div>`;
  }catch(err){
    if(seq!==DETAIL_SEQ)return;
    $('#dctn').innerHTML=`<div class="drawer-head"><h3>${T('载入失败','Failed')}</h3><button class="x" onclick="drawer(false)" aria-label="${T('关闭','Close')}">${icon('close')}</button></div><div class="drawer-empty">${esc(err.message||'')}</div>`;
  }
}


showView(viewFromHash(),false);
loadDash();
</script>
