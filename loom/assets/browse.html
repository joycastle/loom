<style>
:root{--ink:#121416;--panel:#191B1E;--panel2:#202327;--panel3:#151719;
  --line:#32363B;--line2:#4A4F56;--tx:#F1F2F4;--mut:#ABB1BA;--dim:#777E88;
  --warm:#B6A784;--cool:#AAB2BE;--blue:#AAB7C8;--bad:#D77E7E;--ok:#9DA7B2;
  --warn:#B6A784;
  /* macOS 风格:大而淡的窗口阴影 + 极细内高光边;毛玻璃与半透明白边 */
  --shadow:0 20px 50px rgba(0,0,0,.38);--soft:inset 0 1px 0 rgba(255,255,255,.05);
  --glass:rgba(28,31,36,.66);--glass-border:rgba(255,255,255,.09);
  --hairline:inset 0 0 0 .5px rgba(255,255,255,.06);
  --surface:var(--panel);--surface-subtle:var(--panel2);--surface-raised:#282B30;--border:var(--line);--border-strong:var(--line2);
  /* 强调色:loom 品牌绿(沿用旧色) */
  --text:var(--tx);--text-secondary:var(--mut);--accent:#5AA9A0;--accent-soft:rgba(90,169,160,.18);--danger:var(--bad);
  --page-track:960px;--hero-track:760px;--reading-track:760px}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--ink);color-scheme:dark;overflow-y:scroll}
@supports(scrollbar-gutter:stable){html{overflow-y:auto;scrollbar-gutter:stable}}
body{min-height:100vh;background:var(--ink);
  color:var(--tx);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Helvetica Neue",Inter,ui-sans-serif,system-ui,"Segoe UI",sans-serif;
  line-height:1.55;font-feature-settings:"tnum" 1;font-variant-numeric:tabular-nums;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;
  -webkit-tap-highlight-color:rgba(170,178,190,.18);overscroll-behavior-y:contain;overflow-x:clip}
.mono{font-family:ui-monospace,Menlo,Consolas,monospace}
a{color:var(--cool);text-decoration:none}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}
.skip{position:fixed;left:16px;top:10px;z-index:20;transform:translateY(-140%);

  padding:8px 12px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.28)}
.skip:focus{transform:translateY(0);outline:2px solid var(--cool);outline-offset:2px}
main{display:block;width:100%;min-width:0}

  backdrop-filter:blur(16px)}

.brand{display:flex;align-items:center;gap:10px;min-width:0}.brand>svg{width:36px;height:36px;flex:0 0 auto;filter:drop-shadow(0 8px 18px rgba(0,0,0,.3))}
.brand-copy{display:flex;align-items:baseline;gap:8px;min-width:0}.brand-subtitle{color:var(--dim);font-size:13px;white-space:nowrap}

nav{display:flex;gap:4px;margin-left:auto;padding:4px;background:var(--glass);border:1px solid var(--glass-border);
  border-radius:12px;box-shadow:var(--soft);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%)}
nav button{height:32px;min-width:44px;background:transparent;border:1px solid transparent;border-radius:8px;color:var(--mut);
  padding:0 12px;font-size:13px;cursor:pointer;white-space:nowrap;transition:background .14s,border-color .14s,color .14s}
nav button:hover{color:var(--tx);background:rgba(255,255,255,.035)}
nav button.on{color:var(--tx);background:var(--panel2);border-color:var(--line2);box-shadow:var(--soft)}
.nav-group,.nav-bottom{display:contents}.nav-section{display:none}
html:not([data-surface="desktop"]) [data-desktop-only]{display:none!important}
html:not([data-surface="desktop"]) .home-recent{grid-column:1/-1}
#themebtn{width:34px;min-width:34px;padding:0;display:grid;place-items:center}#themebtn svg{width:17px;height:17px}
button,input,select{font:inherit;color-scheme:inherit}
button,label{touch-action:manipulation}
button:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid var(--text-secondary);outline-offset:2px}
button:disabled{cursor:default;opacity:.58}
.view{display:none;width:100%;max-width:var(--page-track);min-width:0;min-height:560px;margin:0 auto;padding-top:18px}.view.on{display:block}
@media(max-width:720px){.wrap{padding:10px 12px 64px}header{align-items:flex-start;flex-wrap:wrap}

  input,select,.form input,.form select{font-size:16px!important}
  .bar input,.bar select,.form input,.form select{height:44px;min-height:44px}
  .act{min-height:44px}.mini{min-height:44px}}
/* 首页与台账 */
.home-shell{width:100%;max-width:var(--page-track);margin:18px auto 0}
.home-page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin:0 0 22px}
.home-heading{min-width:0}.home-kicker{font-size:12px;color:var(--accent);font-weight:600;margin-bottom:5px}

.home-actions{display:flex;align-items:center;justify-content:flex-end;gap:8px;flex:0 0 auto}
.home-actions .act{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:38px;padding:8px 13px;font-size:12.5px}

.button-icon{display:grid;place-items:center}.button-icon svg{width:16px;height:16px}
.home-ai-composer{display:flex;align-items:center;gap:10px;width:100%;height:54px;margin:0 0 16px;padding:7px 8px 7px 15px;background:var(--glass);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border:1px solid var(--glass-border);border-radius:12px;box-shadow:var(--shadow),var(--hairline);transition:border-color .15s,box-shadow .15s}
.home-ai-composer:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft),var(--shadow)}.home-ai-mark{display:grid;place-items:center;color:var(--text-secondary)}.home-ai-mark svg{width:18px;height:18px}.home-ai-composer input{min-width:0;flex:1;height:100%;border:0;outline:0;background:transparent;color:var(--text);font-size:13px}.home-ai-composer input::placeholder{color:var(--dim)}.home-ai-composer button{width:38px;height:38px;display:grid;place-items:center;flex:0 0 auto;border:0;border-radius:9px;background:var(--text);color:var(--ink);cursor:pointer}.home-ai-composer button svg{width:17px;height:17px}
.home-sync-state{display:flex;align-items:flex-start;gap:10px;width:100%;min-height:44px;margin:0 0 16px;padding:11px 14px;
  border:1px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text-secondary)}
.home-sync-state[hidden]{display:none}.home-sync-state.running{border-color:var(--border-strong)}
.home-sync-state.partial{border-color:rgba(224,168,78,.5)}.home-sync-state.error{border-color:rgba(230,107,107,.55)}
.home-sync-mark{width:24px;height:24px;display:grid;place-items:center;flex:0 0 auto;color:var(--cool)}
.home-sync-state.partial .home-sync-mark{color:var(--warm)}.home-sync-state.error .home-sync-mark{color:var(--bad)}
.home-sync-mark svg{width:16px;height:16px}.home-sync-copy{min-width:0}.home-sync-copy strong{display:block;font-size:12.5px;color:var(--tx);font-weight:600}
.home-sync-copy span{display:block;margin-top:2px;font-size:11.5px;color:var(--mut);word-break:break-word}
.home-dashboard{display:grid;grid-template-columns:minmax(0,1.65fr) minmax(270px,.85fr);gap:16px;align-items:start}
.home-panel{min-width:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px}
.home-panel-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:15px}
.home-panel-title h2{font-size:15px;line-height:1.35;color:var(--text);font-weight:650}.home-panel-title p{font-size:11.5px;color:var(--text-secondary);margin-top:3px}
.home-panel-link{flex:0 0 auto;border:0;background:transparent;color:var(--accent);font-size:12px;cursor:pointer;padding:2px 0}
.home-metrics{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
.home-metric{min-height:70px;padding:11px 12px;border-radius:9px;background:var(--surface-subtle);border:1px solid var(--border)}
.home-metric b{display:block;font-size:22px;line-height:1.15;color:var(--text);font-weight:650}.home-metric span{display:block;margin-top:5px;font-size:11px;color:var(--text-secondary)}
.home-source-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;min-height:28px;margin-top:13px}
.home-source-chip{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--border);background:var(--surface-subtle);border-radius:999px;padding:4px 8px;font-size:11.5px;color:var(--text-secondary)}
.home-source-chip b{color:var(--text);font-weight:600}.home-muted{font-size:12px;color:var(--text-secondary)}
.home-report-state{display:flex;align-items:flex-start;gap:10px;padding:12px;background:var(--surface-subtle);border:1px solid var(--border);border-radius:10px}
.home-report-state .status-dot{margin-top:6px;flex:0 0 auto}.home-report-copy{min-width:0}.home-report-copy strong{display:block;font-size:12.5px;color:var(--text);font-weight:600}.home-report-copy span{display:block;margin-top:3px;font-size:11.5px;color:var(--text-secondary);line-height:1.55}
.home-report-action{width:100%;display:flex;align-items:center;justify-content:center;margin-top:12px}
.home-recent{grid-column:1;min-height:270px}.home-workspace{grid-column:2;min-height:270px}
.home-recent #recent{min-height:168px}.home-recent .card{margin:0;border:0;border-top:1px solid var(--border);border-radius:0;padding:11px 2px;background:transparent;box-shadow:none;transform:none}
.home-recent .card:first-child{border-top:0;padding-top:2px}.home-recent .card:hover{background:var(--surface-subtle);border-color:var(--border);transform:none}
.home-status-list{display:grid}.home-status-row{display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:39px;border-top:1px solid var(--border);font-size:12px}
.home-status-row:first-child{border-top:0}.home-status-label{display:flex;align-items:center;gap:8px;color:var(--text-secondary)}.home-status-row b{font-weight:550;color:var(--text);text-align:right}
.home-quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:15px;padding-top:15px;border-top:1px solid var(--border)}
.home-quick-actions .act{display:flex;align-items:center;justify-content:center;gap:7px;min-width:0}.home-quick-actions svg{width:15px;height:15px}
.home-error{display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:86px;padding:14px;border:1px dashed var(--border-strong);border-radius:10px;color:var(--text-secondary);font-size:12px}
.home-skeleton{position:relative;overflow:hidden;color:transparent!important;background:var(--surface-subtle)!important;border-radius:7px}
.home-skeleton:after{content:"";position:absolute;inset:0;transform:translateX(-100%);background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);animation:home-shimmer 1.2s infinite}
@keyframes home-shimmer{to{transform:translateX(100%)}}
.ledger-head{width:100%;max-width:var(--page-track);margin:18px auto 20px}.ledger-head h1{font-size:24px;line-height:1.3;color:var(--tx);font-weight:700}
.ledger-head p{margin-top:5px;font-size:13px;color:var(--mut)}
.ledger-tools{width:100%;max-width:var(--page-track);margin:0 auto}.ledger-tools .spot{max-width:none;margin:0 0 10px}
.ledger-tools .bar{margin:0 0 14px}.ledger-result-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:18px 0 8px;scroll-margin-top:82px}
.ledger-result-head h2{font-size:12.5px;color:var(--mut);font-weight:600;letter-spacing:.06em}.ledger-result-meta{display:flex;align-items:center;justify-content:flex-end;gap:12px;color:var(--dim);font-size:11.5px}.ledger-page-size{display:flex;align-items:center;gap:6px;white-space:nowrap}.ledger-page-size select{height:30px;min-width:64px;padding:3px 24px 3px 8px;background:var(--panel);border:1px solid var(--line);border-radius:7px;color:var(--tx);font-size:12px}
.ledger-pagination{display:flex;align-items:center;justify-content:center;gap:6px;min-height:38px;margin:18px 0 4px}.ledger-pagination[hidden]{display:flex;visibility:hidden;pointer-events:none}.ledger-page-btn{min-width:34px;height:34px;padding:0 10px;background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--mut);font-size:12px;cursor:pointer}.ledger-page-btn:hover:not(:disabled){border-color:var(--cool);color:var(--tx)}.ledger-page-btn.on{border-color:var(--accent);background:var(--accent-soft);color:var(--tx)}.ledger-page-btn:disabled{opacity:.38}.ledger-page-gap{min-width:20px;text-align:center;color:var(--dim);font-size:12px}
.spot{max-width:660px;margin:34px auto 8px;position:relative}
.spot input{width:100%;background:var(--glass);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border:1px solid var(--glass-border);border-radius:12px;
  color:var(--tx);padding:16px 52px 16px 20px;font-size:16px;outline:none;
  transition:border-color .15s,box-shadow .15s,background .15s;
  box-shadow:var(--shadow),var(--hairline)}
.spot input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft),var(--shadow)}
.spot .kbd{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--dim);
  font-size:11px;border:1px solid var(--line);border-radius:6px;padding:2px 7px;font-family:ui-monospace,monospace}
.subq{text-align:center;color:var(--dim);font-size:12.5px;margin-bottom:26px}
@media(max-width:820px){.home-page-head{align-items:flex-start;flex-direction:column}.home-actions{width:100%;justify-content:flex-start}.home-dashboard{grid-template-columns:1fr}.home-recent,.home-workspace{grid-column:auto}}
@media(max-width:720px){.home-shell{margin-top:8px}.home-actions .act{flex:1;min-width:0}.home-metrics{grid-template-columns:1fr}.ledger-head{margin-top:8px}.ledger-tools .bar{display:grid;grid-template-columns:1fr 1fr}.ledger-tools .bar select{grid-column:1/-1}.ledger-result-head{align-items:flex-start;flex-direction:column}.ledger-result-meta{width:100%;justify-content:space-between}.ledger-pagination{flex-wrap:wrap}}
/* 搜索 */
.bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.bar input,.bar select{height:38px;background:var(--panel);background-color:var(--panel);border:1px solid var(--line);border-radius:8px;
  color:var(--tx);padding:8px 11px;font-size:14px}
.bar input[type=search]{flex:1;min-width:220px}
.hint{color:var(--dim);font-size:12px;margin-bottom:10px}
/* 卡片 */
.card{background:var(--surface);border:1px solid var(--line);
  border-radius:9px;padding:12px 14px;margin-bottom:8px;cursor:pointer;box-shadow:var(--hairline);
  transition:border-color .14s,transform .14s,background .14s,box-shadow .14s}
.card:hover{border-color:var(--border-strong);transform:translateY(-1px);background:var(--surface-raised);box-shadow:0 8px 22px rgba(0,0,0,.22),var(--hairline)}
.card .top{display:flex;gap:8px;align-items:baseline;flex-wrap:wrap;font-size:12px;color:var(--mut)}
.card .top .d{color:var(--warm)}
.card .top .k{border:1px solid var(--line2);border-radius:999px;padding:0 8px;background:rgba(255,255,255,.025)}
.card .sm{font-size:14px;margin-top:3px;word-break:break-all}
.card .sn{font-size:12px;color:var(--dim);margin-top:3px}
.card .tp{font-size:11px;color:var(--cool);margin-top:3px}
.gh{font-size:12px;color:var(--warm);margin:16px 0 8px;letter-spacing:.08em;text-transform:uppercase}
/* 主题图 */
#tgraph{background:var(--panel3);border:1px solid var(--line);
  border-radius:10px;overflow-x:auto;margin-bottom:16px;padding:10px 6px;box-shadow:none}
#tgraph svg{display:block}
.gnode{cursor:pointer}
.gnode rect{stroke-width:1.2;rx:16;transition:stroke .12s,stroke-width .12s,filter .12s,fill-opacity .12s}
.gnode:hover rect{stroke:var(--cool);filter:brightness(1.15)}
.gnode.on rect{stroke:var(--warm);stroke-width:1.8}
.gnode text{fill:var(--tx);font-size:13px;font-family:system-ui,sans-serif;font-weight:500}
.gnode .cnt{fill:var(--ink);font-size:10.5px;font-weight:700;font-family:ui-monospace,monospace}
.gnode.on text{fill:var(--warm)}
.gedge{fill:none;stroke:#333d4b;stroke-width:1.5;opacity:.85}
.gedge.hl{stroke:var(--cool);stroke-width:2.4;opacity:1}
.loose{color:var(--dim);font-size:12px;margin:-6px 0 14px}
.loose b{color:var(--mut);font-weight:500;cursor:pointer}
.loose b:hover{color:var(--warm)}
/* 日历 */
.cols{display:grid;grid-template-columns:320px 1fr;gap:20px}
@media(max-width:800px){.cols{grid-template-columns:1fr}}
.cal{background:var(--surface);border:1px solid var(--line);
  border-radius:10px;padding:12px 14px;margin-bottom:12px;box-shadow:none}
.cal .mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal .mh span{font-size:14px;color:var(--tx);font-weight:600;letter-spacing:.04em}
.cal .mh button{background:var(--panel2);border:1px solid var(--line);border-radius:8px;
  color:var(--mut);width:30px;height:28px;cursor:pointer;font-size:14px}
.cal .mh button:hover:not(:disabled){color:var(--warm);border-color:var(--warm)}
.cal .mh button:disabled{opacity:.3;cursor:default}
.cell{aspect-ratio:1;font-size:13px}
.cal .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal .wd{font-size:10px;color:var(--dim);text-align:center;padding-bottom:2px}
.cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:7px;
  font-size:12px;color:var(--dim);position:relative}
.cell.has{cursor:pointer;color:var(--tx)}

/* 桌面 App:macOS 风格纵向导航与单一内容滚动区。Web 端保留横向导航。 */
html[data-surface="desktop"],html[data-surface="desktop"] body{height:100%;overflow:hidden}
html[data-surface="desktop"] body{background:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Segoe UI",sans-serif;font-weight:400}
html[data-surface="desktop"] .wrap{display:grid;grid-template-columns:216px minmax(0,1fr);width:100%;max-width:none;min-height:100%;height:100%;margin:0;padding:0}
html[data-surface="desktop"] header{position:relative;top:auto;z-index:6;display:flex;align-items:stretch;flex-direction:column;gap:0;height:100vh;margin:0;padding:47px 10px 10px;background:var(--surface);border-right:1px solid var(--border);backdrop-filter:none;-webkit-backdrop-filter:none}
html[data-surface="desktop"] header:after{display:none}
html[data-surface="desktop"] .brand{height:38px;padding:0 9px;gap:9px;flex:0 0 auto}

html[data-surface="desktop"] .brand .loom-mark-board{fill:#FBFBF7;stroke:#D6E2E4}

html[data-surface="desktop"] .brand .loom-mark-warp{fill:#009FDF}
html[data-surface="desktop"] .brand-copy{display:flex;align-items:center}
html[data-surface="desktop"] header .nm{font-size:15px;font-weight:680;letter-spacing:-.01em;background:none;color:var(--text)}
html[data-surface="desktop"] .brand-subtitle{display:none}
html[data-surface="desktop"] nav{display:flex;flex:1;min-height:0;flex-direction:column;gap:0;width:100%;margin:10px 0 0;padding:0;background:transparent;border:0;border-radius:0;box-shadow:none}
html[data-surface="desktop"] .nav-group{display:flex;flex-direction:column;gap:2px;width:100%}
html[data-surface="desktop"] .nav-section{display:block;padding:0 10px 5px;color:var(--dim);font-size:9.5px;font-weight:650;letter-spacing:.09em;text-transform:uppercase}
html[data-surface="desktop"] nav button{display:flex;align-items:center;gap:9px;width:100%;height:36px;min-height:36px;padding:0 10px;border:0;border-radius:8px;text-align:left;color:var(--text-secondary);font-size:12.5px;font-weight:500}
html[data-surface="desktop"] nav button:hover{color:var(--text);background:var(--surface-subtle)}
html[data-surface="desktop"] nav button.on{color:var(--text);background:var(--accent-soft);border:0;box-shadow:none}
html[data-surface="desktop"] nav button.on .nav-icon{color:var(--accent)}
html[data-surface="desktop"] .nav-bottom{display:flex;flex-direction:column;gap:3px;width:100%;margin-top:auto;padding-top:9px;border-top:1px solid var(--border)}
html[data-surface="desktop"] .web-settings{display:none}
html[data-surface="desktop"] #themebtn{display:none}
.nav-icon{display:none;width:17px;height:17px;flex:0 0 auto}.nav-icon svg{display:block;width:17px;height:17px}
html[data-surface="desktop"] .nav-icon{display:grid;place-items:center}
html[data-surface="desktop"] main{height:100vh;min-height:0;overflow-y:auto;overscroll-behavior-y:contain;background:var(--ink);scrollbar-gutter:stable}
html[data-surface="desktop"] .view{width:100%;max-width:1080px;min-height:100%;margin:0 auto;padding:42px 30px 72px}
html[data-surface="desktop"] .home-shell,html[data-surface="desktop"] .ledger-head,html[data-surface="desktop"] .ledger-tools{max-width:none;margin-top:0}
html[data-surface="desktop"] .admin-shell{display:block}

html[data-surface="desktop"] .admin-tabs{position:static;display:flex;flex-direction:row;gap:2px;width:max-content;max-width:100%;margin-bottom:18px;padding:3px;overflow-x:auto;border-radius:9px;background:var(--surface-subtle)}
html[data-surface="desktop"] .admin-tabs button{height:32px;padding:0 12px;text-align:center;border-radius:7px;font-size:12px}
html[data-surface="desktop"] .admin-tabs button.on{background:var(--surface);box-shadow:0 1px 3px rgba(0,0,0,.13)}
html[data-surface="desktop"] .drawer-backdrop{inset:0 0 0 216px}
html[data-surface="desktop"] #drawer{top:0;height:100vh;padding-top:48px}
html[data-surface="desktop"] .card:hover,html[data-surface="desktop"] .act:active{transform:none}
html[data-surface="desktop"] .home-panel,html[data-surface="desktop"] .panel,html[data-surface="desktop"] .report-card{box-shadow:none}

<script>
const BOOT=window.__LOOM_BOOT__||{desktop:false,theme:'system',language:'system'};
const LANGUAGE_PREF=BOOT.language;
const SYSTEM_LANG=(navigator.language||'zh').toLowerCase().startsWith('zh')?'zh':'en';
const LANG=LANGUAGE_PREF==='system'?SYSTEM_LANG:LANGUAGE_PREF;
const THEME_PREF=BOOT.theme;
const T=(zh,en)=>LANG==='en'?en:zh;
const $=s=>document.querySelector(s);
async function jsonResponse(r){
  const raw=await r.text();let data={};
  if(raw){try{data=JSON.parse(raw)}catch(e){
    const err=new Error(T(`服务返回了无法解析的响应 (HTTP ${r.status})`,`The service returned an invalid response (HTTP ${r.status})`));err.status=r.status;err.cause=e;throw err}}
  if(!r.ok){
    const detail=data.message||data.error||r.statusText||T('请求失败','Request failed');
    const err=new Error(`${detail} (HTTP ${r.status})`);err.status=r.status;err.payload=data;throw err
  }
  return data
}
async function api(p,o={}){
  const q=new URLSearchParams(o).toString();
  const r=await fetch(p+(q?'?'+q:''),{headers:{'X-Loom-Token':sessionStorage.getItem('loom_admin_token')||''}});
  return jsonResponse(r)
}
const bootParams=new URLSearchParams(location.search),bootToken=bootParams.get('token');
if(bootToken){sessionStorage.setItem('loom_admin_token',bootToken);bootParams.delete('token');const safeQuery=bootParams.toString();history.replaceState(null,'',location.pathname+(safeQuery?'?'+safeQuery:'')+location.hash)}
const post=(p,o)=>fetch(p,{method:'POST',headers:{'Content-Type':'application/json',
  'X-Loom-Token':sessionStorage.getItem('loom_admin_token')||''},body:JSON.stringify(o)}).then(async r=>{
    const data=await r.json();
    if(r.status===403&&!data.message)data.message=T('桌面会话已失效，请重新启动 Loom','Desktop session expired; restart Loom');
    return data});
document.addEventListener('DOMContentLoaded',()=>{
  document.querySelectorAll('[data-t]').forEach(el=>{const[z,e]=el.dataset.t.split('|');el.textContent=T(z,e)});
  document.querySelectorAll('[data-nav-icon]').forEach(el=>{el.innerHTML=icon(el.dataset.navIcon)});
  document.querySelectorAll('[data-inline-icon]').forEach(el=>{el.innerHTML=icon(el.dataset.inlineIcon)});
  document.querySelectorAll('[data-placeholder]').forEach(el=>{const[z,e]=el.dataset.placeholder.split('|');el.placeholder=T(z,e)});
  document.querySelectorAll('[data-label]').forEach(el=>{const[z,e]=el.dataset.label.split('|'),value=T(z,e);el.setAttribute('aria-label',value);el.title=value});
  $('#q').placeholder=T('搜你做过的任何事…(中文子串可用)','Search anything you did… (CJK substring OK)');
  $('#home-sync-icon').innerHTML=icon('sync');
  $('#ledger-pagination').setAttribute('aria-label',T('台账分页','Ledger pagination'));
  const languageSelect=$('#language-select');languageSelect.value=LANGUAGE_PREF;languageSelect.onchange=()=>{const value=languageSelect.value;if(value==='system')localStorage.removeItem('loom_lang');else localStorage.setItem('loom_lang',value);location.reload()};
  const themeSelect=$('#theme-select');themeSelect.value=THEME_PREF;themeSelect.onchange=()=>{const value=themeSelect.value;if(value==='system')localStorage.removeItem('loom_theme');else localStorage.setItem('loom_theme',value);document.documentElement.dataset.theme=value==='system'?(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'):value;paintTheme()};
  const tb=$('#themebtn');
  const paintTheme=()=>{const light=document.documentElement.dataset.theme==='light';tb.innerHTML=icon(light?'sun':'moon');tb.title=T(light?'切换到暗色':'切换到亮色',light?'Switch to dark':'Switch to light');document.querySelector('meta[name=theme-color]').content=light?'#F3F6F4':'#0E1117'};
  paintTheme();
  tb.onclick=()=>{const next=document.documentElement.dataset.theme==='light'?'dark':'light';document.documentElement.dataset.theme=next;localStorage.setItem('loom_theme',next);paintTheme()};
});
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const KIND={session:'💬',commit:'💻',doc:'📄',note:'📎',report:'📋',requirement:'📥'};
function card(e){return `<div class="card" onclick="detail('${esc(e.id).replace(/'/g,"\\'")}')">
  <div class="top"><span class="d">${esc(e.date)}</span><span>${esc(e.project)}</span>
  <span class="k">${KIND[e.kind]||''} ${esc(e.kind)}</span><span>${esc(e.tool)}</span></div>
  <div class="sm">${esc(e.summary)}</div>
  ${e.snip?`<div class="sn">↳ ${esc(e.snip)}</div>`:''}
  ${e.topics&&e.topics.length?`<div class="tp">🧵 ${e.topics.map(esc).join(' · ')}</div>`:''}</div>`}
function groups(g){const order=['report','session','commit','doc','note','requirement'];
  const keys=[...new Set([...order.filter(k=>g[k]),...Object.keys(g)])];
  return keys.map(k=>`<div class="gh">${KIND[k]||''} ${esc(k)} (${g[k].length})</div>`+g[k].map(card).join('')).join('')||`<div class="empty">${T('空','Empty')}</div>`}

// 视图切换
const ROUTES={home:'home',ledger:'ledger',search:'ledger',topics:'topics',calendar:'calendar',days:'calendar',admin:'admin'};
const VIEW_TITLES={home:['首页','Home'],ledger:['台账','Ledger'],topics:['主题','Topics'],calendar:['日历','Calendar'],admin:['设置','Settings']};
function viewFromHash(){const h=(location.hash||'#home').slice(1);return ROUTES[h]||'home'}
function setViewTitle(v){const [zh,en]=VIEW_TITLES[v]||VIEW_TITLES.home;document.title=`loom · ${T(zh,en)}`}
function showView(v,pushUrl=false){
  v=ROUTES[v]||'home';
  const current=document.querySelector('.view.on');
  if(current&&current.id!=='v-'+v)window.scrollTo(0,0)
  drawer(false,false);
  document.querySelectorAll('nav button[data-v]').forEach(b=>{
    const on=b.dataset.v===v;
    b.classList.toggle('on',on);
    if(on)b.setAttribute('aria-current','page');else b.removeAttribute('aria-current');
  });
  document.querySelectorAll('.view').forEach(x=>x.classList.toggle('on',x.id==='v-'+v));
  setViewTitle(v);
  if(pushUrl&&location.hash!=='#'+v)history.pushState(null,'','#'+v);
  if(v==='ledger'&&!window._l){window._l=1;doSearch()}
  if(v==='topics'&&!window._t){window._t=1;loadTopics()}
  if(v==='calendar'&&!window._d){window._d=1;loadDays()}
  if(v==='admin'){
    if(!window._a){window._a=1;loadAdmin()}
  }
}
document.querySelectorAll('nav button[data-v]').forEach(b=>b.onclick=()=>showView(b.dataset.v,true));
window.addEventListener('popstate',()=>showView(viewFromHash(),false));

// ---- 台账搜索 + 首页 Dashboard ----
let deb,SEARCH_SEQ=0,LEDGER_PAGE=1,LEDGER_PAGE_SIZE=20;
let HOME_STATS=null;
function ledgerHasFilters(){return !!($('#q').value.trim()||$('#f-tool').value||$('#f-since').value||$('#f-until').value)}
function ledgerPageItems(page,pages){
  const keep=new Set([1,pages]);for(let p=page-2;p<=page+2;p++)if(p>=1&&p<=pages)keep.add(p);
  const nums=[...keep].sort((a,b)=>a-b),items=[];let prev=0;
  for(const p of nums){if(prev&&p-prev>1)items.push('gap');items.push(p);prev=p}return items
}
function renderLedgerPagination(r){
  const root=$('#ledger-pagination'),pages=Math.max(1,Number(r.pages)||1),page=Math.min(pages,Math.max(1,Number(r.page)||1));
  if(!r.total||pages<=1){root.hidden=true;root.innerHTML='';return}
  const buttons=ledgerPageItems(page,pages).map(item=>item==='gap'?`<span class="ledger-page-gap" aria-hidden="true">…</span>`:`<button class="ledger-page-btn${item===page?' on':''}" onclick="ledgerGoPage(${item})" ${item===page?'aria-current="page"':''} aria-label="${T('第 '+item+' 页','Page '+item)}">${item}</button>`).join('');
  root.innerHTML=`<button class="ledger-page-btn" onclick="ledgerGoPage(${page-1})" ${page<=1?'disabled':''}>${T('上一页','Previous')}</button>${buttons}<button class="ledger-page-btn" onclick="ledgerGoPage(${page+1})" ${page>=pages?'disabled':''}>${T('下一页','Next')}</button>`;
  root.hidden=false
}
function ledgerGoPage(page){clearTimeout(deb);LEDGER_PAGE=Math.max(1,page);doSearch(false);$('#ledger-result-title').scrollIntoView({block:'start'})}
async function doSearch(resetPage=false){
  if(resetPage)LEDGER_PAGE=1;
  const seq=++SEARCH_SEQ;
  const q=$('#q').value.trim(),filtered=ledgerHasFilters();
  $('#ledger-result-title').textContent=q?T('搜索结果','Search results'):filtered?T('筛选结果','Filtered records'):T('最近记录','Recent records');
  $('#ledger-result-count').textContent=T('正在搜索…','Searching…');
  const pager=$('#ledger-pagination');pager.setAttribute('aria-busy','true');
  const since=$('#f-since').value,until=$('#f-until').value,result=$('#r-search');result.setAttribute('aria-busy','true');
  if(since&&until&&since>until){
    $('#ledger-result-count').textContent=T('日期范围有误','Invalid date range');
    result.innerHTML=`<div class="empty">${T('起始日期不能晚于截止日期','Start date cannot be after end date')}</div>`;result.setAttribute('aria-busy','false');pager.setAttribute('aria-busy','false');return
  }
  try{
    const r=await api('/api/search',{q,tool:$('#f-tool').value,since,until,page:LEDGER_PAGE,page_size:LEDGER_PAGE_SIZE});
    if(seq!==SEARCH_SEQ)return;
    LEDGER_PAGE=r.page||1;LEDGER_PAGE_SIZE=r.page_size||LEDGER_PAGE_SIZE;$('#f-page-size').value=String(LEDGER_PAGE_SIZE);
    const pages=Math.max(1,r.pages||1);
    $('#ledger-result-count').textContent=r.total?T(`共 ${r.total} 条 · 第 ${LEDGER_PAGE}/${pages} 页`,`${r.total} records · Page ${LEDGER_PAGE} of ${pages}`):T('0 条','0 records');
    result.innerHTML=r.hits.map(card).join('')||`<div class="empty">${T(filtered?'无符合条件的记录':'暂无记录',filtered?'No matching records':'No records yet')}</div>`;
    renderLedgerPagination(r)
  }catch(e){
    if(seq!==SEARCH_SEQ)return;
    $('#ledger-result-count').textContent=T('加载失败','Could not load');
    result.innerHTML=`<div class="empty">${T('记录暂时无法载入，请稍后重试','Records could not be loaded. Please try again.')}</div>`
  }finally{if(seq===SEARCH_SEQ){result.setAttribute('aria-busy','false');pager.setAttribute('aria-busy','false')}}
}
$('#q').addEventListener('input',()=>{clearTimeout(deb);deb=setTimeout(()=>doSearch(true),280)});
['#f-tool','#f-since','#f-until'].forEach(s=>$(s).onchange=()=>{clearTimeout(deb);doSearch(true)});
$('#f-page-size').onchange=()=>{clearTimeout(deb);LEDGER_PAGE_SIZE=Number($('#f-page-size').value)||20;doSearch(true)};
['git','claude','codex','cursor','codebuddy','pi','opencode','feishu','docs','notes','日报'].forEach(t=>{
  const o=document.createElement('option');o.value=t;o.textContent=t;$('#f-tool').appendChild(o)});
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){e.preventDefault();showView('ledger',true);$('#q').focus({preventScroll:false})}
  if(e.key==='Escape'&&document.activeElement===$('#q')){clearTimeout(deb);$('#q').value='';doSearch(true)}});

function homeMetric(value,label){return `<div class="home-metric"><b>${Number(value)||0}</b><span>${esc(label)}</span></div>`}
function homeStatusRow(label,value,state=''){return `<div class="home-status-row"><span class="home-status-label"><i class="status-dot ${state}"></i><span>${esc(label)}</span></span><b>${esc(value)}</b></div>`}
function formatHomeDate(day){const d=new Date(day+'T12:00:00');return LANG==='en'?new Intl.DateTimeFormat('en',{weekday:'long',month:'long',day:'numeric'}).format(d):new Intl.DateTimeFormat('zh-CN',{month:'long',day:'numeric',weekday:'long'}).format(d)}
function renderHomeCore(h){
  HOME_STATS=h;const n=Number(h.today_entries)||0;
  $('#home-date-label').textContent=T(`今天 · ${formatHomeDate(h.today)}`,`Today · ${formatHomeDate(h.today)}`);
  $('#home-summary').textContent=n?T(`本地已整理 ${n} 条工作记录，来自 ${Object.keys(h.source_counts||{}).length} 个来源。`,`${n} local work records captured from ${Object.keys(h.source_counts||{}).length} sources.`):T('今天还没有新记录；同步后，这里会显示真实工作进展。','No new records today. Sync to bring your real work into this view.');
  $('#home-today-metrics').innerHTML=homeMetric(n,T('已采集','Captured'))+homeMetric(h.summarized,T('已摘要','Summarized'))+homeMetric(h.classified,T('已归类','Classified'));
  const sources=Object.entries(h.source_counts||{});
  $('#home-source-row').innerHTML=sources.length?sources.map(([name,count])=>`<span class="home-source-chip"><span>${esc(sourceLabel(name))}</span><b>${Number(count)||0}</b></span>`).join(''):`<span class="home-muted">${T('同步记录后会按来源展示今天的工作。','Sources appear here after records are synced.')}</span>`;
  $('#recent').innerHTML=(h.recent||[]).map(card).join('')||`<div class="home-error"><span>${T('还没有可展示的记录。先在“设置 → 数据来源”完成配置，再同步一次。','No records yet. Configure sources in Settings, then run your first sync.')}</span><button class="act" onclick="openSettingsPane('sources')">${T('配置来源','Configure sources')}</button></div>`;
  $('#home-recent-caption').textContent=n?T(`今天最近 ${Math.min(6,(h.recent||[]).length)} 条`,`Latest ${Math.min(6,(h.recent||[]).length)} from today`):T('今天为空，显示整个台账的最近记录','Nothing today; showing the latest ledger records');
  let statusRows=homeStatusRow(T('本地台账','Local ledger'),T(`${h.total_entries||0} 条记录`,`${h.total_entries||0} records`))+
    homeStatusRow(T('数据来源','Data sources'),`${h.active_sources||0} / ${h.available_sources||0}`,(h.active_sources||0)?'':'warn');
  $('#home-workspace-status').innerHTML=statusRows;
}
function renderHomeCoreError(){
  $('#home-summary').textContent=T('本地记录暂时无法载入，请重试。','Local records could not be loaded. Try again.');
  $('#home-today-metrics').innerHTML=`<div class="home-error" style="grid-column:1/-1"><span>${T('首页数据加载失败，但台账和设置仍可单独打开。','Home data failed to load; Ledger and Settings remain available.')}</span><button class="act" onclick="loadDash()">${T('重试','Retry')}</button></div>`;
  $('#home-source-row').innerHTML='';$('#recent').innerHTML=`<div class="home-error"><span>${T('最近记录暂时不可用。','Recent records are temporarily unavailable.')}</span><button class="act" onclick="loadDash()">${T('重试','Retry')}</button></div>`
}
async function loadDash(){
  try{renderHomeCore(await api('/api/home',{}))}catch(e){renderHomeCoreError()}
}
function focusLedgerSearch(){showView('ledger',true);requestAnimationFrame(()=>$('#q').focus())}
function openSettingsPane(name){showView('admin',true);showAdminPane(name)}
function goToday(){showView('calendar',true);const day=localISODate();setTimeout(()=>loadDay(day),window._d?0:250)}
function goDay(ds){showView('calendar',true);
  setTimeout(()=>loadDay(ds),window._d?0:400)}

// ---- 主题:横向层级 DAG 图 ----
const NW=n=>{let w=14;for(const ch of n.name)w+=ch.charCodeAt(0)>255?14:8;
  return w+String(n.count).length*7.5+(n.multi?16:0)+22}
async function loadTopics(){
  const r=await api('/api/topics',{});
  const nodes=r.nodes,edges=r.edges,byN={};nodes.forEach(n=>byN[n.name]=n);
  if(!nodes.length){
    $('#tgraph').innerHTML=`<div class="empty">${T('还没有主题。同步记录并完成归类后，主题关系会显示在这里。','No topics yet. Sync and classify records to build your topic map.')}</div>`;
    $('#tloose').textContent='';$('#tmembers').innerHTML=`<div class="empty">${T('暂无可浏览的主题记录','No topic records to browse')}</div>`;return
  }
  const parents={};edges.forEach(([p,c])=>{(parents[c]=parents[c]||[]).push(p)});
  // 深度 = 最长父链(带环保护)
  const depth={};const dep=(n,seen)=>{if(depth[n]!=null)return depth[n];
    if(seen.has(n))return 0;seen.add(n);
    const ps=(parents[n]||[]).filter(p=>byN[p]);
    return depth[n]=ps.length?1+Math.max(...ps.map(p=>dep(p,seen))):0};
  nodes.forEach(n=>dep(n.name,new Set()));
  const cols=[];nodes.forEach(n=>{(cols[depth[n.name]]=cols[depth[n.name]]||[]).push(n)});
  // 每列先按父的均值 y 排(减少交叉),父未定时按上卷数
  const pos={};const rowH=48,padY=14;
  const colX=[];let x=12;
  cols.forEach((col,ci)=>{colX[ci]=x;x+=Math.max(...col.map(NW))+72});
  cols.forEach((col,ci)=>{
    col.sort((a,b)=>{const ay=avgY(a),by=avgY(b);return ay-by||b.count-a.count});
    col.forEach((n,i)=>pos[n.name]={x:colX[ci],y:padY+i*rowH});
    function avgY(n){const ps=(parents[n.name]||[]).map(p=>pos[p]&&pos[p].y).filter(v=>v!=null);
      return ps.length?ps.reduce((a,b)=>a+b,0)/ps.length:1e9}
  });
  const H=Math.max(...cols.map(c=>c.length))*rowH+padY*2, W=x;
  const maxC=Math.max(...nodes.map(n=>n.count||1));
  let svg=`<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">
    <defs><filter id="sh" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/></filter></defs>`;
  for(const [p,c] of edges){if(!pos[p]||!pos[c])continue;
    const x1=pos[p].x+NW(byN[p]),y1=pos[p].y+16,x2=pos[c].x,y2=pos[c].y+16,mx=(x1+x2)/2;
    svg+=`<path class="gedge" data-e="${esc(p)}|${esc(c)}" d="M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}"/>`}
  for(const n of nodes){const{x,y}=pos[n.name],w=NW(n);
    const heat=Math.min(0.30,0.05+0.25*(n.count/maxC));        // 热力底色:上卷越多越暖
    const root=depth[n.name]===0;
    const cw=String(n.count).length*7.5+12;
    svg+=`<g class="gnode" data-n="${esc(n.name)}" transform="translate(${x},${y})" onclick="pick('${esc(n.name).replace(/'/g,"\\'")}')">
      <rect width="${w}" height="32" fill="rgba(224,168,78,${heat.toFixed(2)})"
        stroke="${root?'#8a6320':'var(--line)'}" filter="url(#sh)"/>
      <text x="13" y="21">${esc(n.name)}${n.multi?' ↺':''}</text>
      <rect x="${w-cw-7}" y="8" width="${cw}" height="16" rx="8" fill="${root?'#E0A84E':'#5AA9A0'}" opacity="0.9"/>
      <text class="cnt" x="${w-cw/2-7}" y="20" text-anchor="middle">${n.count}</text></g>`}
  svg+='</svg>';
  $('#tgraph').innerHTML=svg;
  $('#tloose').innerHTML=(r.loose.length?`${T('未建页','No page yet')}:${r.loose.map(t=>`<b onclick="pick('${esc(t)}')">${esc(t)}</b>`).join(' · ')} · `:'')
    +T(`已归类 ${r.total_tagged} 条 · ↺=多父(DAG)`,`${r.total_tagged} classified · ↺=multi-parent (DAG)`);
}
async function pick(name){
  document.querySelectorAll('.gnode').forEach(g=>g.classList.toggle('on',g.dataset.n===name));
  document.querySelectorAll('.gedge').forEach(e=>{const[p,c]=e.dataset.e.split('|');
    e.classList.toggle('hl',p===name||c===name)});

}

let CAL={months:[],cnt:{},idx:0,sel:null};
async function loadDays(){

  CAL.months=[...new Set(r.days.map(d=>d.date.slice(0,7)))].sort();

  }

function ymISO(d){const o=d.getTimezoneOffset()*60000;return new Date(d-o).toISOString().slice(0,10)}
function renderYearMap(){
  const box=$('#yearmap');if(!box)return;
  if(!Object.keys(CAL.cnt).length){box.hidden=true;return}
  box.hidden=false;
  const today=new Date();today.setHours(0,0,0,0);
  const start=new Date(today);start.setDate(start.getDate()-370);   // ~53 周
  start.setDate(start.getDate()-((start.getDay()+6)%7));            // 对齐到周一
  const lvl=c=>c<=0?0:c>=10?4:c>=6?3:c>=3?2:1;
  const mn=LANG==='en'?['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']
    :['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  let cols=[],monthRow=[],cur=new Date(start),total=0,active=0,lastMonth=-1;
  while(cur<=today){
    let colCells='';const firstOfCol=new Date(cur);
    for(let r=0;r<7;r++){
      const ds=ymISO(cur),after=cur>today,c=CAL.cnt[ds]||0;
      if(!after&&c>0){total+=c;active++}
      if(after)colCells+='<div class="ym-cell" style="visibility:hidden"></div>';
      else colCells+=`<div class="ym-cell l${lvl(c)}${c?' has':''}" data-d="${ds}" ${c?`onclick="loadDay('${ds}')"`:''} title="${ds}${c?' · '+c+T(' 条',' entries'):''}"></div>`;
      cur.setDate(cur.getDate()+1);
    }
    cols.push(`<div class="yearmap-col">${colCells}</div>`);
    const m=firstOfCol.getMonth();
    if(m!==lastMonth&&firstOfCol.getDate()<=7){monthRow.push(`<span>${mn[m]}</span>`);lastMonth=m}
    else monthRow.push('<span></span>');
  }
  const dayLabels=(LANG==='en'?['','Mon','','Wed','','Fri','']:['','一','','三','','五','']).map(x=>`<span>${x}</span>`).join('');
  box.innerHTML=`<div class="yearmap-head"><h2>${T('年度活动','Activity')}</h2>`+
    `<small>${T('近一年','Past year')} · ${active}${T(' 天有记录 · 共 ',' active days · ')}${total}${T(' 条','')}</small></div>`+
    `<div class="yearmap-scroll"><div class="yearmap-body">`+
    `<div class="yearmap-days">${dayLabels}</div>`+
    `<div class="yearmap-cols"><div class="yearmap-months">${monthRow.join('')}</div>`+
    `<div class="yearmap-grid">${cols.join('')}</div></div></div></div>`+
    `<div class="yearmap-legend">${T('少','less')} <i class="ym-cell"></i><i class="ym-cell l1"></i><i class="ym-cell l2"></i><i class="ym-cell l3"></i><i class="ym-cell l4"></i> ${T('多','more')}</div>`;
  markSel();
}
function calNav(d){CAL.idx=Math.min(Math.max(CAL.idx+d,0),CAL.months.length-1);renderCal()}
function renderCal(){
  const m=CAL.months[CAL.idx];if(!m)return;
  const heat=c=>c>=10?'h3':c>=4?'h2':c>=1?'h1':'';
  const today=new Date().toISOString().slice(0,10);
  const [y,mo]=m.split('-').map(Number);
  const dow=(new Date(y,mo-1,1).getDay()+6)%7, dim=new Date(y,mo,0).getDate();
  let cells=(LANG==='en'?['Mo','Tu','We','Th','Fr','Sa','Su']:'一二三四五六日'.split('')).map(w=>`<div class="wd">${w}</div>`).join('');
  for(let i=0;i<dow;i++)cells+='<div class="cell"></div>';
  for(let d=1;d<=dim;d++){
    const ds=`${m}-${String(d).padStart(2,'0')}`,c=CAL.cnt[ds]||0;
    cells+=`<div class="cell ${c?'has '+heat(c):''}" data-d="${ds}" ${c?`onclick="loadDay('${ds}')"`:''}
      title="${ds}${c?' · '+c+T(' 条',' entries'):''}" ${ds===today?'style="box-shadow:inset 0 0 0 1px var(--cool)"':''}>${d}</div>`}
  const mTotal=Object.keys(CAL.cnt).filter(d=>d.startsWith(m)).reduce((a,d)=>a+CAL.cnt[d],0);
  $('#cals').innerHTML=`<div class="cal"><div class="mh">
      <button onclick="calNav(-1)" ${CAL.idx===0?'disabled':''}>‹</button>
      <span>${T(y+' 年 '+mo+' 月',['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][mo-1]+' '+y)} <small style="color:var(--dim);font-weight:400">${mTotal}${T(' 条','')}</small></span>
      <button onclick="calNav(1)" ${CAL.idx===CAL.months.length-1?'disabled':''}>›</button></div>
    <div class="grid">${cells}</div>
    <div class="legend" style="margin-top:10px">${T('少','less')} <i class="cell h1"></i><i class="cell h2"></i><i class="cell h3"></i> ${T('多','more')}</div></div>`;
  markSel();
}
function markSel(){document.querySelectorAll('.cell,.ym-cell').forEach(x=>x.classList.toggle('on',!!x.dataset.d&&x.dataset.d===CAL.sel))}
async function loadDay(date){
  CAL.sel=date;

async function adminAction(payload,confirmWord,options={}){
  const home=options.surface==='home';
  if(confirmWord&&!confirm(T(`确认执行 ${confirmWord}?`,`Confirm ${confirmWord}?`)))return;
  if(confirmWord)payload.confirm=confirmWord;
  if(!home){
    setBusy(true);
    if(payload.action==='sync')renderSyncResult(null);
    setLog(T('执行中…','Running…'));
  }
  try{
    let r=await post('/api/admin/action',payload);
    if(!r.ok&&r.needs_confirm&&confirm(r.message)){payload.confirm=r.needs_confirm;r=await post('/api/admin/action',payload)}
    if(r.refresh||r.overview){
      if(home){ADMIN=null;CONSOLE=null;RESOURCES=null;window._a=0}else await loadAdmin()
    }
    if(!home){
      if(payload.action==='sync')renderSyncResult(r.sync||{status:r.status||(r.ok?'success':'error'),sources:[]});
      if(payload.action==='vault_backup')renderBackupResult(r.backup);
      const status=r.status||(r.ok?'success':'error'),prefix=status==='partial'?'⚠ ':status==='success'?'✓ ':'✗ ';
      setLog(prefix+(r.message||'')+(r.output?'\n\n'+r.output:''));
    }
    return r
  }catch(e){
    const message=e&&e.message?e.message:String(e);
    if(!home){
      if(payload.action==='sync')renderSyncResult({status:'error',sources:[]});
      setLog('✗ '+message);
    }
    return {ok:false,status:'error',message,sync:payload.action==='sync'?{status:'error',sources:[]}:undefined}
  }finally{
    if(!home)setBusy(false);
  }
}
function homeSyncDetail(sync,message){

  rows.forEach(r=>counts[r.status]=(counts[r.status]||0)+1);
  const records=rows.reduce((n,r)=>n+(Number(r.count)||0),0),parts=[];
  if(counts.success)parts.push(`${counts.success}${T(' 个来源成功',' sources succeeded')}`);
  if(counts.partial)parts.push(`${counts.partial}${T(' 个来源部分完成',' sources partial')}`);
  if(counts.error)parts.push(`${counts.error}${T(' 个来源失败',' sources failed')}`);
  if(records)parts.push(`${records}${T(' 条新记录',' records')}`);
  if(sync.backup)parts.push(T(sync.backup.ok?'备份完成':'备份失败',sync.backup.ok?'backup completed':'backup failed'));
  return parts.join(' · ')||message||T('没有可执行的数据来源','No source was available to run')
}

    setHomeSyncState(status,sync,r.message);
    if(status!=='error'){
      try{await loadDash()}catch(e){$('#home-sync-detail').textContent+=` · ${T('首页数据暂未刷新','Home data has not refreshed yet')}`}
    }
  }catch(e){setHomeSyncState('error',{sources:[]},e&&e.message?e.message:String(e))}
  finally{btn.disabled=false}
}
function runSync(){adminAction({action:'sync',source:$('#sync-source').value,since:$('#sync-since').value,
  backup:$('#sync-backup').checked,push:$('#sync-push').checked},$('#sync-push').checked?'push':null)}
function vaultBackup(push){adminAction({action:'vault_backup',push},push?'push':null)}
let ACTIVE_SOURCE_CONFIG='';
function resetSourcePickerState(){
  ['repo-path','generic-source-path'].forEach(id=>{const input=$('#'+id);if(input){input.readOnly=false;if(id==='repo-path')input.value=''}})
}
function repoAdd(){adminAction({action:'repo_add',path:$('#repo-path').value})}
function repoRemove(path){adminAction({action:'repo_remove',path},'remove')}
function identityAdd(){adminAction({action:'identity_add',value:$('#identity-value').value})}
function identityRemove(value){adminAction({action:'identity_remove',value},'remove')}
function sourceSet(name,enabled){adminAction({action:'source_set',name,enabled})}
function sourcePathSet(name){adminAction({action:'source_path_set',name,path:$('#generic-source-path').value})}
function ownerSet(){adminAction({action:'owner_set',name:$('#owner-name').value,feishu_name:$('#owner-feishu').value})}
function feishuAdd(){adminAction({action:'feishu_add',name:$('#fs-name').value,url:$('#fs-url').value,table_id:$('#fs-table').value})}
function feishuRemove(name){adminAction({action:'feishu_remove',name},'remove')}

function localISODate(){const d=new Date(),offset=d.getTimezoneOffset()*60000;return new Date(d-offset).toISOString().slice(0,10)}

// ---- 详情 ----
let lastFocus=null;
function drawer(on,restoreFocus=true){
  const d=$('#drawer'),backdrop=$('#drawer-backdrop');
  const was=d.classList.contains('on');
  if(on)lastFocus=document.activeElement;
  d.classList.toggle('on',!!on);
  backdrop.classList.toggle('on',!!on);
  backdrop.setAttribute('aria-hidden',on?'false':'true');
  d.setAttribute('aria-hidden',on?'false':'true');
  if(on)d.focus({preventScroll:true});else if(was&&restoreFocus&&lastFocus&&lastFocus.focus)lastFocus.focus({preventScroll:true});
  if(!on)lastFocus=null;
}
async function detail(id){const e=await api('/api/entry',{id});
  const d=e.detail||{};
  let rows=`<h3>${esc(e.summary)}</h3>
  <div class="meta">${esc(e.date)} · ${esc(e.project)} · ${esc(e.tool)}/${esc(e.kind)}
  ${e.topics&&e.topics.length?` · 🧵 ${e.topics.map(esc).join(', ')}`:''}</div>
  <div class="meta mono">ref: ${esc(e.ref)}</div>`;
  for(const k of ['digest','body','opening','content','work','thinking','plan']){
    if(d[k])rows+=`<div class="gh">${k}</div><pre>${esc(d[k])}</pre>`}
  const rest=Object.fromEntries(Object.entries(d).filter(([k])=>!['digest','body','opening','content','work','thinking','plan'].includes(k)));
  if(Object.keys(rest).length)rows+=`<div class="gh">detail</div><pre>${esc(JSON.stringify(rest,null,1))}</pre>`;
  $('#dctn').innerHTML=rows;drawer(true)}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){drawer(false);closeSourceConfig()}});

showView(viewFromHash(),false);
loadDash();
</script>
