<style>
/* loom web UI — see docs/design.md (Apple-inspired, zero-dep) */
:root{
  --bg:#000000;--bg-elevated:#1C1C1E;--bg-grouped:#2C2C2E;
  --surface:#1C1C1E;--surface-subtle:#2C2C2E;--surface-raised:#3A3A3C;
  --fill:rgba(120,120,128,.24);--fill-strong:rgba(120,120,128,.36);
  --label:#F5F5F7;--secondary:rgba(235,235,245,.62);--tertiary:rgba(235,235,245,.36);
  --separator:rgba(84,84,88,.65);--separator-light:rgba(84,84,88,.36);
  --accent:#5AC8A8;--accent-soft:rgba(90,200,168,.14);--accent-text:#5AC8A8;
  --danger:#FF6961;--warn:#FFD60A;--ok:#32D74B;
  --shadow:0 18px 50px rgba(0,0,0,.45);--shadow-soft:0 1px 0 rgba(255,255,255,.04) inset;
  --material:rgba(28,28,30,.72);--material-thick:rgba(28,28,30,.88);
  --scrim:rgba(0,0,0,.48);
  --ease-out:cubic-bezier(0.32,0.72,0,1);--ease-press:ease-out;
  --r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:20px;
  --nav-h:48px;--header-offset:56px;--space-1:4px;--space-2:8px;--space-3:12px;--space-4:16px;--space-5:20px;--space-6:24px;--space-7:32px;
  --page-track:960px;--hero-track:760px;--reading-track:760px;
  /* legacy aliases used across markup */
  --ink:var(--bg);--panel:var(--surface);--panel2:var(--surface-subtle);--panel3:var(--bg-elevated);
  --line:var(--separator-light);--line2:var(--separator);
  --tx:var(--label);--mut:var(--secondary);--dim:var(--tertiary);
  --warm:#E8C47A;--cool:var(--accent);--blue:#64D2FF;--bad:var(--danger);
  --text:var(--label);--text-secondary:var(--secondary);--border:var(--separator-light);--border-strong:var(--separator);
  color-scheme:dark
}
*{box-sizing:border-box;margin:0;padding:0}
[hidden]:not(.ledger-pagination){display:none!important}
html{background:var(--bg);color-scheme:dark;overflow-y:scroll}
@supports(scrollbar-gutter:stable){html{overflow-y:auto;scrollbar-gutter:stable}}
body{
  min-height:100vh;background:var(--bg);color:var(--label);
  font:400 15px/1.47 -apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",system-ui,sans-serif;
  font-feature-settings:"ss01" 1,"tnum" 1;font-variant-numeric:tabular-nums;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  -webkit-tap-highlight-color:rgba(90,200,168,.16);overscroll-behavior-y:contain;overflow-x:clip;
  letter-spacing:-.005em
}
.mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;letter-spacing:0}
a{color:var(--accent-text);text-decoration:none}
a:hover{text-decoration:underline;text-underline-offset:2px}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}
.skip{position:fixed;left:16px;top:10px;z-index:30;transform:translateY(-160%);
  background:var(--label);color:var(--bg);border-radius:var(--r-sm);
  padding:8px 12px;font-size:13px;font-weight:600;box-shadow:var(--shadow)}
.skip:focus{transform:translateY(0);outline:2px solid var(--accent);outline-offset:2px}
main{display:block;width:100%;min-width:0}
.wrap{width:100%;max-width:calc(var(--page-track) + 48px);margin:0 auto;padding:0 24px 96px}

/* —— Chrome —— */
header{
  position:sticky;top:0;z-index:10;display:grid;
  grid-template-columns:auto minmax(0,1fr) auto;align-items:center;gap:var(--space-3);
  height:var(--header-offset);min-height:var(--header-offset);padding:0;margin:0;
  background:var(--material);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%)
}
header:after{
  content:"";position:absolute;left:50%;bottom:0;width:100vw;height:1px;transform:translateX(-50%);
  background:var(--separator-light);pointer-events:none
}
.hdr-brand{display:flex;align-items:center;gap:10px;min-width:0;flex:0 0 auto}
.hdr-brand svg{width:28px;height:28px;border-radius:7px;display:block;flex:0 0 auto}
.hdr-brand .nm{font-size:17px;font-weight:700;letter-spacing:-.02em;color:var(--label);line-height:1}

/* global search in header — does not navigate */
.hdr-search{
  position:relative;justify-self:center;width:100%;max-width:420px;min-width:0;
  display:flex;align-items:center;height:34px;padding:0 10px 0 34px;
  background:var(--fill);border-radius:10px;
  transition:background 140ms,box-shadow 160ms var(--ease-press)
}
.hdr-search:focus-within{
  background:var(--surface);box-shadow:inset 0 0 0 1.5px var(--accent),0 0 0 3px var(--accent-soft)
}
.hdr-search.is-open{border-radius:10px 10px 0 0}
.hdr-search-ico{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  width:16px;height:16px;color:var(--tertiary);display:grid;place-items:center;pointer-events:none
}
.hdr-search-ico svg{width:15px;height:15px;display:block}
.hdr-search input{
  flex:1;min-width:0;height:34px;border:0;outline:none;background:transparent;
  color:var(--label);font-size:13px;font-weight:400;letter-spacing:0;padding:0 8px 0 0
}
.hdr-search input::placeholder{color:var(--tertiary)}
.hdr-search input:focus,.hdr-search input:focus-visible{outline:none}
.hdr-search input[type=search]::-webkit-search-decoration,
.hdr-search input[type=search]::-webkit-search-cancel-button{-webkit-appearance:none}
.hdr-kbd{
  flex:0 0 auto;font:500 11px/1 ui-monospace,"SF Mono",Menlo,monospace;
  color:var(--tertiary);background:var(--surface);border-radius:5px;padding:4px 6px;
  box-shadow:inset 0 0 0 1px var(--separator-light)
}
.hdr-search:focus-within .hdr-kbd{opacity:0;width:0;padding:0;overflow:hidden}

.search-pop{
  position:absolute;left:0;right:0;top:calc(100% + 0px);z-index:20;
  background:var(--surface-raised);border-radius:0 0 12px 12px;
  box-shadow:0 18px 48px rgba(0,0,0,.4),inset 0 1px 0 var(--separator-light);
  overflow:hidden;max-height:min(420px,70vh);display:flex;flex-direction:column
}
.search-pop[hidden]{display:none!important}
.search-pop-body{overflow:auto;padding:6px;max-height:min(360px,60vh)}
.search-hit{
  display:flex;align-items:flex-start;gap:10px;width:100%;border:0;background:transparent;
  text-align:left;padding:10px 10px;border-radius:8px;cursor:pointer;color:inherit;font:inherit;
  transition:background 120ms
}
.search-hit:hover,.search-hit.is-active{background:var(--fill)}
.search-hit:active{background:var(--fill-strong)}
.search-hit-main{min-width:0;flex:1}
.search-hit .sh-top{display:flex;flex-wrap:wrap;align-items:center;gap:0;font-size:11.5px;color:var(--tertiary);line-height:1.2}
.search-hit .sh-top > span + span:before{content:"·";margin:0 6px;color:var(--tertiary)}
.search-hit .sh-sum{margin-top:4px;font-size:13.5px;font-weight:550;color:var(--label);letter-spacing:-.01em;line-height:1.35;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.search-hit .sh-snip{margin-top:3px;font-size:12px;color:var(--tertiary);line-height:1.35;
  display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.search-empty{padding:28px 16px;text-align:center;color:var(--tertiary);font-size:13px}
.search-pop-foot{
  border-top:1px solid var(--separator-light);padding:8px;display:flex;gap:6px
}
.search-pop-foot button{
  flex:1;height:34px;border:0;border-radius:8px;background:var(--fill);color:var(--label);
  font-size:12.5px;font-weight:550;cursor:pointer
}
.search-pop-foot button:hover{background:var(--fill-strong)}
.search-pop-foot button.primary{background:var(--accent-soft);color:var(--accent-text)}

.hdr-right{display:flex;align-items:center;gap:8px;justify-self:end;min-width:0}
nav{
  display:flex;gap:2px;padding:3px;background:var(--fill);border-radius:10px;flex:0 0 auto
}
nav button{
  height:28px;min-width:0;background:transparent;border:0;border-radius:7px;color:var(--secondary);
  padding:0 11px;font-size:12.5px;font-weight:550;cursor:pointer;white-space:nowrap;line-height:1;
  transition:background 140ms var(--ease-press),color 140ms var(--ease-press),transform 100ms var(--ease-press)
}
nav button:hover{color:var(--label);background:rgba(255,255,255,.04)}
nav button:active{transform:scale(0.97)}
nav button.on{color:var(--label);background:var(--surface-subtle);box-shadow:0 1px 2px rgba(0,0,0,.22),var(--shadow-soft)}
.hdr-icon,#themebtn{
  width:32px;height:32px;min-width:32px;padding:0;display:grid;place-items:center;
  border:0;border-radius:8px;background:transparent;color:var(--secondary);cursor:pointer;
  transition:background 140ms,color 140ms,transform 100ms var(--ease-press)
}
.hdr-icon:hover,#themebtn:hover{background:var(--fill);color:var(--label)}
.hdr-icon:active,#themebtn:active{transform:scale(0.96)}
#themebtn svg{width:16px;height:16px}
button,input,select{font:inherit;color-scheme:inherit}
button,label{touch-action:manipulation}
button:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid rgba(90,200,168,.75);outline-offset:2px}
button:disabled{cursor:default;opacity:.45}

.view{display:none;width:100%;max-width:var(--page-track);min-width:0;min-height:560px;margin:0 auto;padding-top:var(--space-5)}
.view.on{display:block}

/* page titles — one rhythm */
.page-head,.ledger-head,.admin-title{margin:0 0 var(--space-5)}
.page-head h1,.ledger-head h1,.admin-title h1,.home-copy h1{
  font-size:28px;line-height:1.15;letter-spacing:-.025em;font-weight:700;color:var(--label);margin:0
}
.page-head p,.ledger-head p,.admin-title p,.home-sub{
  margin:6px 0 0;font-size:14px;line-height:1.45;color:var(--secondary);letter-spacing:0;max-width:36em
}

@media(max-width:860px){
  .hdr-search{max-width:none}
  nav button{padding:0 9px}
}
@media(max-width:720px){
  .wrap{padding:0 14px 80px}
  header{
    grid-template-columns:auto 1fr auto;grid-template-rows:var(--header-offset) auto;
    height:auto;min-height:var(--header-offset);padding-bottom:8px;gap:8px 10px
  }
  .hdr-brand{grid-column:1;grid-row:1}
  .hdr-brand .nm{display:none}
  .hdr-right{grid-column:2 / -1;grid-row:1;justify-self:stretch;justify-content:flex-end;min-width:0}
  .hdr-search{grid-column:1 / -1;grid-row:2;max-width:none;justify-self:stretch}
  nav{overflow-x:auto;-webkit-overflow-scrolling:touch;max-width:calc(100% - 40px);scrollbar-width:none}
  nav::-webkit-scrollbar{display:none}
  nav button{min-height:32px;flex:0 0 auto;padding:0 8px;font-size:12px}
  input,select,.form input,.form select{font-size:16px!important}
  .bar input,.bar select,.form input,.form select{height:40px;min-height:40px}
  .act{min-height:40px}.mini{min-height:40px}
  .drawer-backdrop{inset:106px 0 0}
  #drawer{top:106px;height:calc(100vh - 106px)}
}

/* —— Home / Overview —— */
.home-shell{width:100%;max-width:var(--page-track);margin:0 auto}
.home-hero{
  position:relative;display:grid;grid-template-columns:1fr;gap:var(--space-5);align-items:end;
  width:100%;max-width:var(--page-track);padding:0;margin:0 auto var(--space-5)
}
.home-hero-row{display:flex;align-items:flex-end;justify-content:space-between;gap:var(--space-4);flex-wrap:wrap}
.home-copy{min-width:0;flex:1}
.home-kicker{font-size:12px;font-weight:600;color:var(--accent-text);letter-spacing:.02em;margin:0 0 6px;line-height:1.2}
.home-actions{display:flex;flex-wrap:wrap;gap:var(--space-2);align-items:center;padding-bottom:2px}
.home-actions .act{
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  min-width:0;min-height:34px;padding:0 14px;font-size:13px;font-weight:600;border-radius:980px
}
.home-actions .act svg{width:15px;height:15px}

.home-sync-state{
  display:flex;align-items:flex-start;gap:12px;width:100%;max-width:var(--page-track);min-height:44px;
  margin:0 auto 16px;padding:12px 14px;border:0;border-radius:var(--r-md);
  background:var(--surface);color:var(--secondary)
}
.home-sync-state[hidden]{display:none}
.home-sync-state.running{box-shadow:inset 0 0 0 1px rgba(90,200,168,.35)}
.home-sync-state.partial{box-shadow:inset 0 0 0 1px rgba(255,214,10,.35)}
.home-sync-state.error{box-shadow:inset 0 0 0 1px rgba(255,105,97,.4)}
.home-sync-mark{width:24px;height:24px;display:grid;place-items:center;flex:0 0 auto;color:var(--accent)}
.home-sync-state.partial .home-sync-mark{color:var(--warn)}
.home-sync-state.error .home-sync-mark{color:var(--danger)}
.home-sync-mark svg{width:16px;height:16px}
.home-sync-copy{min-width:0}
.home-sync-copy strong{display:block;font-size:13px;color:var(--label);font-weight:600}
.home-sync-copy span{display:block;margin-top:2px;font-size:12px;color:var(--secondary);word-break:break-word}

/* home-search removed — global header search */

/* metrics as one grouped strip */
.stats{
  display:grid;grid-template-columns:repeat(4,1fr);gap:0;min-height:0;
  max-width:var(--page-track);margin:0 auto var(--space-4);background:var(--surface);border-radius:var(--r-md);overflow:hidden
}
.stat{
  background:transparent;border:0;border-radius:0;padding:var(--space-4);text-align:left;
  box-shadow:inset -1px 0 0 var(--separator-light);cursor:default;position:relative;
  display:flex;flex-direction:column;justify-content:flex-start;min-height:96px
}
.stat:last-child{box-shadow:none}
.stat .l{font-size:12px;color:var(--secondary);margin:0;letter-spacing:0;font-weight:500;line-height:1.2}
.stat .n{font-size:24px;font-weight:700;letter-spacing:-.03em;color:var(--label);line-height:1.1;margin-top:8px}
.stat .s{font-size:11.5px;color:var(--tertiary);margin-top:auto;padding-top:8px;line-height:1.3}
.stat.is-hot .n{color:var(--accent-text)}
@media(max-width:640px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .stat:nth-child(2){box-shadow:none}
  .stat:nth-child(1),.stat:nth-child(2){box-shadow:inset 0 -1px 0 var(--separator-light),inset -1px 0 0 var(--separator-light)}
  .stat:nth-child(2){box-shadow:inset 0 -1px 0 var(--separator-light)}
  .stat:nth-child(odd){box-shadow:inset -1px 0 0 var(--separator-light)}
  .stat:nth-child(3){box-shadow:inset -1px 0 0 var(--separator-light)}
  .stat:nth-child(4){box-shadow:none}
}

/* two-column insight row */
.home-insight{
  display:grid;grid-template-columns:minmax(0,1.55fr) minmax(240px,.85fr);gap:var(--space-3);
  max-width:var(--page-track);margin:0 auto var(--space-6);align-items:stretch
}
.home-card{
  background:var(--surface);border:0;border-radius:var(--r-md);padding:var(--space-4);min-width:0;
  display:flex;flex-direction:column;min-height:100%
}
.home-card-head{
  display:flex;align-items:center;justify-content:space-between;gap:var(--space-3);margin:0 0 var(--space-3);min-height:20px
}
.home-card-head h2{font-size:13px;font-weight:650;color:var(--label);letter-spacing:-.01em;line-height:1.2;margin:0}
.home-card-head .meta{font-size:12px;color:var(--tertiary);white-space:nowrap;line-height:1.2}
.home-card-foot{
  display:flex;align-items:center;justify-content:space-between;gap:var(--space-3);margin-top:var(--space-3);
  font-size:11.5px;color:var(--tertiary);min-height:16px
}
.home-legend{display:flex;align-items:center;gap:6px}
.home-legend i{width:10px;height:10px;border-radius:2px;display:inline-block}
.home-legend i.l0{background:var(--fill)}
.home-legend i.l1{background:rgba(90,200,168,.28)}
.home-legend i.l2{background:rgba(90,200,168,.52)}
.home-legend i.l3{background:rgba(90,200,168,.78)}
.home-legend i.l4{background:#5AC8A8}

.fab{background:transparent;border:0;border-radius:0;min-height:0;padding:0;max-width:none;margin:0;overflow-x:auto}
.fab svg{width:100%;height:auto;display:block;min-width:420px}
@media(max-width:720px){.fab svg{min-width:0}.fab{overflow:hidden}}
.fab .ft{display:none}

.threads{min-height:0;max-width:none;margin:0;display:flex;flex-direction:column;gap:2px;flex:1}
.th-row:hover{background:var(--fill)}
.th-main{min-width:0;display:flex;flex-direction:column;gap:5px}
.th-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.th-name{font-size:13px;font-weight:550;color:var(--label);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.th-pct{font-size:11px;color:var(--tertiary);font-variant-numeric:tabular-nums}
.th-track{height:4px;border-radius:99px;background:var(--fill);overflow:hidden}
.th-track i{display:block;height:100%;border-radius:99px;background:var(--accent)}
.th-count{
  font-size:12px;font-weight:600;color:var(--secondary);text-align:right;
  font-variant-numeric:tabular-nums;font-family:ui-monospace,monospace
}
.th-empty{color:var(--tertiary);font-size:13px;padding:18px 8px;text-align:center}

.home-section{
  width:100%;max-width:var(--page-track);margin:0 auto
}
.home-section-title{
  display:flex;align-items:center;justify-content:space-between;gap:var(--space-3);margin:0 0 var(--space-3);min-height:28px
}
.home-section-title h2{font-size:20px;color:var(--label);font-weight:700;letter-spacing:-.02em;line-height:1.2;margin:0}
.home-section-title button{
  background:transparent;border:0;color:var(--accent-text);font-size:13px;font-weight:550;cursor:pointer;padding:4px 0;line-height:1.2
}
.home-section-title button:active{opacity:.7}
#recent{min-height:120px;max-width:none;margin:0}
.home-empty{
  background:var(--surface);border-radius:var(--r-md);padding:36px 20px;text-align:center;color:var(--tertiary);font-size:14px
}
.home-empty strong{display:block;color:var(--label);font-size:15px;font-weight:600;margin-bottom:6px}
.home-empty .act{margin-top:14px}

@media(max-width:820px){
  .home-insight{grid-template-columns:1fr}
}
@media(max-width:720px){
  .home-hero-row{align-items:stretch;flex-direction:column;gap:var(--space-3)}
  .home-actions{width:100%}
  .home-actions .act{width:100%}
  .page-head h1,.ledger-head h1,.admin-title h1,.home-copy h1{font-size:26px}
}

/* —— Filters —— */
.bar{display:flex;gap:var(--space-2);flex-wrap:wrap;margin-bottom:var(--space-3);align-items:center}
.bar input,.bar select{
  height:34px;background:var(--surface);border:0;border-radius:8px;color:var(--label);
  padding:0 10px;font-size:13px;box-shadow:inset 0 0 0 1px var(--separator-light)
}
.bar input[type=search]{flex:1;min-width:220px}
.hint{color:var(--tertiary);font-size:12px;margin-bottom:10px}

/* —— Grouped list cards —— */
#r-search,#recent,#tmembers,#dbody{display:flex;flex-direction:column;gap:0}
#r-search > .card:first-child,#recent > .card:first-child,
#tmembers > .card:first-of-type,#dbody > .card:first-of-type{border-radius:var(--r-md) var(--r-md) 0 0}
#r-search > .card:last-child,#recent > .card:last-child,
#tmembers > .card:last-of-type,#dbody > .card:last-of-type{border-radius:0 0 var(--r-md) var(--r-md);box-shadow:none}
#r-search > .card:only-child,#recent > .card:only-child,
#tmembers > .card:only-of-type,#dbody > .card:only-of-type{border-radius:var(--r-md);box-shadow:none}
.gh{
  font-size:12px;color:var(--secondary);margin:18px 0 8px;letter-spacing:.06em;text-transform:uppercase;font-weight:600
}

/* —— Topics graph / relation overview —— */
.topic-mode{display:inline-flex;gap:2px;padding:3px;margin-bottom:var(--space-3);background:var(--fill);border-radius:10px}
.topic-mode button{height:30px;padding:0 12px;border:0;border-radius:7px;background:transparent;color:var(--secondary);font-size:12.5px;font-weight:550;cursor:pointer}
.topic-mode button.on{background:var(--surface);color:var(--label);box-shadow:var(--shadow-soft)}
#tgraph{
  background:var(--surface);border:0;border-radius:var(--r-md);overflow-x:auto;margin-bottom:14px;padding:12px 8px
}
#tgraph svg{display:block}
.gnode{cursor:pointer}
.gnode rect{stroke-width:1;rx:16;transition:stroke 120ms,filter 120ms,fill-opacity 120ms}
.gnode:hover rect{stroke:var(--accent);filter:brightness(1.08)}
.gnode.on rect{stroke:var(--accent);stroke-width:1.8}
.gnode text{fill:var(--label);font-size:13px;font-family:-apple-system,system-ui,sans-serif;font-weight:500}
.gnode .cnt{fill:var(--label);font-size:10.5px;font-weight:700;font-family:ui-monospace,monospace}
.gnode.on text{fill:var(--accent-text)}
.gnode .cnt-root{fill:#06241c}
html[data-theme="light"] .gnode .cnt-root{fill:#fff}
.gedge{fill:none;stroke:var(--separator);stroke-width:1.5;opacity:.85}
.gedge.hl{stroke:var(--accent);stroke-width:2.2;opacity:1}
.loose{color:var(--tertiary);font-size:12px;margin:-4px 0 14px}
.loose b{color:var(--secondary);font-weight:500;cursor:pointer}
.loose b:hover{color:var(--accent-text)}
.topic-relations{background:var(--surface);border-radius:var(--r-md);padding:var(--space-4);margin-bottom:14px;min-width:0}
.relation-summary{display:flex;align-items:center;gap:var(--space-4);flex-wrap:wrap;margin-bottom:var(--space-3);color:var(--secondary);font-size:12px}
.relation-summary b{color:var(--label);font-size:15px;margin-right:4px}
.relation-matrix-wrap{overflow:auto;border-radius:9px;box-shadow:inset 0 0 0 1px var(--separator-light)}
.relation-matrix{border-collapse:separate;border-spacing:0;min-width:100%;font-size:11px}
.relation-matrix th,.relation-matrix td{width:46px;min-width:46px;height:38px;text-align:center;border-right:1px solid var(--separator-light);border-bottom:1px solid var(--separator-light)}
.relation-matrix tr:last-child th,.relation-matrix tr:last-child td{border-bottom:0}.relation-matrix th:last-child,.relation-matrix td:last-child{border-right:0}
.relation-matrix th{position:sticky;top:0;background:var(--surface);z-index:1;color:var(--secondary);font-weight:550}
.relation-matrix th:first-child{left:0;z-index:2;width:150px;min-width:150px;text-align:left;padding:0 10px}
.relation-matrix tbody th{top:auto;z-index:1}.relation-topic{border:0;background:transparent;color:inherit;font:inherit;font-weight:600;cursor:pointer;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.relation-topic:hover{color:var(--accent-text)}
.relation-cell{display:grid;place-items:center;width:100%;height:100%;border:0;background:rgba(90,200,168,var(--heat));color:var(--label);font:650 11px/1 ui-monospace,"SF Mono",Menlo,monospace;cursor:pointer}
.relation-cell:hover,.relation-cell:focus-visible{box-shadow:inset 0 0 0 2px var(--accent)}
.relation-empty-cell{color:var(--tertiary)}
.relation-note{margin-top:10px;color:var(--tertiary);font-size:11.5px;line-height:1.45}

/* —— Calendar —— */
.cols{display:grid;grid-template-columns:320px 1fr;gap:20px}
@media(max-width:800px){.cols{grid-template-columns:1fr}}
.cal{
  background:var(--surface);border:0;border-radius:var(--r-md);padding:14px 16px;margin-bottom:12px
}
.cal .mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal .mh span{font-size:15px;color:var(--label);font-weight:650;letter-spacing:-.01em}
.cal .mh small{margin-left:6px;font-size:11px}
.cal .mh button{
  background:var(--fill);border:0;border-radius:8px;color:var(--secondary);
  width:32px;height:30px;cursor:pointer;font-size:16px;
  transition:color 120ms,background 120ms,transform 100ms var(--ease-press)
}
.cal .mh button:hover:not(:disabled){color:var(--label);background:var(--fill-strong)}
.cal .mh button:active:not(:disabled){transform:scale(0.95)}
.cal .mh button:disabled{opacity:.3;cursor:default}
.cal .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal .wd{font-size:10px;color:var(--tertiary);text-align:center;padding-bottom:4px;font-weight:600}
.cell{
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;
  font-size:13px;color:var(--tertiary);position:relative;font-weight:500
}
.cell.has{cursor:pointer;color:var(--label)}
.cell.h1{background:rgba(90,200,168,.14)}
.cell.h2{background:rgba(90,200,168,.32)}
.cell.h3{background:rgba(90,200,168,.58);color:#06241c}
.cell.has:hover,.cell.on{box-shadow:inset 0 0 0 2px var(--accent)}
.legend{display:flex;gap:6px;align-items:center;font-size:11px;color:var(--tertiary);margin:4px 2px 8px}
.legend i{width:12px;height:12px;border-radius:3px;display:inline-block}

/* —— Admin —— */
.admin-head{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-4);margin:0 0 var(--space-5)}
.admin-title{min-width:0}
.admin-head .icon-btn{margin-top:4px}
.admin-head .icon-btn{flex:0 0 auto}
#admin-refresh.is-loading svg{animation:admin-spin .8s linear infinite}
.admin-shell{display:grid;grid-template-columns:168px minmax(0,1fr);gap:20px;align-items:start}
.admin-shell[hidden]{display:none}
.admin-load-state{
  display:flex;align-items:center;gap:14px;min-height:72px;margin:0 0 16px;padding:14px 16px;
  background:var(--surface);border:0;border-radius:var(--r-md)
}
.admin-load-state[hidden]{display:none}
.admin-load-state.is-error{box-shadow:inset 0 0 0 1px rgba(255,105,97,.35);background:rgba(255,105,97,.06)}
.admin-load-mark{
  width:30px;height:30px;display:grid;place-items:center;flex:0 0 auto;border-radius:9px;
  background:var(--accent-soft);color:var(--accent)
}
.admin-load-state.is-error .admin-load-mark{background:rgba(255,105,97,.12);color:var(--danger)}
.admin-spinner{
  width:15px;height:15px;border:2px solid currentColor;border-right-color:transparent;border-radius:50%;
  animation:admin-spin .72s linear infinite
}
@keyframes admin-spin{to{transform:rotate(360deg)}}
.admin-load-copy{flex:1;min-width:0}
.admin-load-copy strong{display:block;color:var(--label);font-size:13px;font-weight:600}
.admin-load-copy span{display:block;margin-top:3px;color:var(--secondary);font-size:12px;word-break:break-word}
.admin-workspace{min-width:0}
.admin-pane{display:none}.admin-pane.on{display:block}
.admin-tabs{
  position:sticky;top:calc(var(--header-offset) + 12px);display:flex;flex-direction:column;gap:2px;padding:4px;
  background:var(--surface);border:0;border-radius:var(--r-md)
}
.admin-tabs button{
  height:36px;background:transparent;border:0;border-radius:8px;color:var(--secondary);
  padding:0 12px;font-size:13px;font-weight:550;text-align:left;cursor:pointer;white-space:nowrap;line-height:1;
  transition:background 140ms,color 140ms,transform 100ms var(--ease-press)
}
.admin-tabs button:hover{color:var(--label);background:var(--fill)}
.admin-tabs button:active{transform:scale(0.98)}
.admin-tabs button.on{color:var(--label);background:var(--accent-soft);box-shadow:inset 3px 0 0 var(--accent)}
.admin-top{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:0;margin-bottom:14px;background:var(--surface);border-radius:var(--r-md);overflow:hidden}
.answer{
  position:relative;overflow:hidden;background:transparent;border:0;border-radius:0;
  padding:16px 16px;min-height:104px;box-shadow:inset -1px 0 0 var(--separator-light)
}
.answer:last-child{box-shadow:none}
.answer h2{font-size:12px;color:var(--secondary);font-weight:600;margin:0 0 8px;letter-spacing:0}
.answer .big{font-size:26px;font-weight:700;line-height:1.05;color:var(--label);letter-spacing:-.03em}
.answer .desc{
  font-size:12px;color:var(--tertiary);margin-top:8px;overflow:hidden;line-height:1.35;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical
}
.answer.warn .big,.answer.bad .big{color:var(--warn)}
.answer.bad .big{color:var(--danger)}
.answer.warn,.answer.bad{box-shadow:inset -1px 0 0 var(--separator-light)}
.answer.bad:last-child,.answer.warn:last-child{box-shadow:none}
@media(max-width:960px){
  .admin-top{grid-template-columns:repeat(2,1fr)}
  .answer:nth-child(2){box-shadow:inset 0 -1px 0 var(--separator-light)}
  .answer:nth-child(1){box-shadow:inset 0 -1px 0 var(--separator-light),inset -1px 0 0 var(--separator-light)}
  .answer:nth-child(3){box-shadow:inset -1px 0 0 var(--separator-light)}
}
.admin-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;align-items:start}
#admin-pane-privacy .admin-grid{align-items:stretch}
.privacy-metric-panel{display:flex;min-height:100%;flex-direction:column}
.privacy-metric-panel>div{flex:1}
.panel{background:var(--surface);border:0;border-radius:var(--r-md);padding:var(--space-4);box-shadow:none}
.manual-panel{grid-column:1/-1}
.panel h3{font-size:16px;color:var(--label);font-weight:650;margin-bottom:10px;letter-spacing:-.015em}
.panel .sub{font-size:12.5px;color:var(--secondary);margin:-4px 0 14px}
.mini{font-size:12px;color:var(--secondary);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.pill{
  display:inline-flex;align-items:center;gap:5px;border:0;border-radius:999px;
  padding:2px 8px;font-size:11.5px;color:var(--secondary);background:var(--fill);font-weight:500
}
.pill.ok{color:var(--ok);background:rgba(50,215,75,.12)}
.pill.warn{color:#E6C200;background:rgba(255,214,10,.12)}
.pill.error,.pill.bad{color:var(--danger);background:rgba(255,105,97,.12)}
.pill.off{color:var(--tertiary);background:var(--fill)}
.kv{display:grid;grid-template-columns:120px 1fr;gap:8px;font-size:12px;margin:6px 0;color:var(--secondary)}
.kv b{color:var(--label);font-weight:500;word-break:break-all}
.row{
  display:flex;gap:12px;align-items:center;justify-content:space-between;
  border-top:1px solid var(--separator-light);padding:12px 0;font-size:12px;color:var(--secondary)
}
.row:first-of-type{border-top:0;padding-top:0}
.row strong{color:var(--label);font-size:13px;font-weight:600}
.row code{color:var(--secondary);word-break:break-word;overflow-wrap:anywhere}
.barline{display:flex;align-items:center;gap:9px;margin:7px 0;font-size:12px;color:var(--secondary)}
.barline .nm2{width:96px;text-align:right;color:var(--secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.barline .track{flex:1;height:6px;background:var(--fill);border-radius:99px;overflow:hidden}
.barline i{display:block;height:100%;background:var(--accent);border-radius:99px}
.form{display:flex;gap:12px;flex-wrap:wrap;margin:8px 0 10px;align-items:end}
.field{display:flex;flex-direction:column;gap:5px;min-width:138px}
.field span{font-size:12px;color:var(--secondary);font-weight:500}
.form input:not([type=checkbox]),.form select,.field input:not([type=checkbox]),.field select,.panel-tools input{
  height:34px;background:var(--bg);border:0;border-radius:8px;color:var(--label);
  padding:0 10px;font-size:13px;min-width:140px;box-shadow:inset 0 0 0 1px var(--separator-light)
}
.form input::placeholder,.field input::placeholder,.panel-tools input::placeholder{color:var(--tertiary)}
.form input.path,.field input.path,.panel-tools input.path{flex:1;min-width:260px}
.sync-card{
  display:flex;align-items:center;gap:14px;background:var(--surface);border:0;border-radius:var(--r-md);
  padding:16px 18px;margin-bottom:14px
}
.sync-icon,.source-icon{display:grid;place-items:center;flex:0 0 auto;background:var(--accent-soft);color:var(--accent)}
.sync-icon{width:36px;height:36px;border-radius:10px}
.sync-icon svg,.source-icon svg{width:18px;height:18px}
.sync-card-copy{flex:1;min-width:0}
.sync-card-copy strong{display:block;font-size:15px;font-weight:650;color:var(--label);letter-spacing:-.01em}
.sync-card-copy span{display:block;margin-top:3px;font-size:12.5px;color:var(--secondary)}
.sync-actions{display:flex;align-items:center;gap:8px}
.sync-options{background:var(--surface-subtle);border:0;border-radius:var(--r-md);padding:16px;margin:-2px 0 14px}
.sync-options[hidden]{display:none}
.sync-form{display:grid;gap:12px}
.sync-line{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
.sync-line .field{flex:1 1 144px}
.sync-result{margin-top:14px;background:var(--surface);border:0;border-radius:var(--r-md);overflow:hidden;box-shadow:inset 0 0 0 1px var(--separator-light)}
.sync-result[hidden]{display:none}
.sync-result.partial{box-shadow:inset 0 0 0 1px rgba(255,214,10,.35)}
.sync-result.error{box-shadow:inset 0 0 0 1px rgba(255,105,97,.4)}
.sync-result-head{
  display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;
  border-bottom:1px solid var(--separator-light)
}
.sync-result-title{display:flex;align-items:center;gap:8px;min-width:0}
.sync-result-title strong{font-size:13px;color:var(--label)}
.sync-result-count{font-size:11.5px;color:var(--secondary);white-space:nowrap}
.sync-result-list{display:grid}
.sync-result-row{
  display:grid;grid-template-columns:minmax(110px,1fr) minmax(0,2fr);gap:16px;align-items:start;
  padding:10px 14px;font-size:12px
}
.sync-result-row+.sync-result-row{border-top:1px solid var(--separator-light)}
.sync-result-source{display:flex;align-items:center;gap:8px;color:var(--label);font-weight:550}
.sync-result-detail{color:var(--secondary);text-align:right;word-break:break-word}
.toggle-line{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.checkline{
  display:inline-flex;align-items:center;gap:8px;min-height:34px;padding:0 10px;border:0;border-radius:8px;
  background:var(--fill);color:var(--secondary);font-size:12.5px
}
.checkline input[type=checkbox]{
  appearance:none;-webkit-appearance:none;width:15px;height:15px;min-width:15px;
  border:0;border-radius:4px;background:var(--bg);box-shadow:inset 0 0 0 1px var(--separator);display:grid;place-content:center
}
.checkline input[type=checkbox]:checked{background:var(--accent-soft);box-shadow:inset 0 0 0 1px rgba(90,200,168,.5)}
.checkline input[type=checkbox]:checked:after{content:"";width:7px;height:7px;border-radius:2px;background:var(--accent)}
.inline-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:12px 0 10px}

.act{
  background:var(--fill);border:0;border-radius:8px;color:var(--label);min-height:34px;height:34px;padding:0 14px;
  font-size:13px;font-weight:550;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;
  transition:background 140ms,color 140ms,transform 100ms var(--ease-press),filter 140ms;line-height:1
}
.act:active{transform:scale(0.97)}
.act:hover{background:var(--fill-strong);color:var(--label)}
.act.danger:hover{background:rgba(255,105,97,.14);color:var(--danger)}
.act.primary{border:0;color:#06241c;background:var(--accent);font-weight:650}
.act.primary:hover{color:#06241c;filter:brightness(1.06)}
.act.warn{color:#3d3200;background:rgba(255,214,10,.18)}
.is-busy .act,.is-busy .switch,.is-busy .icon-btn{opacity:.5}
.icon-btn{
  width:32px;height:32px;display:grid;place-items:center;border:0;border-radius:8px;
  background:var(--fill);color:var(--secondary);cursor:pointer;
  transition:background 140ms,color 140ms,transform 100ms var(--ease-press)
}
.icon-btn:hover{color:var(--accent);background:var(--accent-soft)}
.icon-btn:active{transform:scale(0.95)}
.icon-btn svg,.act svg{width:17px;height:17px;display:block}
.icon-btn.danger:hover{color:var(--danger);background:rgba(255,105,97,.12)}
.log{
  background:var(--bg);border:0;border-radius:10px;padding:12px;white-space:pre-wrap;word-break:break-all;
  font-size:12px;color:var(--secondary);max-height:220px;overflow:auto;margin-top:12px;
  box-shadow:inset 0 0 0 1px var(--separator-light)
}
.log[aria-busy="true"]{box-shadow:inset 0 0 0 1px rgba(90,200,168,.45);color:var(--label)}
.panel-tools{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start}
.panel-tools .form{margin:0}
.panel-tools .path{width:100%}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{
  border:0;border-radius:999px;color:var(--secondary);font-size:12px;padding:4px 10px;background:var(--fill)
}
.chip-remove{
  width:22px;height:22px;display:inline-grid;place-items:center;margin:-2px -5px -2px 3px;border:0;border-radius:50%;
  background:transparent;color:var(--secondary);cursor:pointer
}
.chip-remove:hover{color:var(--danger);background:rgba(255,105,97,.12)}
.chip-remove svg{width:13px;height:13px}
.list{max-height:320px;overflow:auto}
.evidence-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
.evidence-stat{background:var(--bg);border:0;border-radius:10px;padding:11px 12px}
.evidence-stat b{display:block;font-size:20px;color:var(--label);line-height:1.2}
.evidence-stat span{font-size:11px;color:var(--tertiary)}
.resource-row{display:grid;grid-template-columns:130px 1fr 82px;align-items:center;gap:10px;margin:8px 0;font-size:12px;color:var(--secondary)}
.resource-row .track{height:6px;border-radius:99px;background:var(--fill);overflow:hidden}
.resource-row i{display:block;height:100%;border-radius:99px;background:var(--accent)}
.recent-admin .row{align-items:flex-start}
.recent-admin .row button{flex:0 0 auto}
.source-groups{display:grid;gap:24px}
.source-group+.source-group{padding-top:20px;border-top:1px solid var(--separator-light)}
.source-group-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:12px}
.source-group-title h4{font-size:13px;font-weight:650;color:var(--label)}
.source-group-title p{font-size:11.5px;color:var(--secondary);margin-top:3px}
.source-group-count{font-size:11.5px;color:var(--secondary);white-space:nowrap}
.source-cards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.source-tile{
  min-height:152px;background:var(--bg);border:0;border-radius:var(--r-md);padding:16px 16px;
  display:flex;flex-direction:column
}
.source-head{display:flex;align-items:center;justify-content:space-between;gap:12px}
.source-identity{display:flex;align-items:center;gap:10px;min-width:0}
.source-icon{width:32px;height:32px;border-radius:9px}
.source-identity strong{font-size:14px;color:var(--label);font-weight:650;letter-spacing:-.01em}
.source-meta{font-size:12px;color:var(--secondary);line-height:1.55;margin:12px 0 14px;min-height:38px;word-break:break-word}
.source-actions{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:auto}
.source-state{display:flex;align-items:center;gap:7px;color:var(--secondary);font-size:12px}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
.status-dot.off{background:var(--tertiary)}
.status-dot.warn{background:var(--warn)}
.status-dot.error{background:var(--danger)}
.source-config-btn{display:inline-flex;align-items:center;gap:7px;background:transparent}
.source-config-btn svg{width:15px;height:15px}
.switch{
  position:relative;width:42px;height:24px;flex:0 0 auto;border:0;border-radius:999px;
  background:var(--fill-strong);padding:2px;cursor:pointer;
  transition:background 180ms var(--ease-out)
}
.switch span{
  display:block;width:20px;height:20px;border-radius:50%;background:#fff;
  box-shadow:0 1px 3px rgba(0,0,0,.28);transition:transform 180ms var(--ease-out)
}
.switch[aria-checked="true"]{background:var(--accent)}
.switch[aria-checked="true"] span{transform:translateX(18px)}
.switch:active span{transform:scale(0.94)}
.switch[aria-checked="true"]:active span{transform:translateX(18px) scale(0.94)}

/* —— Modal sheet —— */
.modal{position:fixed;inset:0;z-index:20;display:none;place-items:center;padding:20px}
.modal.on{display:grid}
.modal-backdrop{
  position:absolute;inset:0;background:var(--scrim);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  animation:fade-in 220ms var(--ease-out)
}
.modal-panel{
  position:relative;width:min(680px,calc(100vw - 32px));max-height:min(780px,90vh);overflow:auto;
  background:var(--material-thick);backdrop-filter:blur(28px) saturate(180%);-webkit-backdrop-filter:blur(28px) saturate(180%);

  animation:sheet-in 380ms var(--ease-out)
}
.modal-head{
  display:flex;align-items:flex-start;justify-content:space-between;gap:16px;padding:18px 20px;

.modal-title{display:flex;gap:12px;align-items:flex-start}

.modal-head h2{font-size:18px;line-height:1.3;color:var(--label);font-weight:700;letter-spacing:-.02em}
.modal-head p{font-size:12.5px;color:var(--secondary);margin-top:4px}
.modal-close{flex:0 0 auto}
.modal-body{padding:20px}
.config-section+.config-section{margin-top:22px;padding-top:22px;border-top:1px solid var(--separator-light)}
.config-section-title{font-size:13px;font-weight:650;color:var(--label);margin-bottom:8px}
.config-section-copy{font-size:12px;color:var(--secondary);margin:-3px 0 12px}
.config-add-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;align-items:end}

.config-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.config-list{display:grid;gap:8px}
.config-item{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  background:var(--bg);border:0;border-radius:10px;padding:12px
}
.config-item-main{min-width:0}
.config-item strong{display:block;color:var(--label);font-size:13px;font-weight:600}
.config-item code,.config-item small{display:block;color:var(--secondary);font-size:11.5px;word-break:break-all;margin-top:2px}
.credential-note{
  display:flex;align-items:flex-start;gap:8px;padding:10px 12px;background:var(--bg);

}
.credential-note .status-dot{margin-top:6px;flex:0 0 auto}
.boundary-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.boundary-card{background:var(--bg);border:0;border-radius:var(--r-md);padding:16px}
.boundary-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.boundary-head .source-icon{width:34px;height:34px}
.boundary-head h4{font-size:14px;font-weight:650;color:var(--label)}
.boundary-card p{font-size:12px;color:var(--secondary);margin-bottom:10px}
.boundary-card ul{display:grid;gap:7px;list-style:none}
.boundary-card li{position:relative;padding-left:15px;font-size:12px;color:var(--secondary)}
.boundary-card li:before{content:"";position:absolute;left:1px;top:.62em;width:5px;height:5px;border-radius:50%;background:var(--accent)}
.boundary-card.local li:before{background:var(--tertiary)}
.data-summary{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.data-stat{background:var(--bg);border:0;border-radius:10px;padding:12px}
.data-stat b{display:block;font-size:18px;line-height:1.25;color:var(--label);font-weight:700;letter-spacing:-.02em}
.data-stat span{display:block;margin-top:4px;font-size:11.5px;color:var(--secondary)}
.backup-overview{
  display:flex;align-items:center;gap:14px;background:var(--bg);border:0;border-radius:var(--r-md);padding:14px
}
.backup-copy{flex:1;min-width:0}
.backup-copy strong{display:block;font-size:13px;color:var(--label)}
.backup-copy span{
  display:block;font-size:12px;color:var(--secondary);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap
}
.backup-actions{display:flex;gap:8px;flex:0 0 auto}
.notice{
  display:flex;align-items:flex-start;gap:8px;margin-top:12px;padding:10px 12px;border-radius:10px;
  background:rgba(255,214,10,.08);color:var(--secondary);font-size:12px
}
.notice.error{background:rgba(255,105,97,.08);box-shadow:inset 0 0 0 1px rgba(255,105,97,.25)}
.notice.success{background:var(--accent-soft);box-shadow:inset 0 0 0 1px rgba(90,200,168,.25)}
.notice[hidden]{display:none}
.notice .status-dot{margin-top:6px;flex:0 0 auto}
.admin-disclosure{margin-top:12px;border-top:1px solid var(--separator-light);padding-top:10px}
.admin-disclosure summary{cursor:pointer;color:var(--secondary);font-size:12px}
.admin-disclosure[open] summary{color:var(--label);margin-bottom:10px}
.detail-list{display:grid;gap:8px}
.detail-item{display:grid;grid-template-columns:110px minmax(0,1fr);gap:12px;font-size:12px}
.detail-item span{color:var(--secondary)}
.detail-item code,.detail-item b{color:var(--label);font-weight:500;word-break:break-all}
.owner-form{display:grid;grid-template-columns:1fr 1fr auto;gap:12px;align-items:end}
.identity-add{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;align-items:end;max-width:620px}
.identity-groups{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.identity-group{background:var(--bg);border:0;border-radius:var(--r-md);padding:14px}
.identity-group h4{font-size:12px;color:var(--secondary);font-weight:600;margin-bottom:10px}

.preference-row{display:flex;align-items:flex-end;gap:16px}
.preference-row .field{width:min(320px,100%)}
.preference-row select{width:100%}
.preference-hint{font-size:12px;color:var(--secondary);padding-bottom:9px}
.config-pane{display:none}.config-pane.on{display:block}

@media(max-width:960px){

}
@media(max-width:340px){
  nav{gap:1px}
  nav button{padding-inline:0;font-size:11px}
}

/* —— Detail drawer (sheet from right) —— */
.drawer-backdrop{
  position:fixed;inset:var(--header-offset) 0 0;z-index:4;background:var(--scrim);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  opacity:0;visibility:hidden;transition:opacity 320ms var(--ease-out),visibility 320ms var(--ease-out);cursor:default
}
.drawer-backdrop.on{opacity:1;visibility:visible}
#drawer{
  position:fixed;top:var(--header-offset);right:-560px;width:min(560px,92vw);height:calc(100vh - var(--header-offset));
  background:var(--material-thick);backdrop-filter:blur(28px) saturate(180%);-webkit-backdrop-filter:blur(28px) saturate(180%);
  border-left:1px solid var(--separator-light);
  transition:right 380ms var(--ease-out);overflow-y:auto;overscroll-behavior:contain;
  padding:20px;z-index:4;border-radius:0;box-shadow:-24px 0 60px rgba(0,0,0,.4)
}

#drawer .x:active{transform:scale(0.95)}

@keyframes fade-in{from{opacity:0}to{opacity:1}}
@keyframes sheet-in{
  from{opacity:0;transform:scale(.96) translateY(8px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}

@media(max-width:720px){
  #drawer{top:106px;height:calc(100vh - 106px);height:calc(100dvh - 106px);width:100vw;right:-100vw;border-radius:0}
  nav button,.act,.admin-tabs button{min-height:44px}
  .bar input,.bar select,.form input:not([type=checkbox]),.form select,.field input:not([type=checkbox]),.field select,.panel-tools input{height:44px;min-height:44px}
  .sync-line .act{margin-left:0}
  .panel-tools{grid-template-columns:1fr}
  .evidence-grid{grid-template-columns:repeat(2,1fr)}
  .resource-row{grid-template-columns:100px 1fr 70px}
  .source-cards{grid-template-columns:1fr}
  .sync-card{align-items:flex-start;flex-wrap:wrap}
  .sync-card-copy{min-width:calc(100% - 52px)}
  .sync-actions{width:100%;justify-content:flex-end}
  .config-form-grid{grid-template-columns:1fr}
  .config-form-grid .wide{grid-column:auto}
  .modal-body{padding:16px}
  .modal-head{padding:16px}
  .boundary-grid,.identity-groups,.data-summary{grid-template-columns:1fr}
  .owner-form{grid-template-columns:1fr}
  .identity-add{grid-template-columns:1fr}
  .backup-overview{align-items:flex-start;flex-wrap:wrap}
  .backup-actions{width:100%;justify-content:flex-end}
  .preference-row{align-items:flex-start;flex-direction:column;gap:8px}
  .preference-hint{padding:0}
}


/* —— Interaction polish —— */
/* grouped cards: round outer corners of contiguous card runs */
.card{position:relative}
.gh + .card{border-radius:var(--r-md) var(--r-md) 0 0}
.card:has(+ .card){/* middle/start keep bottom square */}
.card:not(:has(+ .card)){border-radius:0 0 var(--r-md) var(--r-md);box-shadow:none}
.gh + .card:not(:has(+ .card)){border-radius:var(--r-md);box-shadow:none}
#r-search:not(:has(.gh)) > .card:first-child,#recent:not(:has(.gh)) > .card:first-child{border-radius:var(--r-md) var(--r-md) 0 0}
#r-search:not(:has(.gh)) > .card:last-child,#recent:not(:has(.gh)) > .card:last-child{border-radius:0 0 var(--r-md) var(--r-md);box-shadow:none}
#r-search:not(:has(.gh)) > .card:only-child,#recent:not(:has(.gh)) > .card:only-child{border-radius:var(--r-md);box-shadow:none}

.view.on{animation:view-in 280ms var(--ease-out)}
@keyframes view-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
html.is-locked{overflow:hidden;touch-action:none}
.sk{background:linear-gradient(90deg,var(--fill) 25%,var(--fill-strong) 37%,var(--fill) 63%);background-size:400% 100%;animation:sk-shine 1.2s ease infinite;border-radius:8px;color:transparent!important}
@keyframes sk-shine{0%{background-position:100% 0}100%{background-position:0 0}}
.list-loading{display:grid;gap:0;background:var(--surface);border-radius:var(--r-md);overflow:hidden}
.list-loading .sk-row{padding:16px;box-shadow:inset 0 -1px 0 var(--separator-light)}
.list-loading .sk-row:last-child{box-shadow:none}
.list-loading .sk-line{height:12px;margin:6px 0;border-radius:6px}
.list-loading .sk-line.w40{width:40%}.list-loading .sk-line.w70{width:70%}.list-loading .sk-line.w90{width:90%}
.stat.is-link{cursor:pointer;transition:background 140ms}
.stat.is-link:hover{background:var(--fill)}
.stat.is-link:active{background:var(--fill-strong)}
.stat{width:100%;font:inherit;color:inherit}
.th-row.is-link{cursor:pointer}
.th-row{display:grid;grid-template-columns:minmax(0,1fr) 52px;align-items:center;gap:10px;padding:8px;border-radius:8px;cursor:default;width:100%;border:0;background:transparent;color:inherit;font:inherit;text-align:left}
.card{display:flex;align-items:flex-start;gap:12px;background:var(--surface);border:0;border-radius:0;padding:14px 14px 14px 16px;margin:0;cursor:pointer;box-shadow:inset 0 -1px 0 var(--separator-light);transition:background 140ms var(--ease-press)}
.card:focus{outline:none}
.card:focus-visible{background:var(--accent-soft);box-shadow:inset 0 0 0 2px var(--accent)}
.card:hover{background:var(--surface-subtle)}
.card:active{background:var(--fill)}
.card-main{min-width:0;flex:1}
.card-chevron{flex:0 0 auto;width:18px;height:18px;margin-top:14px;color:var(--tertiary);opacity:.7;transition:transform 160ms var(--ease-out),color 140ms,opacity 140ms}
.card-chevron svg{width:16px;height:16px;display:block}
.card:hover .card-chevron{color:var(--secondary);opacity:1;transform:translateX(2px)}
.card .top{display:flex;gap:0;align-items:center;flex-wrap:wrap;font-size:12px;color:var(--secondary);row-gap:4px}
.card .meta-item{display:inline-flex;align-items:center;min-width:0;white-space:nowrap}
.card .meta-item .sep{margin:0 7px;color:var(--tertiary);font-style:normal;font-weight:600}
.card .top .d{color:var(--secondary);font-weight:600;font-variant-numeric:tabular-nums}
.card .top .d.is-today{color:var(--accent-text)}
.card .top .proj{color:var(--secondary);max-width:12em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card .k{display:inline-flex;align-items:center;border:0;border-radius:999px;padding:1px 8px;background:var(--fill);color:var(--secondary);font-size:11px;font-weight:550}
.card .sm{font-size:15px;margin-top:5px;word-break:break-word;color:var(--label);font-weight:550;letter-spacing:-.01em;line-height:1.35}
.card .sn{font-size:12.5px;color:var(--tertiary);margin-top:5px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .tp{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.card .topic-chip{font-size:11px;color:var(--accent-text);background:var(--accent-soft);border-radius:999px;padding:2px 8px;font-weight:550}
.card-rel{font-size:11px;color:var(--tertiary);margin-top:6px}
.ledger-filters{display:flex;gap:var(--space-2);flex-wrap:wrap;align-items:center;margin:0 0 var(--space-4)}
.ledger-filters .bar{margin:0;flex:1;min-width:0}
.ledger-filters .bar input,.ledger-filters .bar select{height:34px;min-height:34px;border-radius:8px;font-size:13px}
.ledger-clear{height:34px;padding:0 12px;border:0;border-radius:8px;background:var(--fill);color:var(--secondary);font-size:12.5px;font-weight:550;cursor:pointer;display:none;align-items:center;gap:6px;transition:background 140ms,color 140ms,transform 100ms var(--ease-press)}
.ledger-clear.on{display:inline-flex}
.ledger-clear:hover{background:var(--fill-strong);color:var(--label)}
.ledger-clear:active{transform:scale(0.97)}
.ledger-tools{width:100%;max-width:var(--page-track);margin:0 auto}
.ledger-result-head{display:flex;align-items:center;justify-content:space-between;gap:var(--space-3);margin:0 0 var(--space-3);min-height:34px;scroll-margin-top:calc(var(--header-offset) + 12px)}
.ledger-result-head h2{font-size:13px;color:var(--secondary);font-weight:600;letter-spacing:0;line-height:1.2;margin:0}
.ledger-result-meta{display:flex;align-items:center;justify-content:flex-end;gap:var(--space-3);color:var(--tertiary);font-size:12px;line-height:1.2}
.ledger-page-size{display:flex;align-items:center;gap:6px;white-space:nowrap}
.ledger-page-size select{height:30px;min-width:64px;padding:0 24px 0 8px;background:var(--surface);border:0;border-radius:8px;color:var(--label);font-size:12px;box-shadow:inset 0 0 0 1px var(--separator-light)}
.ledger-pagination{display:flex;align-items:center;justify-content:center;gap:6px;min-height:38px;margin:var(--space-5) 0 4px;flex-wrap:wrap}
.ledger-pagination[hidden]{display:flex;visibility:hidden;pointer-events:none}
.ledger-page-btn{min-width:34px;height:34px;padding:0 10px;background:var(--surface);border:0;border-radius:8px;color:var(--secondary);font-size:12px;font-weight:550;cursor:pointer;box-shadow:inset 0 0 0 1px var(--separator-light);transition:background 140ms,color 140ms,transform 100ms var(--ease-press)}
.ledger-page-btn:hover:not(:disabled){color:var(--label);background:var(--surface-subtle)}
.ledger-page-btn:active:not(:disabled){transform:scale(.97)}
.ledger-page-btn.on{background:var(--accent-soft);color:var(--accent-text);box-shadow:inset 0 0 0 1px rgba(90,200,168,.35)}
.ledger-page-btn:disabled{opacity:.35}
.ledger-page-gap{min-width:20px;text-align:center;color:var(--tertiary);font-size:12px}

/* —— Daily report —— */
.report-head{display:flex;align-items:flex-end;justify-content:space-between;gap:var(--space-5);margin:0 0 var(--space-5)}
.report-head .ledger-head{margin:0;min-width:0}

.report-card+.report-card,.report-grid+.report-card{margin-top:var(--space-3)}
.report-grid>.report-card+.report-card{margin-top:0}
.report-card h2{font-size:16px;line-height:1.3;letter-spacing:-.015em;color:var(--label);margin:0}
.report-card-copy{font-size:12.5px;line-height:1.55;color:var(--secondary);margin-top:5px}
.report-actions{display:flex;align-items:center;gap:var(--space-2);flex-wrap:wrap;margin-top:var(--space-4)}

.report-steps{display:grid;gap:0;margin-top:var(--space-4)}

.report-step:last-child{border:0}.report-step span{font-size:11px;color:var(--tertiary)}.report-step b,.report-step code{font-size:12.5px;color:var(--label);font-weight:600;overflow-wrap:anywhere}

@media(max-width:760px){.report-grid{grid-template-columns:1fr}.report-grid>.report-card+.report-card{margin-top:0}}

#drawer .meta-chip{display:inline-flex;align-items:center;padding:4px 9px;border-radius:999px;background:var(--fill);color:var(--secondary);font-size:12px;font-weight:500}
#drawer .meta-chip b{color:var(--label);font-weight:600}
#drawer .ref-line{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11.5px;color:var(--tertiary);word-break:break-all;margin:0 0 16px;padding:10px 12px;background:var(--bg);border-radius:10px}
#drawer .section{margin:0 0 16px}
#drawer .section .gh{margin:0 0 8px;font-size:11px}
#drawer .section pre{background:var(--bg);border:0;border-radius:10px;padding:12px;font-size:12.5px;line-height:1.5;white-space:pre-wrap;word-break:break-word;margin:0;max-height:min(50vh,420px);overflow:auto;box-shadow:inset 0 0 0 1px var(--separator-light)}
.drawer-related-list{display:grid;gap:6px}.drawer-related{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:4px 10px;width:100%;padding:10px 11px;border:0;border-radius:9px;background:var(--bg);color:inherit;text-align:left;cursor:pointer;box-shadow:inset 0 0 0 1px var(--separator-light)}
.drawer-related:hover{background:var(--fill)}.drawer-related strong{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12.5px;color:var(--label)}.drawer-related-score{font:600 11px/1.4 ui-monospace,"SF Mono",Menlo,monospace;color:var(--accent-text)}.drawer-related-meta,.drawer-related-reason{grid-column:1/-1;font-size:11px;color:var(--tertiary);line-height:1.35}.drawer-related-reason{color:var(--secondary)}
#drawer .drawer-empty{padding:40px 10px;text-align:center;color:var(--tertiary)}
.empty{color:var(--tertiary);padding:40px 16px;text-align:center;font-size:14px;line-height:1.5;background:var(--surface);border-radius:var(--r-md)}
#dbody > .day-head,#tmembers > .day-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin:0 0 12px}
#dbody > .day-head h2,#tmembers > .day-head h2{font-size:18px;font-weight:700;letter-spacing:-.02em;color:var(--label)}
#dbody > .day-head span,#tmembers > .day-head span{font-size:13px;color:var(--secondary)}
.cell.has{transition:transform 100ms var(--ease-press),box-shadow 140ms}
.cell.has:active{transform:scale(0.92)}
.cell.today-mark{box-shadow:inset 0 0 0 1.5px var(--accent)!important}
.fcell{transition:filter 120ms}
.fcell:hover{filter:brightness(1.15)}
.toast-host{position:fixed;left:50%;bottom:calc(20px + env(safe-area-inset-bottom));transform:translateX(-50%);z-index:40;display:flex;flex-direction:column;gap:8px;pointer-events:none;width:min(420px,calc(100vw - 32px))}
.toast{pointer-events:auto;display:flex;align-items:flex-start;gap:10px;padding:12px 14px;background:var(--material-thick);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-radius:14px;box-shadow:var(--shadow);color:var(--label);font-size:13px;line-height:1.4;animation:toast-in 320ms var(--ease-out)}
.toast.is-out{animation:toast-out 220ms ease forwards}
.toast .t-ico{flex:0 0 auto;width:18px;height:18px;color:var(--accent);margin-top:1px}
.toast .t-ico svg{width:18px;height:18px}
.toast.error .t-ico{color:var(--danger)}
.toast.partial .t-ico{color:var(--warn)}
.toast .t-copy{min-width:0;flex:1}
.toast strong{display:block;font-weight:650;margin-bottom:2px}
.toast span{color:var(--secondary);font-size:12px}
@keyframes toast-in{from{opacity:0;transform:translateY(12px) scale(.98)}to{opacity:1;transform:none}}
@keyframes toast-out{to{opacity:0;transform:translateY(8px) scale(.98)}}
.admin-pane.on{animation:view-in 240ms var(--ease-out)}
.source-tile{transition:transform 100ms var(--ease-press)}
.source-tile:active{transform:scale(0.99)}
.switch:focus-visible{outline:2px solid rgba(90,200,168,.75);outline-offset:3px}
.fab,#tgraph,#drawer pre,.log{scrollbar-width:thin;scrollbar-color:var(--fill-strong) transparent}
@media(prefers-reduced-motion:reduce){
  .view.on,.admin-pane.on,.toast{animation:none!important}
  .card:hover .card-chevron{transform:none}
  #home-sync-btn.is-busy #home-sync-icon{animation:none}
}
/* —— Light theme —— */
html[data-theme="light"]{
  --bg:#F2F2F7;--bg-elevated:#FFFFFF;--bg-grouped:#E5E5EA;
  --surface:#FFFFFF;--surface-subtle:#F2F2F7;--surface-raised:#FFFFFF;
  --fill:rgba(120,120,128,.12);--fill-strong:rgba(120,120,128,.2);
  --label:#1C1C1E;--secondary:rgba(60,60,67,.64);--tertiary:rgba(60,60,67,.36);
  --separator:rgba(60,60,67,.22);--separator-light:rgba(60,60,67,.12);
  --accent:#0F8A6A;--accent-soft:rgba(15,138,106,.12);--accent-text:#0F8A6A;
  --danger:#D70015;--warn:#B25000;--ok:#248A3D;
  --shadow:0 18px 50px rgba(0,0,0,.12);--shadow-soft:0 1px 0 rgba(255,255,255,.9) inset;
  --material:rgba(242,242,247,.78);--material-thick:rgba(255,255,255,.92);
  --scrim:rgba(0,0,0,.28);
  --ink:var(--bg);--panel:var(--surface);--panel2:var(--surface-subtle);--panel3:var(--bg-elevated);
  --line:var(--separator-light);--line2:var(--separator);
  --tx:var(--label);--mut:var(--secondary);--dim:var(--tertiary);
  --warm:#A86C19;--cool:var(--accent);--blue:#007AFF;--bad:var(--danger);
  --text:var(--label);--text-secondary:var(--secondary);--border:var(--separator-light);--border-strong:var(--separator);
  background:var(--bg);color-scheme:light
}
html[data-theme="light"] body{background:var(--bg)}
html[data-theme="light"] nav button.on{box-shadow:0 1px 2px rgba(0,0,0,.06),var(--shadow-soft)}
html[data-theme="light"] .hdr-search{background:rgba(120,120,128,.12)}
html[data-theme="light"] .hdr-search:focus-within{background:#fff}
html[data-theme="light"] .search-pop{box-shadow:0 18px 48px rgba(0,0,0,.14),inset 0 1px 0 var(--separator-light)}
html[data-theme="light"] .hdr-kbd{background:#fff}
html[data-theme="light"] .act.primary{color:#fff}
html[data-theme="light"] .act.primary:hover{color:#fff}
html[data-theme="light"] .cell.h3{color:#043528}
html[data-theme="light"] .pill.warn{color:#B25000}
html[data-theme="light"] .source-tile,html[data-theme="light"] .config-item,
html[data-theme="light"] .boundary-card,html[data-theme="light"] .data-stat,
html[data-theme="light"] .identity-group,html[data-theme="light"] .backup-overview,
html[data-theme="light"] .credential-note{background:var(--surface-subtle)}
html[data-theme="light"] .form input:not([type=checkbox]),
html[data-theme="light"] .form select,
html[data-theme="light"] .field input:not([type=checkbox]),
html[data-theme="light"] .field select,
html[data-theme="light"] .panel-tools input,
html[data-theme="light"] .log,
html[data-theme="light"] #drawer pre,
html[data-theme="light"] .checkline input[type=checkbox]{background:#fff}

@media(prefers-reduced-transparency:reduce){
  header,.modal-panel,#drawer{background:var(--surface);backdrop-filter:none;-webkit-backdrop-filter:none}
  .modal-backdrop,.drawer-backdrop{backdrop-filter:none;-webkit-backdrop-filter:none}
}
@media(prefers-contrast:more){
  .stat,.card,.panel,.cal,.fab,#tgraph,.answer,.source-tile,.sync-card{
    box-shadow:inset 0 0 0 1px var(--separator)
  }
  .act,.bar input,.bar select,.spot input{box-shadow:inset 0 0 0 1.5px var(--separator)}
}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{
    animation-duration:.01ms!important;animation-iteration-count:1!important;
    scroll-behavior:auto!important;transition-duration:.01ms!important
  }
  .card:hover,.act:active,nav button:active,.icon-btn:active,#drawer .x:active{transform:none}
  .modal-backdrop,.modal-panel{animation:none}
}
</style>
</head>

<script>
const LANGUAGE_PREF=localStorage.getItem('loom_lang')||'system';
const SYSTEM_LANG=(navigator.language||'zh').toLowerCase().startsWith('zh')?'zh':'en';
const LANG=LANGUAGE_PREF==='system'?SYSTEM_LANG:LANGUAGE_PREF;
const T=(zh,en)=>LANG==='en'?en:zh;
const $=s=>document.querySelector(s);
async function jsonResponse(r){
  const raw=await r.text();let data={};
  if(raw){try{data=JSON.parse(raw)}catch(e){
    const err=new Error(T(`服务返回了无法解析的响应 (HTTP ${r.status})`,`The service returned an invalid response (HTTP ${r.status})`));err.status=r.status;err.cause=e;throw err}}
  if(!r.ok){
    const detail=data.message||data.error||r.statusText||T('请求失败','Request failed');
    const err=new Error(`${detail} (HTTP ${r.status})`);err.status=r.status;err.payload=data;throw err
  }
  return data
}
async function api(p,o={}){
  const q=new URLSearchParams(o).toString();
  const r=await fetch(p+(q?'?'+q:''),{headers:{'X-Loom-Token':sessionStorage.getItem('loom_admin_token')||''}});
  return jsonResponse(r)
}
const bootParams=new URLSearchParams(location.search),bootToken=bootParams.get('token');
if(bootToken){sessionStorage.setItem('loom_admin_token',bootToken);history.replaceState(null,'',location.pathname+location.hash)}
const post=(p,o)=>fetch(p,{method:'POST',headers:{'Content-Type':'application/json',
  'X-Loom-Token':sessionStorage.getItem('loom_admin_token')||''},body:JSON.stringify(o)}).then(async r=>{
    const data=await r.json();
    if(r.status===403&&!data.message)data.message=T('管理会话已失效,请从 loom serve 输出的地址重新打开','Admin session expired; reopen the URL printed by loom serve');
    return data});
document.addEventListener('DOMContentLoaded',()=>{
  document.documentElement.lang=LANG==='en'?'en':'zh-CN';
  document.querySelectorAll('[data-t]').forEach(el=>{const[z,e]=el.dataset.t.split('|');el.textContent=T(z,e)});
  const nav=document.querySelector('nav');if(nav)nav.setAttribute('aria-label',T('主要导航','Primary navigation'));
  $('#search-pop-body').setAttribute('aria-label',T('搜索结果','Search results'));
  const q=$('#q');
  q.placeholder=T('搜索记录…','Search records…');q.setAttribute('aria-label',T('搜索记录','Search records'));
  const applePlatform=/Mac|iPhone|iPad|iPod/.test(navigator.platform||navigator.userAgent);q.setAttribute('aria-keyshortcuts',applePlatform?'Meta+K':'Control+K');$('#hdr-search-kbd').textContent=applePlatform?'⌘K':'Ctrl K';
  $('#hdr-search-ico').innerHTML=icon('search');
  $('#home-sync-icon').innerHTML=icon('sync');
  $('#report-command').textContent=T('loom report set <日期> --file <日报.md>','loom report set <date> --file <report.md>');
  $('#ledger-pagination').setAttribute('aria-label',T('记录分页','Records pagination'));
  const languageSelect=$('#language-select');languageSelect.value=LANGUAGE_PREF;languageSelect.onchange=()=>{const value=languageSelect.value;if(value==='system')localStorage.removeItem('loom_lang');else localStorage.setItem('loom_lang',value);location.reload()};
  const tb=$('#themebtn');
  const paintTheme=()=>{const light=document.documentElement.dataset.theme==='light';tb.innerHTML=icon(light?'sun':'moon');tb.title=T(light?'切换到暗色':'切换到亮色',light?'Switch to dark':'Switch to light');tb.setAttribute('aria-label',tb.title);document.querySelector('meta[name=theme-color]').content=light?'#F2F2F7':'#000000'};
  paintTheme();
  tb.onclick=()=>{const next=document.documentElement.dataset.theme==='light'?'dark':'light';document.documentElement.dataset.theme=next;localStorage.setItem('loom_theme',next);paintTheme()};
  bindGlobalSearch();
});
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const KIND_LABEL={
  session:['会话','Session'],commit:['提交','Commit'],doc:['文档','Doc'],
  note:['笔记','Note'],report:['日报','Report'],requirement:['需求','Req']
};
function kindLabel(k){const p=KIND_LABEL[k];return p?T(p[0],p[1]):(k||'')}
function todayISO(d=new Date()){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function relLabel(e){
  const raw=e.ts||(e.date?e.date+'T12:00:00':''),t=raw?Date.parse(raw):NaN;
  if(!Number.isFinite(t))return '';
  const sec=Math.round((Date.now()-t)/1000);
  if(sec<60)return T('刚刚','just now');
  if(sec<3600)return T(Math.floor(sec/60)+' 分钟前',Math.floor(sec/60)+'m ago');
  if(sec<86400)return T(Math.floor(sec/3600)+' 小时前',Math.floor(sec/3600)+'h ago');
  if(sec<86400*7)return T(Math.floor(sec/86400)+' 天前',Math.floor(sec/86400)+'d ago');
  return '';
}
function cardKey(ev){if(ev.key==='Enter'||ev.key===' '){ev.preventDefault();ev.currentTarget.click()}}
function card(e){
  const id=String(e.id||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const isToday=e.date===todayISO();
  const rel=relLabel(e);
  const meta=[
    `<span class="d${isToday?' is-today':''}">${esc(e.date||'—')}</span>`,
    e.project?`<span class="proj" title="${esc(e.project)}">${esc(e.project)}</span>`:'',
    `<span class="k">${esc(kindLabel(e.kind))}</span>`,
    e.tool?`<span class="tool">${esc(sourceLabel(e.tool))}</span>`:''
  ].filter(Boolean).map((m,i)=>`<span class="meta-item">${i?'<i class="sep">·</i>':''}${m}</span>`).join('');
  const topics=(e.topics&&e.topics.length)?`<div class="tp">${e.topics.slice(0,4).map(t=>`<span class="topic-chip">${esc(t)}</span>`).join('')}${e.topics.length>4?`<span class="topic-chip">+${e.topics.length-4}</span>`:''}</div>`:'';
  return `<article class="card" role="button" tabindex="0" data-id="${esc(e.id)}" onclick="detail('${id}')" onkeydown="cardKey(event)">
  <div class="card-main">
    <div class="top">${meta}</div>
    <div class="sm">${esc(e.summary||'')}</div>
    ${e.snip?`<div class="sn">${esc(e.snip)}</div>`:''}
    ${topics}
    ${rel?`<div class="card-rel">${esc(rel)}</div>`:''}
  </div>
  <span class="card-chevron" aria-hidden="true">${icon('chevron')}</span>
</article>`}
function groups(g){
  const order=['report','session','commit','doc','note','requirement'];
  const keys=[...new Set([...order.filter(k=>g[k]),...Object.keys(g)])];
  return keys.map(k=>`<div class="gh">${esc(kindLabel(k))} · ${g[k].length}</div>`+g[k].map(card).join('')).join('')||`<div class="empty">${T('没有记录','No records')}</div>`
}
function skeletonList(n=5){
  return `<div class="list-loading" aria-hidden="true">${Array.from({length:n},()=>`<div class="sk-row"><div class="sk sk-line w40"></div><div class="sk sk-line w90"></div><div class="sk sk-line w70"></div></div>`).join('')}</div>`
}
function toast(title,detail,kind=''){
  const host=$('#toast-host');if(!host)return;
  const el=document.createElement('div');
  el.className='toast '+(kind||'');
  el.innerHTML=`<span class="t-ico">${icon(kind==='error'?'close':'sync')}</span><div class="t-copy"><strong>${esc(title)}</strong>${detail?`<span>${esc(detail)}</span>`:''}</div>`;
  host.appendChild(el);
  setTimeout(()=>{el.classList.add('is-out');setTimeout(()=>el.remove(),240)},kind==='error'?5200:3600);
}
function lockScroll(on){document.documentElement.classList.toggle('is-locked',!!on)}
function updateLedgerClear(){const btn=$('#ledger-clear');if(btn)btn.classList.toggle('on',ledgerHasFilters())}
function clearLedgerFilters(){
  $('#q').value='';$('#f-tool').value='';$('#f-since').value='';$('#f-until').value='';
  updateLedgerClear();doSearch(true);$('#q').focus()
}
function openLedger(opts={}){
  if(opts.reset){$('#q').value='';$('#f-tool').value='';$('#f-since').value='';$('#f-until').value=''}
  if(opts.tool!=null)$('#f-tool').value=opts.tool;
  if(opts.q!=null)$('#q').value=opts.q;
  if(opts.since!=null)$('#f-since').value=opts.since;
  if(opts.until!=null)$('#f-until').value=opts.until;
  showView('ledger',true);
  window._l=1;updateLedgerClear();doSearch(true);
  closeSearchPop();
}

/* —— Global header search (⌘K, no navigation) —— */
let GSEARCH_SEQ=0,GSEARCH_HITS=[],GSEARCH_IDX=-1,gdeb,GSEARCH_SILENT_FOCUS=false;
function searchPopOpen(){
  const box=$('#search-pop'),wrap=$('#hdr-search'),q=$('#q');
  if(!box||box.hidden===false&&wrap.classList.contains('is-open'))return;
  box.hidden=false;wrap.classList.add('is-open');q.setAttribute('aria-expanded','true');
}
function closeSearchPop(){
  const box=$('#search-pop'),wrap=$('#hdr-search'),q=$('#q');
  if(!box)return;
  box.hidden=true;wrap.classList.remove('is-open');q.setAttribute('aria-expanded','false');q.removeAttribute('aria-activedescendant');
  GSEARCH_IDX=-1;
}
function focusGlobalSearch(){
  const q=$('#q');if(!q)return;
  if($('#source-config')&&$('#source-config').classList.contains('on'))return;
  if($('#drawer')&&$('#drawer').classList.contains('on'))drawer(false,false);
  const wasFocused=document.activeElement===q;
  q.focus({preventScroll:true});q.select();
  if(!wasFocused)return; // focus 事件已经设置当前界面的搜索状态
  if(viewFromHash()==='ledger'){closeSearchPop();return}
  if(q.value.trim())runGlobalSearch();
  else{renderSearchIdle();searchPopOpen()}
}
function renderSearchIdle(){
  $('#search-pop-body').innerHTML=`<div class="search-empty">${T('输入关键词，即时查找记录','Type to search records instantly')}</div>`;
  $('#search-pop-foot').hidden=true;
}
function renderSearchLoading(){
  $('#search-pop-body').innerHTML=`<div class="search-empty">${T('搜索中…','Searching…')}</div>`;
  $('#search-pop-foot').hidden=true;
}
function renderSearchHits(hits,total,q){
  GSEARCH_HITS=hits||[];GSEARCH_IDX=GSEARCH_HITS.length?0:-1;
  if(!GSEARCH_HITS.length){
    $('#search-pop-body').innerHTML=`<div class="search-empty">${T('没有匹配的记录','No matching records')}</div>`;
    const foot=$('#search-pop-foot');
    foot.hidden=false;
    foot.innerHTML=`<button type="button" onclick="openLedger({reset:true,q:'${esc(q).replace(/'/g,"\\'")}'})">${T('在记录页中搜索','Search in Records')}</button>`;
    return;
  }
  $('#search-pop-body').innerHTML=GSEARCH_HITS.map((e,i)=>searchHit(e,i)).join('');
  paintSearchActive();
  const foot=$('#search-pop-foot');
  foot.hidden=false;
  const more=total>GSEARCH_HITS.length;
  foot.innerHTML=`<button type="button" class="primary" onclick="openLedger({reset:true,q:'${esc(q).replace(/'/g,"\\'")}'})">${more?T(`查看全部 ${total} 条记录`,`View all ${total} records`):T('打开记录页','Open Records')}</button>`;
}
function focusSearchSilently(){
  const q=$('#q');if(!q)return;
  GSEARCH_SILENT_FOCUS=true;
  try{q.focus({preventScroll:true})}finally{GSEARCH_SILENT_FOCUS=false}
}
function openSearchDetail(id){const q=$('#q');closeSearchPop();detail(id,q)}
function searchHit(e,i){
  const id=String(e.id||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  return `<button type="button" class="search-hit" role="option" data-i="${i}" id="sh-${i}" onclick="openSearchDetail('${id}')">
    <div class="search-hit-main">
      <div class="sh-top"><span>${esc(e.date||'—')}</span>${e.project?`<span>${esc(e.project)}</span>`:''}<span>${esc(kindLabel(e.kind))}</span>${e.tool?`<span>${esc(sourceLabel(e.tool))}</span>`:''}</div>
      <div class="sh-sum">${esc(e.summary||'')}</div>
      ${e.snip?`<div class="sh-snip">${esc(e.snip)}</div>`:''}
    </div>
  </button>`}
function paintSearchActive(){
  const q=$('#q');
  document.querySelectorAll('.search-hit').forEach((el,i)=>{
    el.classList.toggle('is-active',i===GSEARCH_IDX);
    el.setAttribute('aria-selected',i===GSEARCH_IDX?'true':'false');
    if(i===GSEARCH_IDX){q.setAttribute('aria-activedescendant',el.id);el.scrollIntoView({block:'nearest'})}
  });
}
async function runGlobalSearch(){
  const q=$('#q').value.trim();
  searchPopOpen();
  if(!q){renderSearchIdle();return}
  const seq=++GSEARCH_SEQ;
  renderSearchLoading();
  try{
    const r=await api('/api/search',{q,page:1,page_size:8});
    if(seq!==GSEARCH_SEQ)return;
    renderSearchHits(r.hits||[],r.total||0,q);
  }catch(e){
    if(seq!==GSEARCH_SEQ)return;
    $('#search-pop-body').innerHTML=`<div class="search-empty">${esc(e.message||T('搜索失败','Search failed'))}</div>`;
    $('#search-pop-foot').hidden=true;
  }
}
function bindGlobalSearch(){
  const q=$('#q'), wrap=$('#hdr-search');
  if(!q)return;
  q.addEventListener('focus',()=>{
    if(GSEARCH_SILENT_FOCUS)return;
    if($('#drawer')&&$('#drawer').classList.contains('on'))drawer(false,false);
    if(viewFromHash()==='ledger'){closeSearchPop();return}
    if(q.value.trim())runGlobalSearch();else{renderSearchIdle();searchPopOpen()}
  });
  q.addEventListener('input',()=>{
    clearTimeout(gdeb);clearTimeout(deb);GSEARCH_SEQ++; // 立即作废仍在途中的旧关键词请求
    if(viewFromHash()==='ledger'){
      closeSearchPop();
      deb=setTimeout(()=>doSearch(true),220);
      return;
    }
    gdeb=setTimeout(runGlobalSearch,160);
  });
  q.addEventListener('keydown',e=>{
    const open=$('#search-pop')&&!$('#search-pop').hidden;
    if(e.key==='ArrowDown'&&open){e.preventDefault();if(!GSEARCH_HITS.length)return;GSEARCH_IDX=Math.min(GSEARCH_HITS.length-1,GSEARCH_IDX+1);paintSearchActive();return}
    if(e.key==='ArrowUp'&&open){e.preventDefault();if(!GSEARCH_HITS.length)return;GSEARCH_IDX=Math.max(0,GSEARCH_IDX-1);paintSearchActive();return}
    if(e.key==='Enter'){
      if(open&&GSEARCH_IDX>=0&&GSEARCH_HITS[GSEARCH_IDX]){e.preventDefault();openSearchDetail(GSEARCH_HITS[GSEARCH_IDX].id);return}
      if(viewFromHash()==='ledger'){e.preventDefault();doSearch(true);return}
      if(q.value.trim()){e.preventDefault();openLedger({reset:true,q:q.value.trim()});return}
    }
    if(e.key==='Escape'){
      e.preventDefault();
      if(open){closeSearchPop();return}
      if(q.value){q.value='';updateLedgerClear();if(viewFromHash()==='ledger')doSearch(true)}
      q.blur();
    }
  });
  wrap.addEventListener('focusout',()=>{
    setTimeout(()=>{if(!wrap.contains(document.activeElement))closeSearchPop()},0)
  });
  document.addEventListener('pointerdown',e=>{
    if(!wrap.contains(e.target))closeSearchPop();
  });
}

// 视图切换
const ROUTES={home:'home',ledger:'ledger',search:'ledger',topics:'topics',calendar:'calendar',days:'calendar',report:'report',admin:'admin'};
const VIEW_TITLES={home:['首页','Home'],ledger:['记录','Records'],topics:['主题','Topics'],calendar:['日历','Calendar'],report:['日报','Daily report'],admin:['管理','Admin']};
function viewFromHash(){const h=(location.hash||'#home').slice(1);return ROUTES[h]||'home'}
function setViewTitle(v){const [zh,en]=VIEW_TITLES[v]||VIEW_TITLES.home;document.title=`loom · ${T(zh,en)}`}
function showView(v,pushUrl=false){
  v=ROUTES[v]||'home';
  const current=document.querySelector('.view.on');
  if(current&&current.id!=='v-'+v)window.scrollTo(0,0);
  drawer(false,false);
  closeSourceConfig();
  closeSearchPop();
  document.querySelectorAll('nav button[data-v]').forEach(b=>{
    const on=b.dataset.v===v;
    b.classList.toggle('on',on);
    if(on){b.setAttribute('aria-current','page');if(matchMedia('(max-width:720px)').matches)setTimeout(()=>b.scrollIntoView({block:'nearest',inline:'nearest'}),0)}else b.removeAttribute('aria-current');
  });
  document.querySelectorAll('.view').forEach(x=>x.classList.toggle('on',x.id==='v-'+v));
  setViewTitle(v);
  if(pushUrl&&location.hash!=='#'+v)history.pushState(null,'','#'+v);
  if(v==='ledger'&&!window._l){window._l=1;doSearch()}
  if(v==='topics'&&!window._t){window._t=1;loadTopics()}

// ---- 主题:横向层级 DAG + 自动结构关联矩阵 ----
const NW=n=>{let w=14;for(const ch of n.name)w+=ch.charCodeAt(0)>255?14:8;
  return w+String(n.count).length*7.5+(n.multi?16:0)+22}
function setTopicMode(mode){
