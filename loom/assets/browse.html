<title>loom · 台账浏览</title>
<style>
:root{--ink:#0F1218;--panel:#171B23;--panel2:#1D222C;--line:#2A313D;
  --tx:#E8EAED;--mut:#8A93A3;--dim:#5C6673;--warm:#E0A84E;--cool:#5AA9A0;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--ink);color:var(--tx);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
  line-height:1.55;font-feature-settings:"tnum" 1;}
.mono{font-family:ui-monospace,Menlo,Consolas,monospace}
a{color:var(--cool);text-decoration:none}
.wrap{max-width:1120px;margin:0 auto;padding:18px 20px 80px}
header{display:flex;align-items:center;gap:14px;padding:6px 0 16px;border-bottom:1px solid var(--line)}
header svg{width:34px;height:34px}
header .nm{font-size:19px;font-weight:700;background:linear-gradient(92deg,var(--warm),var(--cool));
  -webkit-background-clip:text;background-clip:text;color:transparent}
nav{display:flex;gap:6px;margin-left:auto}
nav button{background:var(--panel);border:1px solid var(--line);border-radius:999px;color:var(--mut);
  padding:6px 16px;font-size:13px;cursor:pointer}
nav button.on{color:var(--warm);border-color:var(--warm)}
.view{display:none;padding-top:16px}.view.on{display:block}
/* 首页 Dashboard */
.spot{max-width:660px;margin:34px auto 8px;position:relative}
.spot input{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:14px;
  color:var(--tx);padding:16px 52px 16px 20px;font-size:16px;outline:none;transition:all .15s}
.spot input:focus{border-color:var(--warm);box-shadow:0 0 0 3px rgba(224,168,78,.12),0 8px 32px rgba(0,0,0,.35)}
.spot .kbd{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--dim);
  font-size:11px;border:1px solid var(--line);border-radius:6px;padding:2px 7px;font-family:ui-monospace,monospace}
.subq{text-align:center;color:var(--dim);font-size:12.5px;margin-bottom:26px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:760px;margin:0 auto 26px}
@media(max-width:640px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:14px 8px;text-align:center}
.stat .n{font-size:27px;font-weight:750;letter-spacing:-.02em;
  background:linear-gradient(92deg,var(--warm),var(--cool));-webkit-background-clip:text;background-clip:text;color:transparent}
.stat .l{font-size:11.5px;color:var(--mut);margin-top:2px;letter-spacing:.08em}
.fab{background:linear-gradient(180deg,#12161e,#0d1117);border:1px solid var(--line);border-radius:14px;
  padding:16px 18px 12px;max-width:760px;margin:0 auto 22px;overflow-x:auto}
.fab svg{width:100%;height:auto;display:block}
.fab .ft{font-size:12px;color:var(--mut);letter-spacing:.08em;margin-bottom:10px}
.fab .ft b{color:var(--warm);font-weight:600}
.fcell{cursor:pointer}
.fcell:hover{stroke:var(--cool);stroke-width:1.5}
.threads{max-width:760px;margin:0 auto 10px}
.th-row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.th-row .tl{width:70px;font-size:12px;color:var(--mut);text-align:right;font-family:ui-monospace,monospace}
.th-row .tb{flex:1;height:8px;border-radius:4px;background:var(--panel2);overflow:hidden}
.th-row .tb i{display:block;height:100%;border-radius:4px;
  background:linear-gradient(90deg,var(--warm),var(--cool))}
.th-row .tc{width:44px;font-size:11.5px;color:var(--dim);font-family:ui-monospace,monospace}
/* 搜索 */
.bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.bar input,.bar select{background:var(--panel);border:1px solid var(--line);border-radius:9px;
  color:var(--tx);padding:9px 12px;font-size:14px}
.bar input[type=search]{flex:1;min-width:220px}
.hint{color:var(--dim);font-size:12px;margin-bottom:10px}
/* 卡片 */
.card{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:11px 14px;
  margin-bottom:8px;cursor:pointer}
.card:hover{border-color:var(--cool)}
.card .top{display:flex;gap:8px;align-items:baseline;flex-wrap:wrap;font-size:12px;color:var(--mut)}
.card .top .d{color:var(--warm)}
.card .top .k{border:1px solid var(--line);border-radius:999px;padding:0 8px}
.card .sm{font-size:14px;margin-top:3px;word-break:break-all}
.card .sn{font-size:12px;color:var(--dim);margin-top:3px}
.card .tp{font-size:11px;color:var(--cool);margin-top:3px}
.gh{font-size:13px;color:var(--warm);margin:16px 0 8px;letter-spacing:.06em}
/* 主题图 */
#tgraph{background:linear-gradient(180deg,#12161e,#0d1117);border:1px solid var(--line);
  border-radius:14px;overflow-x:auto;margin-bottom:16px;padding:10px 6px}
#tgraph svg{display:block}
.gnode{cursor:pointer}
.gnode rect{stroke-width:1.2;rx:16;transition:all .12s}
.gnode:hover rect{stroke:var(--cool);filter:brightness(1.15)}
.gnode.on rect{stroke:var(--warm);stroke-width:1.8}
.gnode text{fill:var(--tx);font-size:13px;font-family:system-ui,sans-serif;font-weight:500}
.gnode .cnt{fill:var(--ink);font-size:10.5px;font-weight:700;font-family:ui-monospace,monospace}
.gnode.on text{fill:var(--warm)}
.gedge{fill:none;stroke:#333d4b;stroke-width:1.5;opacity:.85}
.gedge.hl{stroke:var(--cool);stroke-width:2.4;opacity:1}
.loose{color:var(--dim);font-size:12px;margin:-6px 0 14px}
.loose b{color:var(--mut);font-weight:500;cursor:pointer}
.loose b:hover{color:var(--warm)}
/* 日历 */
.cols{display:grid;grid-template-columns:320px 1fr;gap:20px}
@media(max-width:800px){.cols{grid-template-columns:1fr}}
.cal{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:12px}
.cal .mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal .mh span{font-size:14px;color:var(--tx);font-weight:600;letter-spacing:.04em}
.cal .mh button{background:var(--panel2);border:1px solid var(--line);border-radius:8px;
  color:var(--mut);width:30px;height:28px;cursor:pointer;font-size:14px}
.cal .mh button:hover:not(:disabled){color:var(--warm);border-color:var(--warm)}
.cal .mh button:disabled{opacity:.3;cursor:default}
.cell{aspect-ratio:1;font-size:13px}
.cal .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal .wd{font-size:10px;color:var(--dim);text-align:center;padding-bottom:2px}
.cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:7px;
  font-size:12px;color:var(--dim);position:relative}
.cell.has{cursor:pointer;color:var(--tx)}
.cell.h1{background:rgba(224,168,78,.14)}
.cell.h2{background:rgba(224,168,78,.32)}
.cell.h3{background:rgba(224,168,78,.55);color:#1a1408}
.cell.has:hover,.cell.on{outline:2px solid var(--warm);outline-offset:-1px}
.legend{display:flex;gap:6px;align-items:center;font-size:11px;color:var(--dim);margin:2px 2px 10px}
.legend i{width:12px;height:12px;border-radius:3px;display:inline-block}
/* 详情抽屉 */
#drawer{position:fixed;top:0;right:-560px;width:min(560px,92vw);height:100vh;background:var(--panel2);
  border-left:1px solid var(--line);transition:right .18s;overflow-y:auto;padding:20px;z-index:9}
#drawer.on{right:0}
#drawer h3{font-size:15px;margin-bottom:10px;word-break:break-all}
#drawer .meta{font-size:12px;color:var(--mut);margin-bottom:12px}
#drawer pre{background:var(--ink);border:1px solid var(--line);border-radius:9px;padding:12px;
  font-size:12px;white-space:pre-wrap;word-break:break-all;margin:8px 0;max-height:50vh;overflow:auto}
#drawer .x{position:sticky;top:0;float:right;background:var(--panel);border:1px solid var(--line);
  border-radius:999px;color:var(--mut);width:30px;height:30px;cursor:pointer}
.empty{color:var(--dim);padding:30px 0;text-align:center}
</style>
</head>
<body>
<div class="wrap">
<header>
  <svg viewBox="0 0 100 100"><rect x="2" y="2" width="96" height="96" rx="22" fill="#141821" stroke="#2A313D"/>
  <g fill="#5AA9A0"><rect x="14" y="21.5" width="72" height="9" rx="4.5"/><rect x="14" y="45.5" width="72" height="9" rx="4.5"/><rect x="14" y="69.5" width="72" height="9" rx="4.5"/></g>
  <g fill="#E0A84E"><rect x="21.5" y="14" width="9" height="72" rx="4.5"/><rect x="45.5" y="14" width="9" height="72" rx="4.5"/><rect x="69.5" y="14" width="9" height="72" rx="4.5"/></g>
  <g fill="#5AA9A0"><rect x="45.5" y="21.5" width="9" height="9" rx="2.5"/><rect x="21.5" y="45.5" width="9" height="9" rx="2.5"/><rect x="69.5" y="45.5" width="9" height="9" rx="2.5"/><rect x="45.5" y="69.5" width="9" height="9" rx="2.5"/></g></svg>
  <span class="nm">loom</span><span style="color:var(--dim);font-size:13px" data-t="台账浏览|ledger browser"></span>
  <nav>
    <button data-v="search" class="on">🔍 <span data-t="搜索|Search"></span></button>
    <button data-v="topics">🧵 <span data-t="主题|Topics"></span></button>
    <button data-v="days">📅 <span data-t="按天|Days"></span></button>
    <button id="langbtn" title="switch language"></button>
  </nav>
</header>

<div id="v-search" class="view on">
  <div class="spot"><input type="search" id="q" autofocus>
    <span class="kbd">⌘K</span></div>
  <div class="subq" id="subq"></div>
  <div id="dash">
    <div class="stats" id="stats"></div>
    <div class="fab" id="fabric"></div>
    <div class="threads" id="threads"></div>
    <div style="max-width:760px;margin:18px auto 0"><div class="gh" style="margin-top:0">⏱ <span data-t="最近入账|Recent"></span></div><div id="recent"></div></div>
  </div>
  <div id="rwrap" style="display:none">
    <div class="bar" style="max-width:760px;margin:0 auto 10px">
      <select id="f-tool"><option value="" data-t="全部工具|All tools"></option></select>
      <input id="f-since" type="date" title="起始日期">
      <input id="f-until" type="date" title="截止日期">
    </div>
    <div id="r-search" style="max-width:760px;margin:0 auto"></div>
  </div>
</div>

<div id="v-topics" class="view">
  <div id="tgraph"></div>
  <div class="loose" id="tloose"></div>
  <div id="tmembers"><div class="empty" data-t="↑ 点图里的主题节点,看这件事的全景(含子树上卷)|↑ Click a topic node to see everything about it (subtree rolled up)"></div></div>
</div>

<div id="v-days" class="view">
  <div class="cols">
    <div id="cals"></div>
    <div id="dbody"><div class="empty" data-t="← 点日历上有热力的日期|← Pick a highlighted date on the calendar"></div></div>
  </div>
</div>
</div>

<div id="drawer"><button class="x" onclick="drawer(false)">✕</button><div id="dctn"></div></div>

<script>
const LANG=localStorage.getItem('loom_lang')||'zh';
const T=(zh,en)=>LANG==='en'?en:zh;
const $=s=>document.querySelector(s), api=(p,o)=>fetch(p+'?'+new URLSearchParams(o)).then(r=>r.json());
document.addEventListener('DOMContentLoaded',()=>{
  document.querySelectorAll('[data-t]').forEach(el=>{const[z,e]=el.dataset.t.split('|');el.textContent=T(z,e)});
  $('#q').placeholder=T('搜你做过的任何事…(中文子串可用)','Search anything you did… (CJK substring OK)');
  $('#subq').textContent=T('一份台账,织进了你的全部工作痕迹','One ledger, woven from all your work traces');
  const b=$('#langbtn');b.textContent=T('EN','中');
  b.onclick=()=>{localStorage.setItem('loom_lang',LANG==='zh'?'en':'zh');location.reload()};
});
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const KIND={session:'💬',commit:'💻',doc:'📄',note:'📎',report:'📋',requirement:'📥'};
function card(e){return `<div class="card" onclick="detail('${esc(e.id).replace(/'/g,"\\'")}')">
  <div class="top"><span class="d">${esc(e.date)}</span><span>${esc(e.project)}</span>
  <span class="k">${KIND[e.kind]||''} ${esc(e.kind)}</span><span>${esc(e.tool)}</span></div>
  <div class="sm">${esc(e.summary)}</div>
  ${e.snip?`<div class="sn">↳ ${esc(e.snip)}</div>`:''}
  ${e.topics&&e.topics.length?`<div class="tp">🧵 ${e.topics.map(esc).join(' · ')}</div>`:''}</div>`}
function groups(g){const order=['report','session','commit','doc','note','requirement'];
  const keys=[...new Set([...order.filter(k=>g[k]),...Object.keys(g)])];
  return keys.map(k=>`<div class="gh">${KIND[k]||''} ${esc(k)} (${g[k].length})</div>`+g[k].map(card).join('')).join('')||`<div class="empty">${T('空','Empty')}</div>`}

// 视图切换
document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('nav button').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); $('#v-'+b.dataset.v).classList.add('on');
  if(b.dataset.v==='topics'&&!window._t){window._t=1;loadTopics()}
  if(b.dataset.v==='days'&&!window._d){window._d=1;loadDays()}
});

// ---- 首页:搜索 + Dashboard ----
let deb;
function mode(searching){$('#dash').style.display=searching?'none':'';
  $('#rwrap').style.display=searching?'':'none';
  $('#subq').textContent=searching?T('Esc 清空返回总览','Esc to clear and return')
    :T('一份台账,织进了你的全部工作痕迹','One ledger, woven from all your work traces')}
async function doSearch(){
  const q=$('#q').value.trim(),f=$('#f-tool').value||$('#f-since').value||$('#f-until').value;
  if(!q&&!f){mode(false);return}
  mode(true);
  const r=await api('/api/search',{q,tool:$('#f-tool').value,
    since:$('#f-since').value,until:$('#f-until').value,limit:80});
  $('#r-search').innerHTML=r.hits.map(card).join('')||`<div class="empty">${T('无命中','No hits')}</div>`}
$('#q').addEventListener('input',()=>{clearTimeout(deb);deb=setTimeout(doSearch,280)});
['#f-tool','#f-since','#f-until'].forEach(s=>$(s).onchange=doSearch);
['git','claude','codex','cursor','feishu','docs','notes','日报'].forEach(t=>{
  const o=document.createElement('option');o.value=t;o.textContent=t;$('#f-tool').appendChild(o)});
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();$('#q').focus()}
  if(e.key==='Escape'&&document.activeElement===$('#q')){$('#q').value='';mode(false)}});

function countUp(el,n){const t0=performance.now();
  const step=t=>{const p=Math.min(1,(t-t0)/650);
    el.textContent=Math.round(n*(1-Math.pow(1-p,3))).toLocaleString();
    if(p<1)requestAnimationFrame(step)};requestAnimationFrame(step)}

async function loadDash(){
  const [st,dy]=await Promise.all([api('/api/stats',{}),api('/api/days',{})]);
  // 统计带
  $('#stats').innerHTML=[[T('条记录','entries'),st.entries],[T('个活跃天','active days'),st.days],[T('个主题','topics'),st.topics],[T('条已归类','classified'),st.tagged]]
    .map(([l,n])=>`<div class="stat"><div class="n" data-n="${n}">0</div><div class="l">${l}</div></div>`).join('');
  document.querySelectorAll('.stat .n').forEach(el=>countUp(el,+el.dataset.n));
  // 织物贡献图:26 周 × 7 天
  const cnt={};dy.days.forEach(d=>cnt[d.date]=d.count);
  const end=new Date(),cells=[];
  const day0=new Date(end);day0.setDate(end.getDate()-((end.getDay()+6)%7));  // 本周一
  for(let w=25;w>=0;w--)for(let r=0;r<7;r++){
    const dt=new Date(day0);dt.setDate(day0.getDate()-w*7+r);
    if(dt>end)continue;
    const ds=dt.toISOString().slice(0,10);
    cells.push({w:25-w,r,ds,c:cnt[ds]||0})}
  const CW=15,CH=15,PAD=2,W=26*CW+30,H=7*CH+22;
  const al=c=>c>=10?0.95:c>=6?0.72:c>=3?0.5:c>=1?0.28:0;
  let svg=`<svg viewBox="0 0 ${W} ${H}">`;
  const mseen={};
  for(const c of cells){
    const x=30+c.w*CW,y=16+c.r*CH;
    const m=c.ds.slice(5,7);
    if(c.r===0&&!mseen[c.ds.slice(0,7)]){mseen[c.ds.slice(0,7)]=1;
      svg+=`<text x="${x}" y="9" font-size="9" fill="#5C6673">${LANG==='en'?['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1]:(+m+'月')}</text>`}
    const weave=(c.w+c.r)%2?'#5AA9A0':'#E0A84E';                 // 经纬交替 = 织物纹理
    svg+=`<rect class="fcell" x="${x}" y="${y}" width="${CW-PAD}" height="${CH-PAD}" rx="3"
      fill="${c.c?weave:'#1a202b'}" fill-opacity="${c.c?al(c.c):1}" stroke="none"
      onclick="goDay('${c.ds}')"><title>${c.ds}${c.c?' · '+c.c+T(' 条',' entries'):''}</title></rect>`}
  (LANG==='en'?['Mo','We','Fr','Su']:['一','三','五','日']).forEach((w,i)=>{svg+=`<text x="2" y="${16+[0,2,4,6][i]*CH+10}" font-size="9" fill="#5C6673">${w}</text>`});
  svg+='</svg>';
  $('#fabric').innerHTML=`<div class="ft">${T('最近 26 周 · <b>织物密度 = 当日入账</b>(金纬青经交替)· 点格子进当天','Last 26 weeks · <b>fabric density = entries that day</b> (gold weft, teal warp) · click to jump')}</div>`+svg;
  // 六股线量
  const tot=Math.max(...Object.values(st.tools));
  $('#threads').innerHTML=Object.entries(st.tools).slice(0,7).map(([t,n])=>
    `<div class="th-row"><span class="tl">${esc(t)}</span>
     <span class="tb"><i style="width:${(100*n/tot).toFixed(1)}%"></i></span>
     <span class="tc">${n}</span></div>`).join('');
  $('#recent').innerHTML=st.recent.map(card).join('');
}
function goDay(ds){document.querySelector('nav button[data-v=days]').click();
  setTimeout(()=>loadDay(ds),window._d?0:400)}

// ---- 主题:横向层级 DAG 图 ----
const NW=n=>{let w=14;for(const ch of n.name)w+=ch.charCodeAt(0)>255?14:8;
  return w+String(n.count).length*7.5+(n.multi?16:0)+22}
async function loadTopics(){
  const r=await api('/api/topics',{});
  const nodes=r.nodes,edges=r.edges,byN={};nodes.forEach(n=>byN[n.name]=n);
  const parents={};edges.forEach(([p,c])=>{(parents[c]=parents[c]||[]).push(p)});
  // 深度 = 最长父链(带环保护)
  const depth={};const dep=(n,seen)=>{if(depth[n]!=null)return depth[n];
    if(seen.has(n))return 0;seen.add(n);
    const ps=(parents[n]||[]).filter(p=>byN[p]);
    return depth[n]=ps.length?1+Math.max(...ps.map(p=>dep(p,seen))):0};
  nodes.forEach(n=>dep(n.name,new Set()));
  const cols=[];nodes.forEach(n=>{(cols[depth[n.name]]=cols[depth[n.name]]||[]).push(n)});
  // 每列先按父的均值 y 排(减少交叉),父未定时按上卷数
  const pos={};const rowH=48,padY=14;
  const colX=[];let x=12;
  cols.forEach((col,ci)=>{colX[ci]=x;x+=Math.max(...col.map(NW))+72});
  cols.forEach((col,ci)=>{
    col.sort((a,b)=>{const ay=avgY(a),by=avgY(b);return ay-by||b.count-a.count});
    col.forEach((n,i)=>pos[n.name]={x:colX[ci],y:padY+i*rowH});
    function avgY(n){const ps=(parents[n.name]||[]).map(p=>pos[p]&&pos[p].y).filter(v=>v!=null);
      return ps.length?ps.reduce((a,b)=>a+b,0)/ps.length:1e9}
  });
  const H=Math.max(...cols.map(c=>c.length))*rowH+padY*2, W=x;
  const maxC=Math.max(...nodes.map(n=>n.count||1));
  let svg=`<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">
    <defs><filter id="sh" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/></filter></defs>`;
  for(const [p,c] of edges){if(!pos[p]||!pos[c])continue;
    const x1=pos[p].x+NW(byN[p]),y1=pos[p].y+16,x2=pos[c].x,y2=pos[c].y+16,mx=(x1+x2)/2;
    svg+=`<path class="gedge" data-e="${esc(p)}|${esc(c)}" d="M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}"/>`}
  for(const n of nodes){const{x,y}=pos[n.name],w=NW(n);
    const heat=Math.min(0.30,0.05+0.25*(n.count/maxC));        // 热力底色:上卷越多越暖
    const root=depth[n.name]===0;
    const cw=String(n.count).length*7.5+12;
    svg+=`<g class="gnode" data-n="${esc(n.name)}" transform="translate(${x},${y})" onclick="pick('${esc(n.name).replace(/'/g,"\\'")}')">
      <rect width="${w}" height="32" fill="rgba(224,168,78,${heat.toFixed(2)})"
        stroke="${root?'#8a6320':'var(--line)'}" filter="url(#sh)"/>
      <text x="13" y="21">${esc(n.name)}${n.multi?' ↺':''}</text>
      <rect x="${w-cw-7}" y="8" width="${cw}" height="16" rx="8" fill="${root?'#E0A84E':'#5AA9A0'}" opacity="0.9"/>
      <text class="cnt" x="${w-cw/2-7}" y="20" text-anchor="middle">${n.count}</text></g>`}
  svg+='</svg>';
  $('#tgraph').innerHTML=svg;
  $('#tloose').innerHTML=(r.loose.length?`${T('未建页','No page yet')}:${r.loose.map(t=>`<b onclick="pick('${esc(t)}')">${esc(t)}</b>`).join(' · ')} · `:'')
    +T(`已归类 ${r.total_tagged} 条 · ↺=多父(DAG)`,`${r.total_tagged} classified · ↺=multi-parent (DAG)`);
}
async function pick(name){
  document.querySelectorAll('.gnode').forEach(g=>g.classList.toggle('on',g.dataset.n===name));
  document.querySelectorAll('.gedge').forEach(e=>{const[p,c]=e.dataset.e.split('|');
    e.classList.toggle('hl',p===name||c===name)});
  const r=await api('/api/topic',{name});
  $('#tmembers').innerHTML=`<div class="gh" style="font-size:15px">🧵 ${esc(r.name)} · ${T('上卷 '+r.total+' 条','rolled up '+r.total)}`
  +(r.parents.length?`<span style="color:var(--dim)"> · parent: ${r.parents.map(esc).join(', ')}</span>`:'')+`</div>`+groups(r.groups);
}

// ---- 按天:翻页式月历热力 ----
let CAL={months:[],cnt:{},idx:0,sel:null};
async function loadDays(){
  const r=await api('/api/days',{});
  CAL.cnt={};r.days.forEach(d=>CAL.cnt[d.date]=d.count);
  CAL.months=[...new Set(r.days.map(d=>d.date.slice(0,7)))].sort();
  CAL.idx=CAL.months.length-1;                              // 默认最新月
  renderCal();
  if(r.days.length)loadDay(r.days[0].date);
}
function calNav(d){CAL.idx=Math.min(Math.max(CAL.idx+d,0),CAL.months.length-1);renderCal()}
function renderCal(){
  const m=CAL.months[CAL.idx];if(!m)return;
  const heat=c=>c>=10?'h3':c>=4?'h2':c>=1?'h1':'';
  const today=new Date().toISOString().slice(0,10);
  const [y,mo]=m.split('-').map(Number);
  const dow=(new Date(y,mo-1,1).getDay()+6)%7, dim=new Date(y,mo,0).getDate();
  let cells=(LANG==='en'?['Mo','Tu','We','Th','Fr','Sa','Su']:'一二三四五六日'.split('')).map(w=>`<div class="wd">${w}</div>`).join('');
  for(let i=0;i<dow;i++)cells+='<div class="cell"></div>';
  for(let d=1;d<=dim;d++){
    const ds=`${m}-${String(d).padStart(2,'0')}`,c=CAL.cnt[ds]||0;
    cells+=`<div class="cell ${c?'has '+heat(c):''}" data-d="${ds}" ${c?`onclick="loadDay('${ds}')"`:''}
      title="${ds}${c?' · '+c+T(' 条',' entries'):''}" ${ds===today?'style="box-shadow:inset 0 0 0 1px var(--cool)"':''}>${d}</div>`}
  const mTotal=Object.keys(CAL.cnt).filter(d=>d.startsWith(m)).reduce((a,d)=>a+CAL.cnt[d],0);
  $('#cals').innerHTML=`<div class="cal"><div class="mh">
      <button onclick="calNav(-1)" ${CAL.idx===0?'disabled':''}>‹</button>
      <span>${T(y+' 年 '+mo+' 月',['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][mo-1]+' '+y)} <small style="color:var(--dim);font-weight:400">${mTotal}${T(' 条','')}</small></span>
      <button onclick="calNav(1)" ${CAL.idx===CAL.months.length-1?'disabled':''}>›</button></div>
    <div class="grid">${cells}</div>
    <div class="legend" style="margin-top:10px">${T('少','less')} <i class="cell h1"></i><i class="cell h2"></i><i class="cell h3"></i> ${T('多','more')}</div></div>`;
  markSel();
}
function markSel(){document.querySelectorAll('.cell').forEach(x=>x.classList.toggle('on',x.dataset.d===CAL.sel))}
async function loadDay(date){
  CAL.sel=date;
  const mi=CAL.months.indexOf(date.slice(0,7));
  if(mi>=0&&mi!==CAL.idx){CAL.idx=mi;renderCal()}else markSel();
  const r=await api('/api/day',{date});
  $('#dbody').innerHTML=`<div class="gh" style="font-size:15px;margin-top:0">📅 ${date} · ${r.total}${T(' 条','')}</div>`+groups(r.groups);
}

// ---- 详情 ----
function drawer(on){$('#drawer').classList.toggle('on',!!on)}
async function detail(id){const e=await api('/api/entry',{id});
  const d=e.detail||{};
  let rows=`<h3>${esc(e.summary)}</h3>
  <div class="meta">${esc(e.date)} · ${esc(e.project)} · ${esc(e.tool)}/${esc(e.kind)}
  ${e.topics&&e.topics.length?` · 🧵 ${e.topics.map(esc).join(', ')}`:''}</div>
  <div class="meta mono">ref: ${esc(e.ref)}</div>`;
  for(const k of ['digest','body','opening','content','work','thinking','plan']){
    if(d[k])rows+=`<div class="gh">${k}</div><pre>${esc(d[k])}</pre>`}
  const rest=Object.fromEntries(Object.entries(d).filter(([k])=>!['digest','body','opening','content','work','thinking','plan'].includes(k)));
  if(Object.keys(rest).length)rows+=`<div class="gh">detail</div><pre>${esc(JSON.stringify(rest,null,1))}</pre>`;
  $('#dctn').innerHTML=rows;drawer(true)}
document.addEventListener('keydown',e=>{if(e.key==='Escape')drawer(false)});

loadDash();
</script>
