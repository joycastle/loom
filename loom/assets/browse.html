<script>try{document.documentElement.dataset.theme=localStorage.getItem('loom_theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light')}catch(e){}</script>
<style>
:root{--ink:#0E1117;--panel:#171B22;--panel2:#1E242D;--panel3:#11151C;
  --line:#2A313C;--line2:#394250;--tx:#E7EAF0;--mut:#9AA3B2;--dim:#667181;
  --warm:#DCA85F;--cool:#63B3A8;--blue:#6EA8FE;--bad:#E66B6B;--ok:#65C18C;
  --warn:#DCA85F;--shadow:0 14px 34px rgba(0,0,0,.28);--soft:0 1px 0 rgba(255,255,255,.04) inset}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--ink);color-scheme:dark}
body{min-height:100vh;background:
  linear-gradient(180deg,#111822 0,#0E1117 280px),
  repeating-linear-gradient(90deg,rgba(255,255,255,.018) 0 1px,transparent 1px 64px);
  color:var(--tx);
  font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
  line-height:1.55;font-feature-settings:"tnum" 1;font-variant-numeric:tabular-nums;
  -webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:rgba(99,179,168,.18);overscroll-behavior-y:contain}
.mono{font-family:ui-monospace,Menlo,Consolas,monospace}
a{color:var(--cool);text-decoration:none}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}
.skip{position:fixed;left:16px;top:10px;z-index:20;transform:translateY(-140%);
  background:var(--tx);color:var(--ink);border-radius:8px;
  padding:8px 12px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.28)}
.skip:focus{transform:translateY(0);outline:2px solid var(--cool);outline-offset:2px}
main{display:block}
.wrap{max-width:1180px;margin:0 auto;padding:16px 22px 80px}
header{position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:12px;
  padding:10px 0 14px;margin-bottom:4px;background:linear-gradient(180deg,#111822 0,rgba(17,24,34,.92) 72%,rgba(17,24,34,0));
  backdrop-filter:blur(16px);border-bottom:1px solid rgba(42,49,60,.72)}
header svg{width:36px;height:36px;filter:drop-shadow(0 8px 18px rgba(0,0,0,.3))}
header .nm{font-size:19px;font-weight:760;letter-spacing:.01em;background:linear-gradient(92deg,var(--warm),var(--cool));
  -webkit-background-clip:text;background-clip:text;color:transparent}
nav{display:flex;gap:4px;margin-left:auto;padding:4px;background:rgba(14,17,23,.56);border:1px solid var(--line);
  border-radius:12px;box-shadow:var(--soft)}
nav button{height:32px;min-width:44px;background:transparent;border:1px solid transparent;border-radius:8px;color:var(--mut);
  padding:0 12px;font-size:13px;cursor:pointer;white-space:nowrap;transition:background .14s,border-color .14s,color .14s}
nav button:hover{color:var(--tx);background:rgba(255,255,255,.035)}
nav button.on{color:var(--tx);background:var(--panel2);border-color:var(--line2);box-shadow:var(--soft)}
button,input,select{font:inherit;color-scheme:inherit}
button,label{touch-action:manipulation}
button:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid rgba(99,179,168,.7);outline-offset:2px}
button:disabled{cursor:default;opacity:.58}
.view{display:none;padding-top:18px}.view.on{display:block}
@media(max-width:720px){.wrap{padding:10px 12px 64px}header{align-items:flex-start;flex-wrap:wrap}
  nav{order:3;width:100%;overflow-x:auto}nav button{min-height:44px;flex:0 0 auto}.spot{margin-top:24px}
  input,select,.form input,.form select{font-size:16px!important}
  .bar input,.bar select,.form input,.form select{height:44px;min-height:44px}
  .act{min-height:44px}.mini{min-height:44px}}
/* 首页 Dashboard */
.spot{max-width:660px;margin:34px auto 8px;position:relative}
.spot input{width:100%;background:rgba(23,27,34,.9);border:1px solid var(--line2);border-radius:12px;
  color:var(--tx);padding:16px 52px 16px 20px;font-size:16px;outline:none;
  transition:border-color .15s,box-shadow .15s,background .15s;
  box-shadow:var(--shadow),var(--soft)}
.spot input:focus{border-color:var(--cool);box-shadow:0 0 0 3px rgba(99,179,168,.13),0 16px 40px rgba(0,0,0,.38),var(--soft)}
.spot .kbd{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--dim);
  font-size:11px;border:1px solid var(--line);border-radius:6px;padding:2px 7px;font-family:ui-monospace,monospace}
.subq{text-align:center;color:var(--dim);font-size:12.5px;margin-bottom:26px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:760px;margin:0 auto 26px}
@media(max-width:640px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:linear-gradient(180deg,rgba(30,36,45,.92),rgba(23,27,34,.92));border:1px solid var(--line);
  border-radius:10px;padding:14px 8px;text-align:center;box-shadow:var(--soft)}
.stat .n{font-size:27px;font-weight:750;letter-spacing:-.02em;
  background:linear-gradient(92deg,var(--warm),var(--cool));-webkit-background-clip:text;background-clip:text;color:transparent}
.stat .l{font-size:11.5px;color:var(--mut);margin-top:2px;letter-spacing:.06em}
.fab{background:linear-gradient(180deg,var(--panel3),#0D1117);border:1px solid var(--line);border-radius:10px;
  padding:16px 18px 12px;max-width:760px;margin:0 auto 22px;overflow-x:auto;box-shadow:var(--soft)}
.fab svg{width:100%;height:auto;display:block}
.fab .ft{font-size:12px;color:var(--mut);letter-spacing:.08em;margin-bottom:10px}
.fab .ft b{color:var(--warm);font-weight:600}
.fcell{cursor:pointer}
.fcell:hover{stroke:var(--cool);stroke-width:1.5}
.threads{max-width:760px;margin:0 auto 10px}
.th-row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.th-row .tl{width:70px;font-size:12px;color:var(--mut);text-align:right;font-family:ui-monospace,monospace}
.th-row .tb{flex:1;height:8px;border-radius:4px;background:var(--panel2);overflow:hidden}
.th-row .tb i{display:block;height:100%;border-radius:4px;
  background:linear-gradient(90deg,var(--warm),var(--cool))}
.th-row .tc{width:44px;font-size:11.5px;color:var(--dim);font-family:ui-monospace,monospace}
/* 搜索 */
.bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.bar input,.bar select{height:38px;background:var(--panel);background-color:var(--panel);border:1px solid var(--line);border-radius:8px;
  color:var(--tx);padding:8px 11px;font-size:14px}
.bar input[type=search]{flex:1;min-width:220px}
.hint{color:var(--dim);font-size:12px;margin-bottom:10px}
/* 卡片 */
.card{background:linear-gradient(180deg,rgba(23,27,34,.96),rgba(20,24,31,.96));border:1px solid var(--line);
  border-radius:9px;padding:12px 14px;margin-bottom:8px;cursor:pointer;box-shadow:var(--soft);
  transition:border-color .14s,transform .14s,background .14s}
.card:hover{border-color:rgba(99,179,168,.66);transform:translateY(-1px);background:linear-gradient(180deg,#1B2029,#151922)}
.card .top{display:flex;gap:8px;align-items:baseline;flex-wrap:wrap;font-size:12px;color:var(--mut)}
.card .top .d{color:var(--warm)}
.card .top .k{border:1px solid var(--line2);border-radius:999px;padding:0 8px;background:rgba(255,255,255,.025)}
.card .sm{font-size:14px;margin-top:3px;word-break:break-all}
.card .sn{font-size:12px;color:var(--dim);margin-top:3px}
.card .tp{font-size:11px;color:var(--cool);margin-top:3px}
.gh{font-size:12px;color:var(--warm);margin:16px 0 8px;letter-spacing:.08em;text-transform:uppercase}
/* 主题图 */
#tgraph{background:linear-gradient(180deg,var(--panel3),#0D1117);border:1px solid var(--line);
  border-radius:10px;overflow-x:auto;margin-bottom:16px;padding:10px 6px;box-shadow:var(--soft)}
#tgraph svg{display:block}
.gnode{cursor:pointer}
.gnode rect{stroke-width:1.2;rx:16;transition:stroke .12s,stroke-width .12s,filter .12s,fill-opacity .12s}
.gnode:hover rect{stroke:var(--cool);filter:brightness(1.15)}
.gnode.on rect{stroke:var(--warm);stroke-width:1.8}
.gnode text{fill:var(--tx);font-size:13px;font-family:system-ui,sans-serif;font-weight:500}
.gnode .cnt{fill:var(--ink);font-size:10.5px;font-weight:700;font-family:ui-monospace,monospace}
.gnode.on text{fill:var(--warm)}
.gedge{fill:none;stroke:#333d4b;stroke-width:1.5;opacity:.85}
.gedge.hl{stroke:var(--cool);stroke-width:2.4;opacity:1}
.loose{color:var(--dim);font-size:12px;margin:-6px 0 14px}
.loose b{color:var(--mut);font-weight:500;cursor:pointer}
.loose b:hover{color:var(--warm)}
/* 日历 */
.cols{display:grid;grid-template-columns:320px 1fr;gap:20px}
@media(max-width:800px){.cols{grid-template-columns:1fr}}
.cal{background:linear-gradient(180deg,rgba(23,27,34,.96),rgba(20,24,31,.96));border:1px solid var(--line);
  border-radius:10px;padding:12px 14px;margin-bottom:12px;box-shadow:var(--soft)}
.cal .mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal .mh span{font-size:14px;color:var(--tx);font-weight:600;letter-spacing:.04em}
.cal .mh button{background:var(--panel2);border:1px solid var(--line);border-radius:8px;
  color:var(--mut);width:30px;height:28px;cursor:pointer;font-size:14px}
.cal .mh button:hover:not(:disabled){color:var(--warm);border-color:var(--warm)}
.cal .mh button:disabled{opacity:.3;cursor:default}
.cell{aspect-ratio:1;font-size:13px}
.cal .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal .wd{font-size:10px;color:var(--dim);text-align:center;padding-bottom:2px}
.cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:7px;
  font-size:12px;color:var(--dim);position:relative}
.cell.has{cursor:pointer;color:var(--tx)}
.cell.h1{background:rgba(224,168,78,.14)}
.cell.h2{background:rgba(224,168,78,.32)}
.cell.h3{background:rgba(224,168,78,.55);color:#1a1408}
.cell.has:hover,.cell.on{outline:2px solid var(--warm);outline-offset:-1px}
.legend{display:flex;gap:6px;align-items:center;font-size:11px;color:var(--dim);margin:2px 2px 10px}
.legend i{width:12px;height:12px;border-radius:3px;display:inline-block}
/* 管理控制台 */
.admin-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin:0 0 14px}
.admin-title{min-width:0}
.admin-title .eyebrow{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:4px}
.admin-title h1{font-size:20px;line-height:1.2;font-weight:720;letter-spacing:0;color:var(--tx)}
.admin-title p{font-size:12.5px;color:var(--dim);margin-top:5px}
.admin-head .act{flex:0 0 auto}
.admin-shell{display:grid;grid-template-columns:168px minmax(0,1fr);gap:14px;align-items:start}
.admin-workspace{min-width:0}
.admin-tabs{position:sticky;top:72px;display:flex;flex-direction:column;gap:4px;padding:5px;background:rgba(14,17,23,.56);border:1px solid var(--line);border-radius:10px}
.admin-tabs button{height:38px;background:transparent;border:1px solid transparent;border-radius:7px;color:var(--mut);padding:0 12px;font-size:12.5px;text-align:left;cursor:pointer;white-space:nowrap}
.admin-tabs button:hover{color:var(--tx);background:rgba(255,255,255,.035)}
.admin-tabs button.on{color:var(--tx);background:var(--panel2);border-color:var(--line2);box-shadow:var(--soft)}
.admin-pane{display:none}.admin-pane.on{display:block}
.admin-top{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:1px;margin-bottom:14px;
  border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--line);box-shadow:var(--soft)}
.answer{position:relative;overflow:hidden;background:linear-gradient(180deg,#171C24,#12161D);
  padding:14px 16px 13px;min-height:104px}
.answer:before{content:"";position:absolute;left:16px;top:18px;width:7px;height:7px;border-radius:50%;background:var(--line2)}
.answer.ok:before{background:var(--ok);box-shadow:0 0 0 3px rgba(101,193,140,.12)}
.answer.warn:before{background:var(--warn);box-shadow:0 0 0 3px rgba(224,168,78,.12)}
.answer.bad:before{background:var(--bad);box-shadow:0 0 0 3px rgba(230,107,107,.12)}
.answer h2{font-size:11px;color:var(--mut);font-weight:650;letter-spacing:.08em;margin:0 0 11px 18px;text-transform:uppercase}
.answer .big{font-size:22px;font-weight:720;line-height:1.1;color:var(--tx);letter-spacing:0}
.answer .desc{font-size:12px;color:var(--dim);margin-top:8px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.admin-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;align-items:start}
@media(max-width:900px){.admin-shell{grid-template-columns:1fr}.admin-tabs{position:static;flex-direction:row;overflow-x:auto}.admin-tabs button{text-align:center}.admin-top{grid-template-columns:repeat(2,1fr)}}
@media(max-width:760px){.admin-head{align-items:flex-start;flex-direction:column}.admin-top,.admin-grid{grid-template-columns:1fr}}
.panel{background:linear-gradient(180deg,rgba(23,27,34,.97),rgba(19,23,30,.97));border:1px solid var(--line);
  border-radius:10px;padding:14px;box-shadow:var(--soft)}
.manual-panel{grid-column:1/-1}
.panel h3{font-size:14px;color:var(--tx);font-weight:680;margin-bottom:10px;letter-spacing:.02em}
.panel .sub{font-size:12px;color:var(--dim);margin:-6px 0 10px}
.mini{font-size:12px;color:var(--mut);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.pill{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);border-radius:999px;
  padding:2px 8px;font-size:11.5px;color:var(--mut);background:rgba(255,255,255,.022)}
.pill.ok{color:var(--ok);border-color:rgba(101,193,140,.45);background:rgba(101,193,140,.07)}
.pill.warn{color:var(--warn);border-color:rgba(224,168,78,.5);background:rgba(224,168,78,.07)}
.pill.error,.pill.bad{color:var(--bad);border-color:rgba(230,107,107,.55);background:rgba(230,107,107,.07)}
.pill.off{color:var(--dim);background:rgba(255,255,255,.015)}
.kv{display:grid;grid-template-columns:120px 1fr;gap:8px;font-size:12px;margin:6px 0;color:var(--mut)}
.kv b{color:var(--tx);font-weight:500;word-break:break-all}
.row{display:flex;gap:12px;align-items:center;justify-content:space-between;border-top:1px solid var(--line);
  padding:10px 0;font-size:12px;color:var(--mut)}
.row:first-of-type{border-top:0;padding-top:0}
.row strong{color:var(--tx);font-size:13px;font-weight:600}
.row code{color:var(--mut);word-break:break-all}
.barline{display:flex;align-items:center;gap:9px;margin:7px 0;font-size:12px;color:var(--mut)}
.barline .nm2{width:96px;text-align:right;color:var(--mut);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.barline .track{flex:1;height:8px;background:var(--panel2);border-radius:5px;overflow:hidden}
.barline i{display:block;height:100%;background:linear-gradient(90deg,var(--cool),var(--warm));border-radius:5px}
.form{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 10px;align-items:center}
.field{display:flex;flex-direction:column;gap:5px;min-width:138px}
.field span{font-size:11px;color:var(--dim);letter-spacing:.04em}
.form input:not([type=checkbox]),.form select,.field input:not([type=checkbox]),.field select,.panel-tools input{height:36px;background:var(--panel2);background-color:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--tx);
  padding:7px 10px;font-size:13px;min-width:140px}
.form input::placeholder,.field input::placeholder,.panel-tools input::placeholder{color:var(--dim)}
.form input.path,.field input.path,.panel-tools input.path{flex:1;min-width:260px}
.sync-form{display:grid;gap:10px;margin-top:12px}
.sync-line{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end}
.sync-line .field{flex:1 1 144px}
.sync-line .act{margin-left:auto}
.toggle-line{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.checkline{display:inline-flex;align-items:center;gap:8px;min-height:34px;padding:0 10px;border:1px solid var(--line);
  border-radius:8px;background:rgba(255,255,255,.016);color:var(--mut);font-size:12.5px}
.checkline input[type=checkbox]{appearance:none;-webkit-appearance:none;width:15px;height:15px;min-width:15px;border:1px solid var(--line2);
  border-radius:4px;background:var(--panel3);display:grid;place-content:center}
.checkline input[type=checkbox]:checked{border-color:rgba(99,179,168,.75);background:rgba(99,179,168,.15)}
.checkline input[type=checkbox]:checked:after{content:"";width:7px;height:7px;border-radius:2px;background:var(--cool)}
.inline-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:12px 0 10px}
.act{background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--tx);
  min-height:36px;padding:7px 11px;font-size:12.5px;cursor:pointer;transition:border-color .14s,color .14s,background .14s}
.act:active{transform:translateY(1px)}
.act:hover{border-color:var(--cool);color:var(--cool)}
.act.danger:hover{border-color:var(--bad);color:var(--bad)}
.act.primary{border-color:rgba(90,169,160,.7);color:var(--cool);background:rgba(90,169,160,.08)}
.act.warn{border-color:rgba(224,168,78,.65);color:var(--warm);background:rgba(224,168,78,.07)}
.is-busy .act{opacity:.58}
.log{background:var(--ink);border:1px solid var(--line);border-radius:9px;padding:10px;
  white-space:pre-wrap;word-break:break-all;font-size:12px;color:var(--mut);max-height:220px;overflow:auto}
.log[aria-busy="true"]{border-color:rgba(99,179,168,.58);color:var(--tx)}
.panel-tools{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start}
.panel-tools .form{margin:0}
.panel-tools .path{width:100%}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{border:1px solid var(--line);border-radius:999px;color:var(--mut);font-size:12px;padding:3px 8px;background:rgba(255,255,255,.018)}
.list{max-height:260px;overflow:auto}
.bridge-strip{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:2px 0}
.bridge-copy strong{display:block;font-size:14px;color:var(--tx);margin-bottom:4px}
.bridge-copy span{font-size:12px;color:var(--dim)}
.evidence-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
.evidence-stat{background:var(--panel3);border:1px solid var(--line);border-radius:9px;padding:11px 12px}
.evidence-stat b{display:block;font-size:20px;color:var(--tx);line-height:1.2}
.evidence-stat span{font-size:11px;color:var(--dim)}
.resource-row{display:grid;grid-template-columns:130px 1fr 82px;align-items:center;gap:10px;margin:8px 0;font-size:12px;color:var(--mut)}
.resource-row .track{height:8px;border-radius:5px;background:var(--panel2);overflow:hidden}
.resource-row i{display:block;height:100%;border-radius:5px;background:linear-gradient(90deg,var(--cool),var(--warm))}
.recent-admin .row{align-items:flex-start}.recent-admin .row button{flex:0 0 auto}
.admin-details{margin-top:10px}.admin-details summary{cursor:pointer;color:var(--dim);font-size:12px}.admin-details[open] summary{margin-bottom:8px;color:var(--mut)}
/* 详情抽屉 */
#drawer{position:fixed;top:0;right:-560px;width:min(560px,92vw);height:100vh;background:linear-gradient(180deg,#1C222C,#151A22);
  border-left:1px solid var(--line2);transition:right .18s;overflow-y:auto;overscroll-behavior:contain;
  padding:20px;z-index:9;box-shadow:-24px 0 48px rgba(0,0,0,.38)}
#drawer.on{right:0}
#drawer h3{font-size:15px;margin-bottom:10px;word-break:break-all}
#drawer .meta{font-size:12px;color:var(--mut);margin-bottom:12px}
#drawer pre{background:var(--ink);border:1px solid var(--line);border-radius:9px;padding:12px;
  font-size:12px;white-space:pre-wrap;word-break:break-all;margin:8px 0;max-height:50vh;overflow:auto}
#drawer .x{position:sticky;top:0;float:right;background:var(--panel);border:1px solid var(--line);
  border-radius:8px;color:var(--mut);width:32px;height:32px;cursor:pointer}
.empty{color:var(--dim);padding:30px 0;text-align:center}
@media(max-width:720px){
  nav button,.act,.admin-tabs button{min-height:44px}
  .bar input,.bar select,.form input:not([type=checkbox]),.form select,.field input:not([type=checkbox]),.field select,.panel-tools input{height:44px;min-height:44px}
  .sync-line .act{margin-left:0}
  .panel-tools{grid-template-columns:1fr}
  .evidence-grid{grid-template-columns:repeat(2,1fr)}
  .bridge-strip{align-items:flex-start;flex-direction:column}
  .resource-row{grid-template-columns:100px 1fr 70px}
}
html[data-theme="light"]{--ink:#F3F6F4;--panel:#FFFFFF;--panel2:#EEF3F0;--panel3:#F8FAF9;
  --line:#D9E2DD;--line2:#C4D0C9;--tx:#17211C;--mut:#66736C;--dim:#89948E;
  --warm:#A86C19;--cool:#177C68;--blue:#356FAF;--bad:#B64D4D;--ok:#27805C;
  --warn:#A86C19;--shadow:0 14px 34px rgba(31,55,44,.09);--soft:0 1px 0 rgba(255,255,255,.9) inset;
  background:var(--ink);color-scheme:light}
html[data-theme="light"] body{background:linear-gradient(180deg,#EDF4F0 0,#F7F9F8 280px),repeating-linear-gradient(90deg,rgba(23,124,104,.035) 0 1px,transparent 1px 64px)}
html[data-theme="light"] header{background:linear-gradient(180deg,rgba(237,244,240,.98) 0,rgba(237,244,240,.92) 72%,rgba(237,244,240,0));border-bottom-color:rgba(196,208,201,.85)}
html[data-theme="light"] nav,html[data-theme="light"] .admin-tabs{background:rgba(255,255,255,.72)}
html[data-theme="light"] nav button:hover,html[data-theme="light"] .admin-tabs button:hover{background:rgba(23,124,104,.055)}
html[data-theme="light"] .spot input{background:rgba(255,255,255,.94)}
html[data-theme="light"] .stat,html[data-theme="light"] .card,html[data-theme="light"] .cal,
html[data-theme="light"] .panel{background:linear-gradient(180deg,#FFFFFF,#FAFCFB)}
html[data-theme="light"] .card:hover{background:linear-gradient(180deg,#FFFFFF,#F5FAF7);border-color:rgba(23,124,104,.5)}
html[data-theme="light"] .fab,html[data-theme="light"] #tgraph{background:linear-gradient(180deg,#F8FAF9,#F1F5F3)}
html[data-theme="light"] .gedge{stroke:#BCC8C1}
html[data-theme="light"] .answer{background:linear-gradient(180deg,#FFFFFF,#F7FAF8)}
html[data-theme="light"] .pill,html[data-theme="light"] .chip,html[data-theme="light"] .checkline{background:rgba(23,124,104,.025)}
html[data-theme="light"] .log,html[data-theme="light"] #drawer pre,html[data-theme="light"] .evidence-stat{background:#F5F8F6}
html[data-theme="light"] #drawer{background:linear-gradient(180deg,#FFFFFF,#F4F8F6);box-shadow:-24px 0 48px rgba(24,54,40,.16)}
html[data-theme="light"] .cell.h3{color:#4A2E08}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;scroll-behavior:auto!important;transition-duration:.001ms!important}
  .card:hover,.act:active{transform:none}
}
</style>
</head>
<body>
<a class="skip" href="#main" data-t="跳到内容|Skip to content"></a>
<div class="wrap">
<header>
  <svg viewBox="0 0 100 100" aria-hidden="true"><rect x="2" y="2" width="96" height="96" rx="22" fill="#141821" stroke="#2A313D"/>
  <g fill="#5AA9A0"><rect x="14" y="21.5" width="72" height="9" rx="4.5"/><rect x="14" y="45.5" width="72" height="9" rx="4.5"/><rect x="14" y="69.5" width="72" height="9" rx="4.5"/></g>
  <g fill="#E0A84E"><rect x="21.5" y="14" width="9" height="72" rx="4.5"/><rect x="45.5" y="14" width="9" height="72" rx="4.5"/><rect x="69.5" y="14" width="9" height="72" rx="4.5"/></g>
  <g fill="#5AA9A0"><rect x="45.5" y="21.5" width="9" height="9" rx="2.5"/><rect x="21.5" y="45.5" width="9" height="9" rx="2.5"/><rect x="69.5" y="45.5" width="9" height="9" rx="2.5"/><rect x="45.5" y="69.5" width="9" height="9" rx="2.5"/></g></svg>
  <span class="nm" translate="no">loom</span><span style="color:var(--dim);font-size:13px" data-t="本地控制台|local console"></span>
  <nav aria-label="Primary">
    <button data-v="search" class="on" aria-current="page"><span data-t="搜索|Search"></span></button>
    <button data-v="topics"><span data-t="主题|Topics"></span></button>
    <button data-v="days"><span data-t="按天|Days"></span></button>
    <button data-v="admin"><span data-t="管理|Admin"></span></button>
    <button id="themebtn" aria-label="切换亮暗主题" title="切换亮暗主题"></button>
    <button id="langbtn" aria-label="Switch language" title="Switch language"></button>
  </nav>
</header>

<main id="main">
<div id="v-search" class="view on">
  <div class="spot"><label class="sr-only" for="q" data-t="搜索台账|Search ledger"></label><input type="search" id="q" name="ledger_query" autocomplete="off" spellcheck="false">
    <span class="kbd">⌘K</span></div>
  <div class="subq" id="subq"></div>
  <div id="dash">
    <div class="stats" id="stats"></div>
    <div class="fab" id="fabric"></div>
    <div class="threads" id="threads"></div>
    <div style="max-width:760px;margin:18px auto 0"><div class="gh" style="margin-top:0">⏱ <span data-t="最近入账|Recent"></span></div><div id="recent"></div></div>
  </div>
  <div id="rwrap" style="display:none">
    <div class="bar" style="max-width:760px;margin:0 auto 10px">
      <label class="sr-only" for="f-tool" data-t="工具过滤|Tool filter"></label><select id="f-tool" name="tool_filter"><option value="" data-t="全部工具|All Tools"></option></select>
      <label class="sr-only" for="f-since" data-t="起始日期|Start date"></label><input id="f-since" name="start_date" type="date" title="起始日期" autocomplete="off">
      <label class="sr-only" for="f-until" data-t="截止日期|End date"></label><input id="f-until" name="end_date" type="date" title="截止日期" autocomplete="off">
    </div>
    <div id="r-search" style="max-width:760px;margin:0 auto"></div>
  </div>
</div>

<div id="v-topics" class="view">
  <div id="tgraph"></div>
  <div class="loose" id="tloose"></div>
  <div id="tmembers"><div class="empty" data-t="↑ 点图里的主题节点,看这件事的全景(含子树上卷)|↑ Click a topic node to see everything about it (subtree rolled up)"></div></div>
</div>

<div id="v-days" class="view">
  <div class="cols">
    <div id="cals"></div>
    <div id="dbody"><div class="empty" data-t="← 点日历上有热力的日期|← Pick a highlighted date on the calendar"></div></div>
  </div>
</div>

<div id="v-admin" class="view">
  <div class="admin-head">
    <div class="admin-title">
      <div class="eyebrow" data-t="本地管理|Local Admin"></div>
      <h1 data-t="控制台状态|Console Status"></h1>
      <p data-t="先看采集、故障和上云边界;再做同步和配置。|Check collection, issues, and cloud boundary first; then sync or configure."></p>
    </div>
    <button class="act" onclick="loadAdmin()" data-t="刷新状态|Refresh Status"></button>
  </div>
  <div class="admin-shell">
  <div class="admin-tabs" role="tablist" aria-label="管理分区">
    <button class="on" data-admin-pane="overview" data-t="概览|Overview"></button>
    <button data-admin-pane="sources" data-t="来源|Sources"></button>
    <button data-admin-pane="privacy" data-t="数据与隐私|Data & Privacy"></button>
    <button data-admin-pane="settings" data-t="配置|Settings"></button>
  </div>
  <div class="admin-workspace">

  <div class="admin-pane on" id="admin-pane-overview">
    <div class="admin-top" id="admin-answers"></div>
    <div class="admin-grid">
      <section class="panel"><div class="bridge-strip" id="admin-bridge"></div></section>
      <section class="panel">
        <h3 data-t="手动 sync|Manual sync"></h3>
        <div class="sub" data-t="本地采集会重建索引和日记;push 需要二次确认。|Local sync rebuilds index and journals; push requires confirmation."></div>
        <div class="sync-form"><div class="sync-line">
          <label class="field" for="sync-source"><span data-t="来源|Source"></span><select id="sync-source" name="sync_source"><option value="all">all</option></select></label>
          <label class="field" for="sync-since"><span data-t="起始日期|Since"></span><input id="sync-since" name="sync_since" type="date" title="since" autocomplete="off"></label>
          <button class="act primary" onclick="runSync()" data-t="开始 Sync|Run Sync"></button>
        </div><div class="toggle-line">
          <label class="checkline"><input id="sync-backup" type="checkbox" checked> <span data-t="同步后本地备份|Local Backup After Sync"></span></label>
          <label class="checkline"><input id="sync-push" type="checkbox"> <span data-t="同步后 Push|Push After Sync"></span></label>
        </div></div>
        <details class="admin-details"><summary data-t="查看执行日志|Show execution log"></summary><pre class="log" id="admin-log" aria-live="polite" aria-busy="false">ready</pre></details>
      </section>
      <section class="panel"><h3 data-t="今日工作证据|Today's evidence"></h3><div id="admin-evidence"></div></section>
      <section class="panel recent-admin"><h3 data-t="最近记录|Recent records"></h3><div id="admin-recent"></div></section>
      <section class="panel manual-panel"><h3 data-t="哪里需要处理|Needs attention"></h3><div id="admin-broken"></div></section>
    </div>
  </div>

  <div class="admin-pane" id="admin-pane-sources"><div class="admin-grid">
    <section class="panel"><h3 data-t="来源诊断|Source diagnostics"></h3><div id="admin-sources"></div></section>
    <section class="panel"><h3 data-t="Repo 管理|Repo management"></h3><div class="panel-tools"><label class="sr-only" for="repo-path" data-t="Repo 路径|Repo path"></label><input class="path" id="repo-path" name="repo_path" autocomplete="off" spellcheck="false" placeholder="/Users/me/project…"><button class="act primary" onclick="repoAdd()" data-t="加入|Add"></button></div><div id="admin-repos" class="list"></div></section>
    <section class="panel manual-panel"><h3 data-t="飞书多维表格采集|Feishu Bitable collection"></h3><div class="sub" data-t="这是现有的飞书读取来源;账号连接与证据上传属于下一阶段。|This is the existing Feishu read source; account connection and evidence upload come next."></div><div class="form">
      <label class="field" for="fs-name"><span data-t="名称|Name"></span><input id="fs-name" name="feishu_name" autocomplete="off" spellcheck="false" placeholder="需求池…"></label>
      <label class="field" for="fs-url"><span data-t="地址或 token|URL Or Token"></span><input class="path" id="fs-url" name="feishu_url" autocomplete="off" spellcheck="false" placeholder="Feishu base URL or app_token…"></label>
      <label class="field" for="fs-table"><span data-t="Table ID|Table ID"></span><input id="fs-table" name="feishu_table_id" autocomplete="off" spellcheck="false" placeholder="table_id…"></label>
      <button class="act primary" onclick="feishuAdd()" data-t="加入表|Add Table"></button></div><div id="admin-feishu"></div></section>
  </div></div>

  <div class="admin-pane" id="admin-pane-privacy"><div class="admin-grid">
    <section class="panel manual-panel"><h3 data-t="同步与隐私边界|Sync & privacy boundary"></h3><div class="sub" data-t="飞书上传尚未启用;这里先明确什么可以上传、什么默认留在本地。|Feishu upload is not enabled yet; this defines what may upload and what stays local."></div><div id="admin-privacy"></div></section>
    <section class="panel"><h3 data-t="本地资源占用|Local resources"></h3><div id="admin-resources"></div></section>
    <section class="panel"><h3 data-t="采了什么|Collected"></h3><div id="admin-collected"></div></section>
    <section class="panel manual-panel"><h3 data-t="Vault 上云边界|Vault cloud boundary"></h3><div id="admin-cloud"></div><div class="inline-actions"><button class="act" onclick="vaultBackup(false)" data-t="仅提交 Vault|Commit Vault"></button><button class="act warn" onclick="vaultBackup(true)" data-t="提交并 Push|Commit & Push"></button></div></section>
  </div></div>

  <div class="admin-pane" id="admin-pane-settings"><div class="admin-grid">
    <section class="panel manual-panel"><h3 data-t="身份管理|Identity"></h3><div class="sub" data-t="git 采集会用这些邮箱/姓名过滤“本人”的提交。|Git collection uses these emails/names to identify your commits."></div><div class="form"><label class="sr-only" for="identity-value" data-t="姓名或邮箱|Name or email"></label><input id="identity-value" name="identity_value" autocomplete="off" spellcheck="false" placeholder="name@example.com…"><button class="act primary" onclick="identityAdd()" data-t="加入|Add"></button></div><div id="admin-identities"></div></section>
  </div></div>
  </div>
  </div>
</div>
</main>
</div>

<div id="drawer" role="dialog" aria-modal="true" aria-label="Entry detail" aria-hidden="true" tabindex="-1"><button class="x" onclick="drawer(false)" aria-label="Close">✕</button><div id="dctn"></div></div>

<script>
const LANG=localStorage.getItem('loom_lang')||'zh';
const T=(zh,en)=>LANG==='en'?en:zh;
const $=s=>document.querySelector(s), api=(p,o={})=>fetch(p+'?'+new URLSearchParams(o),{headers:{'X-Loom-Token':sessionStorage.getItem('loom_admin_token')||''}}).then(r=>r.json());
const bootParams=new URLSearchParams(location.search),bootToken=bootParams.get('token');
if(bootToken){sessionStorage.setItem('loom_admin_token',bootToken);history.replaceState(null,'',location.pathname+location.hash)}
const post=(p,o)=>fetch(p,{method:'POST',headers:{'Content-Type':'application/json',
  'X-Loom-Token':sessionStorage.getItem('loom_admin_token')||''},body:JSON.stringify(o)}).then(async r=>{
    const data=await r.json();
    if(r.status===403&&!data.message)data.message=T('管理会话已失效,请从 loom serve 输出的地址重新打开','Admin session expired; reopen the URL printed by loom serve');
    return data});
document.addEventListener('DOMContentLoaded',()=>{
  document.querySelectorAll('[data-t]').forEach(el=>{const[z,e]=el.dataset.t.split('|');el.textContent=T(z,e)});
  $('#q').placeholder=T('搜你做过的任何事…(中文子串可用)','Search anything you did… (CJK substring OK)');
  $('#subq').textContent=T('一份台账,织进了你的全部工作痕迹','One ledger, woven from all your work traces');
  if(window.matchMedia('(pointer:fine)').matches)$('#q').focus({preventScroll:true});
  const b=$('#langbtn');b.textContent=T('EN','中');
  b.onclick=()=>{localStorage.setItem('loom_lang',LANG==='zh'?'en':'zh');location.reload()};
  const tb=$('#themebtn');
  const paintTheme=()=>{const light=document.documentElement.dataset.theme==='light';tb.textContent=light?'☀':'☾';tb.title=T(light?'切换到暗色':'切换到亮色',light?'Switch to dark':'Switch to light');document.querySelector('meta[name=theme-color]').content=light?'#F3F6F4':'#0E1117'};
  paintTheme();
  tb.onclick=()=>{const next=document.documentElement.dataset.theme==='light'?'dark':'light';document.documentElement.dataset.theme=next;localStorage.setItem('loom_theme',next);paintTheme()};
});
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const KIND={session:'💬',commit:'💻',doc:'📄',note:'📎',report:'📋',requirement:'📥'};
function card(e){return `<div class="card" onclick="detail('${esc(e.id).replace(/'/g,"\\'")}')">
  <div class="top"><span class="d">${esc(e.date)}</span><span>${esc(e.project)}</span>
  <span class="k">${KIND[e.kind]||''} ${esc(e.kind)}</span><span>${esc(e.tool)}</span></div>
  <div class="sm">${esc(e.summary)}</div>
  ${e.snip?`<div class="sn">↳ ${esc(e.snip)}</div>`:''}
  ${e.topics&&e.topics.length?`<div class="tp">🧵 ${e.topics.map(esc).join(' · ')}</div>`:''}</div>`}
function groups(g){const order=['report','session','commit','doc','note','requirement'];
  const keys=[...new Set([...order.filter(k=>g[k]),...Object.keys(g)])];
  return keys.map(k=>`<div class="gh">${KIND[k]||''} ${esc(k)} (${g[k].length})</div>`+g[k].map(card).join('')).join('')||`<div class="empty">${T('空','Empty')}</div>`}

// 视图切换
const ROUTES={search:'search',topics:'topics',days:'days',admin:'admin'};
const VIEW_TITLES={search:['搜索','Search'],topics:['主题','Topics'],days:['按天','Days'],admin:['管理','Admin']};
function viewFromHash(){const h=(location.hash||'#search').slice(1);return ROUTES[h]||'search'}
function setViewTitle(v){const [zh,en]=VIEW_TITLES[v]||VIEW_TITLES.search;document.title=`loom · ${T(zh,en)}`}
function showView(v,pushUrl=false){
  v=ROUTES[v]||'search';
  document.querySelectorAll('nav button[data-v]').forEach(b=>{
    const on=b.dataset.v===v;
    b.classList.toggle('on',on);
    if(on)b.setAttribute('aria-current','page');else b.removeAttribute('aria-current');
  });
  document.querySelectorAll('.view').forEach(x=>x.classList.toggle('on',x.id==='v-'+v));
  setViewTitle(v);
  if(pushUrl&&location.hash!=='#'+v)history.pushState(null,'','#'+v);
  if(v==='topics'&&!window._t){window._t=1;loadTopics()}
  if(v==='days'&&!window._d){window._d=1;loadDays()}
  if(v==='admin'&&!window._a){window._a=1;loadAdmin()}
}
document.querySelectorAll('nav button[data-v]').forEach(b=>b.onclick=()=>showView(b.dataset.v,true));
window.addEventListener('popstate',()=>showView(viewFromHash(),false));

// ---- 首页:搜索 + Dashboard ----
let deb;
function mode(searching){$('#dash').style.display=searching?'none':'';
  $('#rwrap').style.display=searching?'':'none';
  $('#subq').textContent=searching?T('Esc 清空返回总览','Esc to clear and return')
    :T('一份台账,织进了你的全部工作痕迹','One ledger, woven from all your work traces')}
async function doSearch(){
  const q=$('#q').value.trim(),f=$('#f-tool').value||$('#f-since').value||$('#f-until').value;
  if(!q&&!f){mode(false);return}
  mode(true);
  const r=await api('/api/search',{q,tool:$('#f-tool').value,
    since:$('#f-since').value,until:$('#f-until').value,limit:80});
  $('#r-search').innerHTML=r.hits.map(card).join('')||`<div class="empty">${T('无命中','No hits')}</div>`}
$('#q').addEventListener('input',()=>{clearTimeout(deb);deb=setTimeout(doSearch,280)});
['#f-tool','#f-since','#f-until'].forEach(s=>$(s).onchange=doSearch);
['git','claude','codex','cursor','feishu','docs','notes','日报'].forEach(t=>{
  const o=document.createElement('option');o.value=t;o.textContent=t;$('#f-tool').appendChild(o)});
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();$('#q').focus()}
  if(e.key==='Escape'&&document.activeElement===$('#q')){$('#q').value='';mode(false)}});

function countUp(el,n){const t0=performance.now();
  if(window.matchMedia('(prefers-reduced-motion: reduce)').matches){el.textContent=n.toLocaleString();return}
  const step=t=>{const p=Math.min(1,(t-t0)/650);
    el.textContent=Math.round(n*(1-Math.pow(1-p,3))).toLocaleString();
    if(p<1)requestAnimationFrame(step)};requestAnimationFrame(step)}

async function loadDash(){
  const [st,dy]=await Promise.all([api('/api/stats',{}),api('/api/days',{})]);
  // 统计带
  $('#stats').innerHTML=[[T('条记录','entries'),st.entries],[T('个活跃天','active days'),st.days],[T('个主题','topics'),st.topics],[T('条已归类','classified'),st.tagged]]
    .map(([l,n])=>`<div class="stat"><div class="n" data-n="${n}">0</div><div class="l">${l}</div></div>`).join('');
  document.querySelectorAll('.stat .n').forEach(el=>countUp(el,+el.dataset.n));
  // 织物贡献图:26 周 × 7 天
  const cnt={};dy.days.forEach(d=>cnt[d.date]=d.count);
  const end=new Date(),cells=[];
  const day0=new Date(end);day0.setDate(end.getDate()-((end.getDay()+6)%7));  // 本周一
  for(let w=25;w>=0;w--)for(let r=0;r<7;r++){
    const dt=new Date(day0);dt.setDate(day0.getDate()-w*7+r);
    if(dt>end)continue;
    const ds=dt.toISOString().slice(0,10);

// ---- 主题:横向层级 DAG 图 ----
const NW=n=>{let w=14;for(const ch of n.name)w+=ch.charCodeAt(0)>255?14:8;
  return w+String(n.count).length*7.5+(n.multi?16:0)+22}
async function loadTopics(){
  const r=await api('/api/topics',{});
  const nodes=r.nodes,edges=r.edges,byN={};nodes.forEach(n=>byN[n.name]=n);
  const parents={};edges.forEach(([p,c])=>{(parents[c]=parents[c]||[]).push(p)});
  // 深度 = 最长父链(带环保护)
  const depth={};const dep=(n,seen)=>{if(depth[n]!=null)return depth[n];
    if(seen.has(n))return 0;seen.add(n);
    const ps=(parents[n]||[]).filter(p=>byN[p]);
    return depth[n]=ps.length?1+Math.max(...ps.map(p=>dep(p,seen))):0};
  nodes.forEach(n=>dep(n.name,new Set()));
  const cols=[];nodes.forEach(n=>{(cols[depth[n.name]]=cols[depth[n.name]]||[]).push(n)});
  // 每列先按父的均值 y 排(减少交叉),父未定时按上卷数
  const pos={};const rowH=48,padY=14;
  const colX=[];let x=12;
  cols.forEach((col,ci)=>{colX[ci]=x;x+=Math.max(...col.map(NW))+72});
  cols.forEach((col,ci)=>{
    col.sort((a,b)=>{const ay=avgY(a),by=avgY(b);return ay-by||b.count-a.count});
    col.forEach((n,i)=>pos[n.name]={x:colX[ci],y:padY+i*rowH});
    function avgY(n){const ps=(parents[n.name]||[]).map(p=>pos[p]&&pos[p].y).filter(v=>v!=null);
      return ps.length?ps.reduce((a,b)=>a+b,0)/ps.length:1e9}
  });
  const H=Math.max(...cols.map(c=>c.length))*rowH+padY*2, W=x;
  const maxC=Math.max(...nodes.map(n=>n.count||1));
  let svg=`<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">
    <defs><filter id="sh" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/></filter></defs>`;
  for(const [p,c] of edges){if(!pos[p]||!pos[c])continue;
    const x1=pos[p].x+NW(byN[p]),y1=pos[p].y+16,x2=pos[c].x,y2=pos[c].y+16,mx=(x1+x2)/2;
    svg+=`<path class="gedge" data-e="${esc(p)}|${esc(c)}" d="M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}"/>`}
  for(const n of nodes){const{x,y}=pos[n.name],w=NW(n);
    const heat=Math.min(0.30,0.05+0.25*(n.count/maxC));        // 热力底色:上卷越多越暖
    const root=depth[n.name]===0;
    const cw=String(n.count).length*7.5+12;
    svg+=`<g class="gnode" data-n="${esc(n.name)}" transform="translate(${x},${y})" onclick="pick('${esc(n.name).replace(/'/g,"\\'")}')">
      <rect width="${w}" height="32" fill="rgba(224,168,78,${heat.toFixed(2)})"
        stroke="${root?'#8a6320':'var(--line)'}" filter="url(#sh)"/>
      <text x="13" y="21">${esc(n.name)}${n.multi?' ↺':''}</text>
      <rect x="${w-cw-7}" y="8" width="${cw}" height="16" rx="8" fill="${root?'#E0A84E':'#5AA9A0'}" opacity="0.9"/>
      <text class="cnt" x="${w-cw/2-7}" y="20" text-anchor="middle">${n.count}</text></g>`}
  svg+='</svg>';
  $('#tgraph').innerHTML=svg;
  $('#tloose').innerHTML=(r.loose.length?`${T('未建页','No page yet')}:${r.loose.map(t=>`<b onclick="pick('${esc(t)}')">${esc(t)}</b>`).join(' · ')} · `:'')
    +T(`已归类 ${r.total_tagged} 条 · ↺=多父(DAG)`,`${r.total_tagged} classified · ↺=multi-parent (DAG)`);
}
async function pick(name){
  document.querySelectorAll('.gnode').forEach(g=>g.classList.toggle('on',g.dataset.n===name));
  document.querySelectorAll('.gedge').forEach(e=>{const[p,c]=e.dataset.e.split('|');
    e.classList.toggle('hl',p===name||c===name)});
  const r=await api('/api/topic',{name});
  $('#tmembers').innerHTML=`<div class="gh" style="font-size:15px">🧵 ${esc(r.name)} · ${T('上卷 '+r.total+' 条','rolled up '+r.total)}`
  +(r.parents.length?`<span style="color:var(--dim)"> · parent: ${r.parents.map(esc).join(', ')}</span>`:'')+`</div>`+groups(r.groups);
}

  const m=CAL.months[CAL.idx];if(!m)return;
  const heat=c=>c>=10?'h3':c>=4?'h2':c>=1?'h1':'';
  const today=new Date().toISOString().slice(0,10);
  const [y,mo]=m.split('-').map(Number);

    if(!r.ok&&r.needs_confirm&&confirm(r.message)){payload.confirm=r.needs_confirm;r=await post('/api/admin/action',payload)}
    if(r.overview)await loadAdmin()
    setLog((r.ok?'✓ ':'✗ ')+(r.message||'')+(r.output?'\n\n'+r.output:''));
  }catch(e){
    setLog('✗ '+(e&&e.message?e.message:String(e)));
  }finally{
    setBusy(false);
  }
}

  backup:$('#sync-backup').checked,push:$('#sync-push').checked},$('#sync-push').checked?'push':null)}

let lastFocus=null;
function drawer(on){
  const d=$('#drawer');
  const was=d.classList.contains('on');
  if(on)lastFocus=document.activeElement;
  d.classList.toggle('on',!!on);
  d.setAttribute('aria-hidden',on?'false':'true');
  if(on)d.focus({preventScroll:true});else if(was&&lastFocus&&lastFocus.focus)lastFocus.focus({preventScroll:true});
}
async function detail(id){const e=await api('/api/entry',{id});
  const d=e.detail||{};
  let rows=`<h3>${esc(e.summary)}</h3>
  <div class="meta">${esc(e.date)} · ${esc(e.project)} · ${esc(e.tool)}/${esc(e.kind)}
  ${e.topics&&e.topics.length?` · 🧵 ${e.topics.map(esc).join(', ')}`:''}</div>
  <div class="meta mono">ref: ${esc(e.ref)}</div>`;
  for(const k of ['digest','body','opening','content','work','thinking','plan']){
    if(d[k])rows+=`<div class="gh">${k}</div><pre>${esc(d[k])}</pre>`}
  const rest=Object.fromEntries(Object.entries(d).filter(([k])=>!['digest','body','opening','content','work','thinking','plan'].includes(k)));
  if(Object.keys(rest).length)rows+=`<div class="gh">detail</div><pre>${esc(JSON.stringify(rest,null,1))}</pre>`;
  $('#dctn').innerHTML=rows;drawer(true)}
document.addEventListener('keydown',e=>{if(e.key==='Escape')drawer(false)});

showView(viewFromHash(),false);
loadDash();
</script>
